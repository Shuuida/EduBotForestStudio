                                    <div className="flex justify-between items-center gap-4 border-t border-gray-800 pt-4">
                                        <div className="flex-1"><div className="font-semibold text-white">Fuente para Dislexia</div><div className="text-xs text-gray-500">Mejora la legibilidad del texto en todo el editor.</div></div>
                                        <div className="flex items-center"><label className="relative inline-flex items-center cursor-pointer"><input type="checkbox" checked={prefs.dyslexicFont} onChange={(e) => handleChange('dyslexicFont', e.target.checked)} className="sr-only peer"/><div className="w-11 h-6 bg-gray-700 rounded-full peer peer-focus:ring-green-800 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-600"></div></label></div>
                                    </div>
                                    <div className="flex justify-between items-center gap-4 border-t border-gray-800 pt-4">
                                        <div className="flex-1"><div className="font-semibold text-white">Reducir Animaciones</div><div className="text-xs text-gray-500">Desactiva las transiciones visuales de la interfaz.</div></div>
                                        <div className="flex items-center"><label className="relative inline-flex items-center cursor-pointer"><input type="checkbox" checked={prefs.reduceMotion} onChange={(e) => handleChange('reduceMotion', e.target.checked)} className="sr-only peer"/><div className="w-11 h-6 bg-gray-700 rounded-full peer peer-focus:ring-green-800 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-600"></div></label></div>
                                    </div>
                                </div>
                            </div>

                            <hr className="border-gray-700" />
                            <div>
                                <h3 className="text-blue-400 font-bold uppercase text-xs mb-3 flex items-center gap-2"><Code size={14}/> Editor de Código Python</h3>
                                <div className="space-y-2">
                                    <div className="flex justify-between items-center bg-gray-800/50 p-2 rounded"><label>Tamaño de Fuente (px)</label><input type="number" min="10" max="24" value={prefs.editorFontSize} onChange={e => handleChange('editorFontSize', e.target.value)} className="bg-gray-900 border border-gray-600 rounded p-1 text-white text-xs w-16" /></div>
                                    <div className="flex justify-between items-center bg-gray-800/50 p-2 rounded"><label>Ajuste de Línea (Word Wrap)</label><input type="checkbox" checked={prefs.wordWrap} onChange={e => handleChange('wordWrap', e.target.checked)} className="accent-blue-500 w-4 h-4" /></div>
                                    <div className="flex justify-between items-center bg-gray-800/50 p-2 rounded"><label>Números de Línea</label><input type="checkbox" checked={prefs.lineNumbers} onChange={e => handleChange('lineNumbers', e.target.checked)} className="accent-blue-500 w-4 h-4" /></div>
                                </div>
                            </div>

                            <hr className="border-gray-700" />
                            <div>
                                <h3 className="text-purple-400 font-bold uppercase text-xs mb-3 flex items-center gap-2"><Share2 size={14}/> Editor de Nodos</h3>
                                <div className="space-y-2">
                                    <div className="flex justify-between items-center bg-gray-800/50 p-2 rounded"><label>Ajustar a Cuadrícula (Snap)</label><input type="checkbox" checked={prefs.snapToGrid} onChange={e => handleChange('snapToGrid', e.target.checked)} className="accent-purple-500 w-4 h-4" /></div>
                                    <div className="flex justify-between items-center bg-gray-800/50 p-2 rounded"><label>Mostrar Minimapa</label><input type="checkbox" checked={prefs.showMinimap} onChange={e => handleChange('showMinimap', e.target.checked)} className="accent-purple-500 w-4 h-4" /></div>
                                    <div className="flex justify-between items-center bg-gray-800/50 p-2 rounded"><label>Estilo de Conexión</label><select value={prefs.connectionStyle} onChange={e => handleChange('connectionStyle', e.target.value)} className="bg-gray-700 border border-gray-600 rounded p-1 text-white text-xs"><option value="default">Bezier (Curvo)</option><option value="straight">Recto</option><option value="step">Escalonado (Step)</option><option value="smoothstep">Suave (Smooth)</option></select></div>
                                </div>
                            </div>

                            <hr className="border-gray-700" />
                            <div>
                                <h3 className="text-red-400 font-bold uppercase text-xs mb-3 flex items-center gap-2"><Cpu size={14}/> Sistema</h3>
                                <div className="flex justify-between items-center bg-gray-800/50 p-2 rounded mb-2"><label>Tutorial de Bienvenida</label><button onClick={() => { localStorage.removeItem('edubot_tutorial_completed'); alert("Tutorial reiniciado."); }} className="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-xs text-white border border-gray-600">Reiniciar Tutorial</button></div>
                                <div className="flex justify-between items-center bg-gray-800/50 p-2 rounded"><label className="text-red-300">Zona de Peligro</label><button onClick={() => { if(confirm("¿Borrar todas las preferencias y reiniciar?")) { localStorage.clear(); location.reload(); } }} className="px-3 py-1 bg-red-900/50 hover:bg-red-800 text-red-200 rounded text-xs border border-red-800">Borrar Todo (Factory Reset)</button></div>
                            </div>
                        </div>

                        <div className="p-4 bg-gray-800 border-t border-gray-700 flex justify-end">
                            <button onClick={handleApplyAndClose} className="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-semibold shadow-lg">Aplicar y Cerrar</button>
                        </div>
                    </div>
                </div>
            );
        };

        const EditorContent = ({ onBack, initialNodes, initialEdges, currentName, setCurrentName }) => {
            const [nodes, setNodes, onNodesChange] = useNodesState(initialNodes || []);
            const [edges, setEdges, onEdgesChange] = useEdgesState(initialEdges || []);
            const [showTutorial, setShowTutorial] = useState(false);
            const [reactFlowInstance, setReactFlowInstance] = useState(null);
            const [logs, setLogs] = useState([{ time: new Date().toLocaleTimeString(), msg: `IDE Python Listo`, type: 'info' }]);
            const [activeTab, setActiveTab] = useState('forest'); 
            const [pythonCode, setPythonCode] = useState("# El código generado aparecerá aquí...");
            const [isWaitingInput, setIsWaitingInput] = useState(false);
            const [terminalInput, setTerminalInput] = useState('');
            const [isExecuting, setIsExecuting] = useState(false);
            const codeRef = useRef(null);
            const [hasUnsavedChanges, setHasUnsavedChanges] = useState(false);
            const [menu, setMenu] = useState(null);
            
            const reactFlowWrapper = useRef(null);
            
            // Lee el disco local al arrancar y lo fusiona con los valores por defecto
            const [prefs, setPrefs] = useState(() => {
                const defaultPrefs = {
                    uiScale: '100', dyslexicFont: false, reduceMotion: false,
                    editorFontSize: '14', wordWrap: false, lineNumbers: true,
                    snapToGrid: true, showMinimap: false, connectionStyle: 'default' 
                };
                try {
                    const saved = localStorage.getItem('edubot_preferences');
                    // Combina inteligentemente por si hay nuevas configuraciones en futuras versiones
                    return saved ? { ...defaultPrefs, ...JSON.parse(saved) } : defaultPrefs;
                } catch (e) {
                    return defaultPrefs;
                }
            });
            const [showSettings, setShowSettings] = useState(false);
            const [showTeacherDashboard, setShowTeacherDashboard] = useState(false);
            const isExecutingRef = useRef(false);


            useEffect(() => {
                // Escuchando los prints de Python en tiempo real
                window.eel.expose(api_realtime_log, 'api_realtime_log');
                function api_realtime_log(text) {
                    setLogs(p => [...p, { time: new Date().toLocaleTimeString(), msg: text, type: 'output' }]);
                }

                // Escuchando la solicitud de Input de Python
                window.eel.expose(trigger_frontend_input, 'trigger_frontend_input');
                function trigger_frontend_input() {
                    setIsWaitingInput(true);
                }
            }, []);

            useEffect(() => {
                isExecutingRef.current = isExecuting;
            }, [isExecuting]);

            useEffect(() => {
                window.eel.expose(api_realtime_log, 'api_realtime_log');
                function api_realtime_log(text) {
                    setLogs(p => [...p, { time: new Date().toLocaleTimeString(), msg: text, type: 'output' }]);
                }

                window.eel.expose(trigger_frontend_input, 'trigger_frontend_input');
                function trigger_frontend_input() {
                    if (isExecutingRef.current) {
                        setIsWaitingInput(true);
                    }
                }
            }, []);

            const handleTerminalSubmit = async (e) => {
                if (e.key === 'Enter') {
                    const val = terminalInput;
                    setTerminalInput('');
                    setIsWaitingInput(false);
                    await window.eel.api_provide_input(val)();
                }
            };

            useEffect(() => {
                const root = document.documentElement;
                root.style.setProperty('--editor-font-size', `${prefs.editorFontSize}px`);
                document.body.style.zoom = `${prefs.uiScale}%`;
                
                if (prefs.dyslexicFont) {
                    document.body.style.fontFamily = 'Verdana, sans-serif'; 
                    document.body.style.letterSpacing = '0.5px';
                } else {
                    document.body.style.fontFamily = ''; 
                    document.body.style.letterSpacing = '';
                }

                if (prefs.reduceMotion) {
                    root.style.setProperty('--animate-connection', 'none');
                    const styles = document.getElementById('motion-reduce-style') || document.createElement('style');
                    styles.id = 'motion-reduce-style';
                    styles.innerHTML = prefs.reduceMotion ? `* { animation: none !important; transition: none !important; }` : '';
                    document.head.appendChild(styles);
                } else {
                    const styles = document.getElementById('motion-reduce-style');
                    if(styles) styles.innerHTML = '';
                }

            }, [prefs]);

            const addLog = (msg, type = 'info') => setLogs(p => [...p, { time: new Date().toLocaleTimeString(), msg, type }]);

            const clearNodeErrors = () => {
                setNodes(nds => nds.map(node => ({
                    ...node,
                    data: { ...node.data, error: false, errorMsg: undefined }
                })));
            };

            const onNodeContextMenu = useCallback((event, node) => {
                event.preventDefault(); // Evita que salga el menú gris feo del navegador
                
                // Calculamos en qué punto exacto del cuadro gris hicimos el click
                const pane = reactFlowWrapper.current.getBoundingClientRect();
                
                setMenu({
                    id: node.id,
                    top: event.clientY < pane.bottom - 100 ? event.clientY - pane.top : undefined,
                    left: event.clientX < pane.right - 150 ? event.clientX - pane.left : undefined,
                    bottom: event.clientY >= pane.bottom - 100 ? pane.bottom - event.clientY : undefined,
                    right: event.clientX >= pane.right - 150 ? pane.right - event.clientX : undefined,
                });
            }, []);

            const duplicateNode = (id) => {
                const nodeToDuplicate = nodes.find(n => n.id === id);
                if (nodeToDuplicate) {
                    const newNode = {
                        ...nodeToDuplicate,
                        // Le damos un ID completamente nuevo para que ReactFlow no crashee
                        id: `${nodeToDuplicate.type}_${Date.now()}`, 
                        position: {
                            x: nodeToDuplicate.position.x + 40, // Lo desfasamos un poquito para que no se superponga exactamente encima
                            y: nodeToDuplicate.position.y + 40,
                        },
                        selected: false,
                        data: {
                            ...nodeToDuplicate.data,
                            error: false, // El clon nace sin errores
                            errorMsg: undefined
                        }
                    };
                    setNodes(nds => nds.concat(newNode));
                    addLog(`Nodo clonado con éxito`, 'info');
                    setHasUnsavedChanges(true);
                }
                setMenu(null); // Cerramos el menú
            };
            
            const onConnect = useCallback((params) => {
                if (params.source === params.target) {
                    addLog('Conexión inválida: no se puede conectar un nodo consigo mismo.', 'warn');
                    return;
                }
                setEdges((eds) => addEdge({ ...params, type: 'smart', animated: false, data: { status: 'idle' } }, eds));
                setHasUnsavedChanges(true);
            }, [setEdges]);
            
            const onNodeDataChange = (id, newData) => {
                setNodes((nds) => nds.map((node) => node.id === id ? { ...node, data: newData } : node));
                setHasUnsavedChanges(true);
            };

            useEffect(() => {
                if (initialNodes && initialNodes.length > 0) {
                    const reanimatedNodes = initialNodes.map(node => ({
                        ...node,
                        data: {
                            ...node.data,
                            onChange: onNodeDataChange
                        }
                    }));
                    setNodes(reanimatedNodes);
                }
            }, []);

            const onDragOver = useCallback((event) => { event.preventDefault(); event.dataTransfer.dropEffect = 'move'; }, []);
            
            const onDrop = useCallback((event) => {
                event.preventDefault();
                const type = event.dataTransfer.getData('application/reactflow/type');
                const label = event.dataTransfer.getData('application/reactflow/label');
                if (!type || !reactFlowInstance) return;
                const position = reactFlowInstance.screenToFlowPosition({ x: event.clientX, y: event.clientY });
                const defaultData = { label, onChange: onNodeDataChange };
                if (type === 'py_loop') {
                    defaultData.iterator = 'i';
                    defaultData.iterable = 'range(10)';
                }
                if (type === 'py_while') {
                    defaultData.condition = 'True';
                }
                const newNode = { id: `${type}_${Date.now()}`, type, position, data: defaultData };
                setNodes((nds) => nds.concat(newNode));
                addLog(`Nodo: ${label}`);
                setHasUnsavedChanges(true);
            }, [reactFlowInstance]);

            const onDragStart = (event, nodeType, label) => {
                event.dataTransfer.setData('application/reactflow/type', nodeType);
                event.dataTransfer.setData('application/reactflow/label', label);
                event.dataTransfer.effectAllowed = 'move';
            };

            const deleteSelected = () => {
                const selected = nodes.filter(n => n.selected);
                if (!selected.length) return;
                setNodes(nds => nds.filter(n => !n.selected));
                setEdges(eds => eds.filter(e => !selected.some(n => n.id === e.source || n.id === e.target)));
                addLog(`Eliminados ${selected.length} nodos`, 'warn');
                setHasUnsavedChanges(true);
            };

            const translateToCode = async () => {
                const blocks = serializeNodesLinear(nodes, edges);
                try {
                    if(window.eel) {
                        const res = await window.eel.api_translate("to_python", blocks)();
                        if (res.result) { setPythonCode(res.result); addLog("Traducción OK", 'success'); }
                        else addLog(`Error: ${res.error}`, 'error');
                    }
                } catch (e) { addLog(`Error: ${e}`, 'error'); }
            };

            const runPipeline = async () => {
                clearNodeErrors();
                
                const blocks = serializeNodesLinear(nodes, edges);
                
                let loopErrorNodeId = null;
                let loopErrorMessage = "";

                const checkInfiniteLoops = (blockList) => {
                    for (const block of blockList) {
                        
                        // Función recursiva para buscar un nodo 'Control -> break'
                        const hasBreak = (subBlocks) => {
                            for (const sb of subBlocks) {
                                if (sb.type === 'py_control' && sb.control_type === 'break') return true;
                                if (sb.body && hasBreak(sb.body)) return true;
                            }
                            return false;
                        };

                        // REGLA PARA CICLOS WHILE
                        if (block.type === 'py_while') {
                            const cond = (block.condition || '').toString().trim();
                            const condLower = cond.toLowerCase();

                            if (!hasBreak(block.body || [])) {
                                let isInfinite = false;
                                
                                // Caso 1: La condición es estática (True, 1, vacío, o algo como 10 > 5 sin variables)
                                if (condLower === 'true' || condLower === '1' || condLower === '') {
                                    isInfinite = true;
                                } 
                                // Caso 2: Tiene variables, comprobamos si se actualizan dentro del cuerpo
                                else {
                                    // Extraemos nombres de variables con Regex (ignorando palabras clave nativas)
                                    const words = cond.match(/[a-zA-Z_]\w*/g) || [];
                                    const actualVars = words.filter(v => !['True','False','and','or','not','is','in'].includes(v));
                                    
                                    if (actualVars.length > 0) {
                                        const modifiesVar = (subBlocks, varNames) => {
                                            for (const sb of subBlocks) {
                                                // Nodos que alteran variables en EduBot
                                                if (sb.type === 'py_var' && varNames.includes(sb.var_name)) return true;
                                                if (['py_math', 'py_int', 'py_float', 'py_input'].includes(sb.type) && varNames.includes(sb.target)) return true;
                                                
                                                // Búsqueda en profundidad por si está dentro de un If
                                                if (sb.body && modifiesVar(sb.body, varNames)) return true;
                                            }
                                            return false;
                                        };
                                        
                                        // Si la variable de la condición nunca se modifica adentro, es bucle infinito seguro
                                        if (!modifiesVar(block.body || [], actualVars)) {
                                            isInfinite = true;
                                        }
                                    } else {
                                        // Si no tiene variables y no era 'true', es estático puro = infinito
                                        isInfinite = true;
                                    }
                                }

                                if (isInfinite) {
                                    loopErrorNodeId = block.id;
                                    loopErrorMessage = "⚠️ Riesgo de Bucle Infinito. Modifica la variable adentro o añade un 'Control (Break)'.";
                                    return;
                                }
                            }
                        }
                        
                        // REGLA PARA CICLOS FOR (Limita rangos absurdos si no hay break)
                        if (block.type === 'py_loop') {
                            const iterable = (block.iterable || '').toString().replace(/\s/g, '');
                            
                            // Si lo dejan vacío o intentan hacer un rango masivo de 3+ ceros (ej. range(999) sin break, lo bloqueamos por seguridad
                            if (iterable === '' || iterable.match(/range\([0-9]{3,}\)/)) {
                                if (!hasBreak(block.body || [])) {
                                    loopErrorNodeId = block.id;
                                    loopErrorMessage = "⚠️ Rango vacío o excesivamente grande. Redúcelo o añade un 'Control (Break)'.";
                                    return;
                                }
                            }
                        }

                        // Explorar sub-niveles (Ifs o ciclos anidados)
                        if (block.body && block.body.length > 0) {
                            checkInfiniteLoops(block.body);
                            if (loopErrorNodeId) return; // Propagar salida rápida
                        }
                    }
                };

                checkInfiniteLoops(blocks);

                // Si detectamos un bucle mortal, cortamos todo y lanzamos el aura roja
                if (loopErrorNodeId) {
                    setNodes(nds => nds.map(n => n.id === loopErrorNodeId ? { ...n, data: { ...n.data, error: true, errorMsg: loopErrorMessage } } : n));
                    addLog("Ejecución abortada: Bucle infinito bloqueado por seguridad.", 'error');
                    setEdges(eds => eds.map(e => ({ ...e, data: { status: 'error' } }))); // Coloreamos las líneas rojas
                    setIsExecuting(false);
                    return; 
                }
                
                // Si pasa la inspección del escudo, arranca la interfaz y llama a Python
                setIsExecuting(true);
                setLogs([{ time: new Date().toLocaleTimeString(), msg: "Iniciando Sandbox...", type: 'warn' }]); 
                setEdges(eds => eds.map(e => ({ ...e, data: { status: 'active' } })));
                
                try {
                    if (window.eel) {
                        const res = await window.eel.api_execute(blocks)();
                        if (res.success) {
                            addLog("Ejecución finalizada.", 'success');
                        } else {
                            addLog(`Error: ${res.error}`, 'error');
                            
                            // Aquí se procesan los errores tipográficos que devuelve Python
                            if (res.error_nodes && res.error_nodes.length > 0) {
                                setNodes(nds => nds.map(n => {
                                    const errInfo = res.error_nodes.find(err => err.node_id === n.id);
                                    if (errInfo) {
                                        return { ...n, data: { ...n.data, error: true, errorMsg: errInfo.message } };
                                    }
                                    return n;
                                }));
                            }
                        }
                    }
                } catch (e) { 
                    addLog(`Error: ${e}`, 'error');
                    setEdges(eds => eds.map(e => ({ ...e, data: { status: 'error' } })));
                    setIsExecuting(false);
                    setIsWaitingInput(false);
                    return;
                }

                setEdges(eds => eds.map(e => ({ ...e, data: { status: 'idle' } })));
                setIsExecuting(false);
                setIsWaitingInput(false);
            };

            const killExecution = async () => {
                if (!window.eel) return;
                const timestamp = new Date().toLocaleTimeString();
                setLogs(p => [...p, { time: timestamp, msg: "Deteniendo ejecución...", type: 'warn' }] );
                try {
                    const res = await window.eel.api_kill_execution()();
                    if (res.success) {
                        addLog("Ejecución detenida.", 'warn');
                    } else {
                        addLog(res.error || "No hay ejecución activa.", 'info');
                    }
                } catch (e) {
                    addLog(`Error al detener la ejecución: ${e}`, 'error');
                }
                setIsExecuting(false);
                setIsWaitingInput(false);
                setEdges(eds => eds.map(e => ({ ...e, data: { status: 'idle' } })));
            };

            useEffect(() => {
                const handleExecutionKey = (event) => {
                    if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'c' && isExecuting) {
                        event.preventDefault();
                        killExecution();
                    }
                };

                window.addEventListener('keydown', handleExecutionKey);
                return () => window.removeEventListener('keydown', handleExecutionKey);
            }, [isExecuting]);

            const [modalConfig, setModalConfig] = useState({ 
                isOpen: false, type: 'prompt', title: '', message: '', 
                onConfirm: () => {}, onCancel: () => {} 
            });

            const closeModal = () => setModalConfig(prev => ({ ...prev, isOpen: false }));

            const handleExitAttempt = () => {
                if (hasUnsavedChanges) {
                    setModalConfig({
                        isOpen: true, 
                        type: 'confirm', 
                        title: '⚠️ Cambios sin guardar',
                        message: 'Tienes modificaciones recientes. Si sales ahora perderás el progreso no guardado. ¿Deseas salir de todos modos?',
                        onConfirm: () => {
                            closeModal();
                            setHasUnsavedChanges(false);
                            onBack(); // Sale al inicio
                        },
                        onCancel: closeModal
                    });
                } else {
                    onBack(); // Sale directo si todo está guardado
                }
            };

            const exportToPythonFile = async () => {
                if (!pythonCode || pythonCode.includes("El código generado aparecerá aquí")) {
                    addLog("No hay código Python generado para exportar. Presiona la pestaña 'Código Python' primero.", "warn");
                    return;
                }
                
                // Pedimos confirmación elegante con TU CustomModal antes de abrir la ventana de Windows
                setModalConfig({
                    isOpen: true,
                    type: 'confirm',
                    title: 'Exportar Código',
                    message: '¿Estás seguro de que deseas exportar el flujo visual a un archivo .py puro con tu progreso actual?',
                    onConfirm: async () => {
                        closeModal(); // Cerramos la alerta
                        
                        const suggestedName = currentName ? `${currentName}_export.py` : 'script_edubot.py';
                        
                        // Llamamos a Python para que maneje el guardado nativo sin alertas rojas
                        const res = await window.eel.api_export_python_file(pythonCode, suggestedName)();
                        
                        if (res.success) {
                            addLog(`Archivo .py exportado exitosamente en: ${res.path}`, "success");
                        } else if (res.error === 'cancelado') {
                            addLog("Exportación cancelada por el usuario.", "error"); // Mensaje en rojo
                        } else {
                            addLog(`Error de sistema al exportar: ${res.error}`, "error");
                        }
                    },
                    onCancel: closeModal
                });
            };

            const saveProject = async () => {
                const performSave = async (name) => {
                    closeModal();
                    if (!name) return;

                    const data = { blocks: nodes.map(n=>({...n, type:n.type})), edges };
                    try {
                        const res = await window.eel.api_save_project(data, name)(); 
                        if (res.success) {
                            addLog(`Proyecto guardado: ${name}.edubotproj`, 'success'); 
                            setCurrentName(name);
                            setHasUnsavedChanges(false);
                        } else { 
                            addLog(`Error guardando: ${res.error}`, 'error'); 
                        }
                    } catch(e) { addLog(e, 'error'); }
                };

                if (currentName) {
                    performSave(currentName);
                } else {
                    setModalConfig({
                        isOpen: true, type: 'prompt', title: 'Guardar Proyecto',
                        message: 'Ingresa un nombre para tu archivo:',
                        onConfirm: (val) => performSave(val), 
                        onCancel: closeModal
                    });
                }
            };

            const trashProject = async () => {
                // Caso 1: El proyecto no tiene nombre (es un borrador)
                if (!currentName) {
                    setModalConfig({
                        isOpen: true, 
                        type: 'confirm', 
                        title: 'Descartar Borrador',
                        message: 'El proyecto no está guardado. ¿Deseas descartar todos los cambios y limpiar el editor?',
                        onConfirm: () => {
                            setNodes([]); 
                            setEdges([]); 
                            setLogs([]); 
                            addLog("Editor limpiado (Borrador descartado)", 'warn');
                            closeModal();
                        },
                        onCancel: closeModal
                    });
                    return;
                }

                // Caso 2: El proyecto ya está guardado y se va a borrar de verdad
                setModalConfig({
                    isOpen: true, 
                    type: 'confirm', 
                    title: 'Mover a Papelera',
                    message: `¿ESTÁS SEGURO?\n\nEl proyecto '${currentName}' será enviado a la Papelera de Reciclaje.\nEsta acción cerrará el editor.`,
                    onConfirm: async () => {
                        closeModal(); // Ocultamos la pregunta antes de procesar
                        
                        try {
                            const res = await window.eel.api_move_to_trash(currentName, 'project')();
                            
                            if (res.success) {
                                // Alerta de éxito personalizada
                                setModalConfig({
                                    isOpen: true, type: 'alert', title: 'Éxito', 
                                    message: "Proyecto enviado a la papelera exitosamente.",
                                    onConfirm: () => { closeModal(); onBack(); }
                                });
                            } else {
                                // Alerta de error personalizada
                                setModalConfig({
                                    isOpen: true, type: 'alert', title: 'Error al eliminar', 
                                    message: res.error,
                                    onConfirm: closeModal
                                });
                            }
                        } catch (e) {
                            setModalConfig({
                                isOpen: true, type: 'alert', title: 'Error de Sistema', 
                                message: str(e),
                                onConfirm: closeModal
                            });
                        }
                    },
                    onCancel: closeModal
                });
            };

            useEffect(() => { if (activeTab === 'code' && codeRef.current && window.Prism) { window.Prism.highlightElement(codeRef.current); } }, [activeTab, pythonCode]);
            
            const finishTutorial = () => { localStorage.setItem('edubot_tutorial_completed', 'true'); setShowTutorial(false); };

            return (
                <div className="flex h-full flex-col relative">
                    {showTutorial && <TutorialOverlay onComplete={finishTutorial} />}
                    <div className="h-14 bg-gray-900 border-b border-gray-700 flex items-center px-4 justify-between shrink-0">
                        <div className="flex items-center gap-4">
                            <button onClick={handleExitAttempt} className="text-gray-400 hover:text-white flex items-center gap-1 text-sm font-bold transition-colors"><ArrowLeft size={16}/> Inicio</button>
                            {/* Nuevo diseño del semáforo de estado */}
                            <div className="text-xs text-gray-400 font-mono flex items-center gap-2 bg-gray-800/50 px-2 py-1 rounded border border-gray-700"> 
                                <span className={`w-2.5 h-2.5 rounded-full transition-all duration-300 ${hasUnsavedChanges ? 'bg-yellow-400 shadow-[0_0_6px_rgba(250,204,21,0.6)]' : 'bg-green-500 shadow-[0_0_6px_rgba(34,197,94,0.6)]'}`} title={hasUnsavedChanges ? "Cambios sin guardar" : "Todo guardado"}></span>
                                {currentName ? `${currentName}.edubotproj` : 'Proyecto Nuevo'} 
                                {hasUnsavedChanges && <span className="text-yellow-400 font-bold ml-1">*</span>}
                            </div>
                            
                            <div className="h-6 w-px bg-gray-700"></div>
                            <div className="flex bg-gray-800 rounded p-1">
                                <button onClick={() => setActiveTab('forest')} className={`px-3 py-1 rounded text-xs font-medium ${activeTab==='forest'?'bg-gray-600 text-white':'text-gray-400'}`}>Bosque Visual</button>
                                <button onClick={() => { setActiveTab('code'); translateToCode(); }} className={`px-3 py-1 rounded text-xs font-medium ${activeTab==='code'?'bg-gray-600 text-white':'text-gray-400'}`}>Código Python</button>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={deleteSelected} title="Borrar un nodo del lienzo" className="p-2 rounded hover:bg-red-900/30 text-red-400"><Trash2 size={18}/></button>
                            <button onClick={saveProject} title="Guardar el avance del proyecto" className="p-2 rounded hover:bg-blue-900/30 text-blue-400"><Save size={18}/></button>
                            <button onClick={trashProject} title="Mover Proyecto a Papelera" className="p-2 rounded hover:bg-red-900/40 text-red-500 transition-colors border border-transparent hover:border-red-500/50"><FileWarning size={18}/></button>
                            <button onClick={exportToPythonFile} title="Exportar como archivo .py" className="p-2 rounded hover:bg-emerald-900/40 text-emerald-400 transition-colors border border-transparent hover:border-emerald-500/50"><Code size={18}/></button>
                            <div className="h-6 w-px bg-gray-700 mx-1"></div>
                            <StudentAuth onOpenTeacherDashboard={() => setShowTeacherDashboard(true)} showModal={(config) => setModalConfig({...config, isOpen: true})}closeModal={closeModal}/>
                            <div className="h-6 w-px bg-gray-700 mx-1"></div>
                            <button onClick={() => setShowSettings(true)} className="p-2 rounded hover:bg-gray-700 text-gray-400 hover:text-white mr-2" title="Preferencias"> <Settings size={18} /> </button>
                            <button onClick={() => setShowTutorial(true)} className="p-2 rounded hover:bg-gray-700 text-yellow-400 mr-2" title="Ver Tutorial"><span className="text-xs font-bold border border-yellow-400 rounded-full w-5 h-5 flex items-center justify-center">?</span></button>
                            <div className="flex items-center gap-2">
                                <button onClick={runPipeline} disabled={isExecuting} className={`bg-green-600 hover:bg-green-500 text-white px-4 py-1.5 rounded text-sm font-semibold flex items-center gap-2 shadow-lg ${isExecuting ? 'opacity-60 cursor-not-allowed' : ''}`}>
                                    <Play size={16} fill="currentColor"/> Ejecutar
                                </button>
                                <button onClick={killExecution} disabled={!isExecuting} className={`bg-red-600 hover:bg-red-500 text-white px-3 py-1.5 rounded text-sm font-semibold flex items-center gap-2 shadow-lg ${!isExecuting ? 'opacity-60 cursor-not-allowed' : ''}`} title="Detener ejecución (Ctrl+C)">
                                    <XCircle size={16} /> Detener
                                </button>
                            </div>
                        </div>
                    </div>
                    <div className="flex-1 flex overflow-hidden">
                        <div className="w-64 bg-gray-900 border-r border-gray-700 flex flex-col shrink-0">
                            <div className="p-3 text-xs font-bold text-gray-500 uppercase tracking-wider border-b border-gray-800">Catálogo de Nodos</div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-1 custom-scrollbar">
                                
                                <div className="text-[10px] font-bold text-gray-500 uppercase mt-2 mb-1 px-2">Datos y Entradas</div>
                                <SidebarBtn label="Variable" icon={Variable} color="text-yellow-400" nodeType="py_var" onDragStart={onDragStart} />
                                <SidebarBtn label="Input (Escribir)" icon={Keyboard} color="text-slate-400" nodeType="py_input" onDragStart={onDragStart} />
                                <SidebarBtn label="Print (Imprimir)" icon={Terminal} color="text-gray-400" nodeType="py_print" onDragStart={onDragStart} />
                                <SidebarBtn label="To Int (Entero)" icon={Code} color="text-pink-500" nodeType="py_int" onDragStart={onDragStart} />
                                <SidebarBtn label="To Float (Decimal)" icon={Code} color="text-pink-400" nodeType="py_float" onDragStart={onDragStart} />

                                <div className="text-[10px] font-bold text-gray-500 uppercase mt-4 mb-1 px-2">Matemáticas y Lógica</div>
                                <SidebarBtn label="Math" icon={Calculator} color="text-teal-400" nodeType="py_math" onDragStart={onDragStart} />
                                <SidebarBtn label="Compare" icon={CheckSquare} color="text-cyan-400" nodeType="py_compare" onDragStart={onDragStart} />

                                <div className="text-[10px] font-bold text-gray-500 uppercase mt-4 mb-1 px-2">Control de Flujo</div>
                                <SidebarBtn label="If (Si)" icon={Split} color="text-orange-400" nodeType="py_if" onDragStart={onDragStart} />
                                <SidebarBtn label="Elif (Sino Si)" icon={Split} color="text-orange-500" nodeType="py_elif" onDragStart={onDragStart} />
                                <SidebarBtn label="Else (Sino)" icon={Split} color="text-red-500" nodeType="py_else" onDragStart={onDragStart} />
                                <SidebarBtn label="For (Por 'x' en tal Rango)" icon={Repeat} color="text-orange-500" nodeType="py_loop" onDragStart={onDragStart} />
                                <SidebarBtn label="While (Mientras)" icon={RefreshCw} color="text-orange-600" nodeType="py_while" onDragStart={onDragStart} />
                                <SidebarBtn label="Control (Break/Pass)" icon={XCircle} color="text-red-500" nodeType="py_control" onDragStart={onDragStart} />
                                
                                <div className="text-[10px] font-bold text-gray-500 uppercase mt-4 mb-1 px-2">Objetos y Funciones</div>
                                <SidebarBtn label="Class (Clases)" icon={Box} color="text-indigo-400" nodeType="py_class" onDragStart={onDragStart} />
                                <SidebarBtn label="Constructor (__init__)" icon={FunctionSquare} color="text-indigo-500" nodeType="py_init" onDragStart={onDragStart} />
                                <SidebarBtn label="Atributo (self.)" icon={Box} color="text-indigo-300" nodeType="py_self" onDragStart={onDragStart} />
                                <SidebarBtn label="Function (Funciones)" icon={FunctionSquare} color="text-violet-400" nodeType="py_func" onDragStart={onDragStart} />
                                <SidebarBtn label="Return (Retornar)" icon={ArrowLeft} color="text-rose-400" nodeType="py_return" onDragStart={onDragStart} />
                                <SidebarBtn label="Llamar Método (Call)" icon={Play} color="text-rose-500" nodeType="py_call" onDragStart={onDragStart} />

                                <div className="text-[10px] font-bold text-gray-500 uppercase mt-4 mb-1 px-2">Avanzado</div>
                                <SidebarBtn label="Try (Intentar)" icon={AlertTriangle} color="text-amber-400" nodeType="py_try" onDragStart={onDragStart} />
                                <SidebarBtn label="Except (Manejar Error)" icon={AlertTriangle} color="text-amber-500" nodeType="py_except" onDragStart={onDragStart} />
                                <SidebarBtn label="Import (Importar)" icon={Package} color="text-sky-400" nodeType="py_import" onDragStart={onDragStart} />
                                <div className="pb-4"></div>
                            </div>
                        </div>
                        <div className="flex-1 relative bg-[#1e1e1e]" ref={reactFlowWrapper}>
                            {activeTab==='forest' ? (
                                <div className="h-full w-full relative">
                                    <ReactFlow 
                                        nodes={nodes} edges={edges} 
                                        onNodesChange={onNodesChange} onEdgesChange={onEdgesChange} 
                                        onConnect={onConnect} edgeTypes={edgeTypes} 
                                        onInit={setReactFlowInstance} 
                                        onDrop={onDrop} onDragOver={onDragOver} 
                                        nodeTypes={nodeTypes} fitView 
                                        snapToGrid={prefs.snapToGrid} snapGrid={[15,15]} 
                                        connectionLineType={prefs.connectionStyle}
                                        onNodeContextMenu={onNodeContextMenu} // <-- Escucha el click derecho
                                        onPaneClick={() => setMenu(null)}     // <-- Cierra el menú al hacer click afuera
                                    > 
                                        {prefs.showMinimap && <RFObj.MiniMap style={{background:'#1a1a1a'}} nodeStrokeColor="#555" />} 
                                        <Background color="#333" gap={20} />
                                        <Controls className="bg-gray-800 border-gray-700 fill-white text-white" />
                                    </ReactFlow>
                                    
                                    {/* DIBUJA EL MENÚ FLOTANTE */}
                                    {menu && (
                                        <div 
                                            style={{ top: menu.top, left: menu.left, right: menu.right, bottom: menu.bottom }} 
                                            className="absolute z-50 bg-gray-800 border border-gray-600 rounded-lg shadow-2xl py-1 w-36 overflow-hidden animate-fade-in"
                                            onMouseLeave={() => setMenu(null)}
                                        >
                                            <button onClick={() => duplicateNode(menu.id)} className="w-full text-left px-4 py-2 text-sm text-gray-200 hover:bg-indigo-600 hover:text-white flex items-center gap-2 transition-colors">
                                                <Copy size={16} /> Duplicar
                                            </button>
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div className="flex h-full w-full relative bg-[#1d1f21] overflow-auto custom-scrollbar group">
                                    {/* Botón de Copiar (Ajustado el z-index y el margen para que no choque con las barras) */}
                                    <button onClick={() => {navigator.clipboard.writeText(pythonCode); addLog("Código copiado al portapapeles", "success")}} className="absolute top-4 right-6 bg-gray-700/50 hover:bg-gray-600 text-gray-300 p-2 rounded-lg backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-opacity z-20 shadow-lg" title="Copiar Código"><Code size={16} /></button>
                                    
                                    {/* BARRA LATERAL: Contador de Líneas Dinámico */}
                                    {prefs.lineNumbers && (
                                        <div className="py-6 px-4 bg-[#1a1c1e] text-gray-500 font-mono border-r border-gray-800 text-right select-none sticky left-0 z-10 shrink-0" style={{ lineHeight: '1.5', fontSize: `${prefs.editorFontSize}px` }}>
                                            {pythonCode.split('\n').map((_, i) => (
                                                <div key={i}>{i + 1}</div>
                                            ))}
                                        </div>
                                    )}
                                    
                                    {/* LIENZO DE CÓDIGO: Conectado al WordWrap y al Tamaño de Fuente */}
                                    <pre className={`!m-0 !p-6 !bg-transparent !font-mono flex-1 ${prefs.wordWrap ? 'whitespace-pre-wrap break-words' : 'whitespace-pre'}`} style={{tabSize: 4, lineHeight: '1.5', fontSize: `${prefs.editorFontSize}px`}}>
                                        <code ref={codeRef} className="language-python">{pythonCode}</code>
                                    </pre>
                                </div>
                            )}
                        </div>
                    </div>
                    <div className="h-40 border-t border-gray-700 flex flex-col bg-black shrink-0">
                        <div className="bg-gray-800 text-[10px] uppercase font-bold tracking-wider px-3 py-1 text-gray-400 border-b border-gray-700 flex justify-between">
                            <span>Terminal Interactiva</span>
                            <button onClick={()=>setLogs([])} className="hover:text-white">Limpiar (Clear)</button>
                        </div>
                        <TerminalLog 
                            logs={logs} 
                            isWaitingInput={isWaitingInput}
                            terminalInput={terminalInput}
                            setTerminalInput={setTerminalInput}
                            handleTerminalSubmit={handleTerminalSubmit}
                        />
                    </div>
                    <SettingsModal isOpen={showSettings} onClose={() => setShowSettings(false)} prefs={prefs} setPrefs={setPrefs} showModal={(c) => setModalConfig({...c, isOpen: true})} closeModal={closeModal} />
                    {showTeacherDashboard && <TeacherDashboard onClose={() => setShowTeacherDashboard(false)} showModal={(c) => setModalConfig({...c, isOpen: true})} closeModal={closeModal} />}
                    <CustomModal {...modalConfig} />
                </div>
            );
        };

        const Editor = (props) => {
            return (
                <ReactFlowProvider>
                    <EditorContent {...props} />
                </ReactFlowProvider>
            );
        };

        const Main = () => {
            const [view, setView] = useState('welcome');
            const [initialData, setInitialData] = useState(null);
            const [currentName, setCurrentName] = useState(null);

            const [modalConfig, setModalConfig] = useState({ 
                isOpen: false, type: 'prompt', title: '', message: '', 
                onConfirm: () => {}, onCancel: () => {} 
            });

            const closeModal = () => setModalConfig(prev => ({ ...prev, isOpen: false }));
            
            // SISTEMA DE INACTIVIDAD Y BLOQUEO
            const [lockState, setLockState] = useState('active'); // 'active' o 'locked'
            const [unlockPwd, setUnlockPwd] = useState('');
            const [unlockError, setUnlockError] = useState('');
            const [unlockLoading, setUnlockLoading] = useState(false);
            
            const lastActivity = useRef(Date.now());
            const warningLevel = useRef(0);

            useEffect(() => {
                const resetTimer = () => { // Si ya está bloqueado, o si hay una alerta esperando clic, ignoramos el movimiento del mouse.
                    // Esto obliga al usuario a dar un feedback real (clic en la alerta).
                    //
                    if (lockState === 'locked' || warningLevel.current > 0) return;
                    lastActivity.current = Date.now();
                };

                // Detectamos actividad general
                const events = ['mousemove', 'keydown', 'mousedown', 'scroll', 'click'];
                events.forEach(e => window.addEventListener(e, resetTimer));

                const checkInactivity = setInterval(() => {
                    const role = localStorage.getItem('edubot_role');
                    if (!role || lockState === 'locked') {
                        lastActivity.current = Date.now(); // No bloqueamos si no hay sesión
                        return;
                    }

                    const elapsed = Date.now() - lastActivity.current;

                    if (elapsed >= 720000) { // FASE 3: 12 Minutos (Bloqueo Total)
                        setLockState('locked');
                        warningLevel.current = 0;
                        closeModal(); // Limpiamos cualquier advertencia previa
                    } else if (elapsed >= 480000 && warningLevel.current < 2) { // FASE 2: 8 Minutos (Advertencia Crítica)
                        warningLevel.current = 2;
                        setModalConfig({
                            isOpen: true, type: 'alert', title: '⚠️ Bloqueo Inminente',
                            message: 'El sistema se bloqueará por seguridad en pocos minutos si no confirmas tu presencia. ¿Sigues ahí?',
                            onConfirm: () => {
                                lastActivity.current = Date.now();
                                warningLevel.current = 0;
                                closeModal();
                            }
                        });
                    } else if (elapsed >= 300000 && warningLevel.current < 1) { // FASE 1: 5 Minutos (Aviso de Inactividad)
                        warningLevel.current = 1;
                        setModalConfig({
                            isOpen: true, type: 'alert', title: 'Inactividad Detectada',
                            message: 'Llevas un tiempo sin interactuar con el entorno. ¿Sigues activo?',
                            onConfirm: () => {
                                lastActivity.current = Date.now();
                                warningLevel.current = 0;
                                closeModal();
                            }
                        });
                    }
                }, 5000); // El vigilante revisa cada 5 segundos

                return () => {
                    events.forEach(e => window.removeEventListener(e, resetTimer));
                    clearInterval(checkInactivity);
                };
            }, [lockState]);

            // Lógica para recuperar la sesión
            const handleUnlock = async () => {
                if (!unlockPwd) return;
                setUnlockLoading(true);
                setUnlockError('');
                
                const role = localStorage.getItem('edubot_role');
                const username = localStorage.getItem('edubot_username');
                
                try {
                    // Re-validamos usando la API existente del backend
                    const res = role === 'teacher' 
                        ? await window.eel.api_login_teacher(username, unlockPwd)()
                        : await window.eel.api_login_student(username, unlockPwd)();
                    
                    if (res.success) {
                        setLockState('active');
                        setUnlockPwd('');
                        lastActivity.current = Date.now();
                        warningLevel.current = 0;
                        
                        setModalConfig({
                            isOpen: true, type: 'alert', title: '¡Sesión Restaurada!',
                            message: 'Has recuperado el acceso exitosamente. ¡Bienvenido de vuelta!',
                            onConfirm: closeModal
                        });
                    } else { setUnlockError('Contraseña incorrecta.'); }
                } catch (e) { setUnlockError('Error de conexión con el servidor.'); }
                
                setUnlockLoading(false);
            };

            // Lógica para cuando otra persona encuentra la PC bloqueada
            const handleLockExit = () => {
                setModalConfig({
                    isOpen: true, type: 'confirm', title: 'Cerrar Sesión',
                    message: '¿Estás seguro de que deseas forzar la salida? Se perderá cualquier progreso que no haya sido guardado previamente por el usuario.',
                    onConfirm: () => {
                        closeModal();
                        localStorage.removeItem('edubot_role');
                        localStorage.removeItem('edubot_username');
                        localStorage.removeItem('edubot_student_name');
                        window.location.reload();
                    },
                    onCancel: closeModal
                });
            };
            // ------------------------------------------------------------------

            const handleNewProject = () => { 
                setInitialData(null); 
                setCurrentName(null); 
                setView('editor'); 
            };

            const handleOpenProject = () => {
                setModalConfig({
                    isOpen: true,
                    type: 'prompt',
                    title: 'Abrir Proyecto',
                    message: 'Escribe el nombre del archivo a cargar:',
                    onConfirm: async (name) => {
                        closeModal();
                        if(!name) return;
                        try { 
                            const data = await window.eel.api_load_project(name)(); 
                            if(data && !data.error) { 
                                setInitialData(data); 
                                setCurrentName(data._found_name || name); 
                                setView('editor'); 
                            } else {
                                setTimeout(() => setModalConfig({
                                   isOpen: true, type: 'alert', title: 'Error', 
                                   message: "Error: " + (data.error || "No se pudo cargar"),
                                   onConfirm: closeModal
                                }), 100);
                            }
                        } catch(e) { console.error(e); }
                    },
                    onCancel: closeModal
                });
            };

            return (
                <>
                    {view === 'welcome' ? (
                        <WelcomeScreen onNew={handleNewProject} onOpen={handleOpenProject} showModal={(config) => setModalConfig({...config, isOpen: true})} closeModal={closeModal} />
                    ) : (
                        <Editor 
                            onBack={() => setView('welcome')} 
                            initialNodes={initialData?.blocks} 
                            initialEdges={initialData?.edges} 
                            currentName={currentName} 
                            setCurrentName={setCurrentName} 
                        />
                    )}
                    
                    {/* OVERLAY DE BLOQUEO DE SESIÓN (Z-Index 150) */}
                    {lockState === 'locked' && (
                        <div className="fixed inset-0 z-[150] flex flex-col items-center justify-center bg-gray-900/95 backdrop-blur-md animate-fade-in">
                            <div className="bg-gray-800 border border-gray-600 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center">
                                <div className="bg-red-500/20 p-4 rounded-full inline-block mb-4">
                                    <AlertTriangle size={48} className="text-red-500" />
                                </div>
                                <h2 className="text-2xl font-bold text-white mb-2">Sesión Pausada</h2>
                                <p className="text-gray-400 text-sm mb-6">Por tu seguridad, el entorno se ha bloqueado por inactividad. Ingresa tu contraseña para continuar.</p>
                                
                                <div className="text-left mb-4">
                                    <label className="block text-xs text-gray-400 mb-1">Usuario en sesión: <span className="text-white font-bold">{localStorage.getItem('edubot_username')}</span></label>
                                    <input 
                                        type="password" 
                                        placeholder="Tu contraseña..." 
                                        className="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-white outline-none focus:border-blue-500"
                                        value={unlockPwd}
                                        onChange={e => setUnlockPwd(e.target.value)}
                                        onKeyDown={e => e.key === 'Enter' && handleUnlock()}
                                        autoFocus
                                    />
                                    {unlockError && <div className="text-red-400 text-xs mt-2 bg-red-900/20 p-2 rounded border border-red-900/50">{unlockError}</div>}
                                </div>
                                
                                <button 
                                    onClick={handleUnlock} 
                                    disabled={unlockLoading}
                                    className={`w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-bold shadow-lg transition-all mb-3 ${unlockLoading ? 'opacity-50 cursor-not-allowed' : ''}`}
                                >
                                    {unlockLoading ? 'Verificando...' : 'Desbloquear Editor'}
                                </button>
                                <button 
                                    onClick={handleLockExit}
                                    className="w-full py-2 bg-transparent hover:bg-gray-700 text-red-400 rounded-lg text-sm font-semibold transition-colors border border-transparent hover:border-red-900/50"
                                >
                                    No soy yo (Forzar Cierre de Sesión)
                                </button>
                            </div>
                        </div>
                    )}
                    <CustomModal {...modalConfig} />
                </>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<Main />);
    </script>
</body>
</html>
