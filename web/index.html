<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBot Forest Studio - Suite Completa</title>
    <script type="text/javascript" src="/eel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/reactflow@11.11.4/dist/style.css" rel="stylesheet" />
    
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?deps=react@18.2.0",
                "reactflow": "https://esm.sh/reactflow@11.11.4?deps=react@18.2.0,react-dom@18.2.0",
                "lucide-react": "https://esm.sh/lucide-react@0.263.1?deps=react@18.2.0",
                "zustand": "https://esm.sh/zustand@4.5.2?deps=react@18.2.0",
                "d3-selection": "https://esm.sh/d3-selection@3.0.0",
                "d3-zoom": "https://esm.sh/d3-zoom@3.0.0"
            }
        }
    </script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #111827; color: #e5e7eb; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .react-flow__node { background: #1f2937; border: 1px solid #374151; border-radius: 8px; color: white; min-width: 180px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .react-flow__node.selected { border-color: #3b82f6; box-shadow: 0 0 0 2px #3b82f6; }
        .forest-node-header { padding: 8px 12px; border-bottom: 1px solid #374151; font-weight: 600; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; border-top-left-radius: 8px; border-top-right-radius: 8px; }
        .forest-node-body { padding: 10px; font-size: 0.8rem; display: flex; flex-direction: column; gap: 6px; }
        .node-input { background-color: #111827; border: 1px solid #374151; color: #d1d5db; padding: 4px 8px; border-radius: 4px; width: 100%; font-size: 0.75rem; outline: none; }
        .node-input:focus { border-color: #3b82f6; }
        .node-label { font-size: 0.7rem; color: #9ca3af; margin-bottom: 2px; display: block; }
        .vscode-terminal { font-family: 'Consolas', 'Monaco', 'Courier New', monospace; background-color: #1e1e1e; color: #cccccc; line-height: 1.4; }
        @keyframes flowPulse { 0% { opacity: 0.2; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.2; transform: scale(1); } }
        .flow-particle { animation: flowPulse 1.5s infinite; }
        .edge-path-active {
            stroke-width: 3;
            filter: drop-shadow(0 0 4px currentColor); /* Efecto Neón */
            animation: dashdraw 1s linear infinite;
            stroke-dasharray: 10;
        }
        .edge-path-error {
            stroke: #f97316 !important; /* Naranja Warning */
            stroke-width: 3;
            stroke-dasharray: 5;
        }
        .edge-path-idle {
            stroke-width: 2;
            opacity: 0.8;
        }
        @keyframes dashdraw {
            from { stroke-dashoffset: 20; }
            to { stroke-dashoffset: 0; }
        }
    </style>
</head>
<body>
    <div id="root" class="h-screen w-screen flex flex-col"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useCallback, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import ReactFlow, { Background, Controls, addEdge, Handle, useNodesState, useEdgesState, ReactFlowProvider } from 'reactflow';
        import { Database, GitBranch, Users, Brain, PlayCircle, Sprout, Cpu, Play, Terminal, Trash2, Save, FolderOpen, Code, Layers, FileJson, ArrowRight, Variable, FunctionSquare, Repeat, Split, XCircle, Keyboard, RefreshCw, Calculator, CheckSquare, ArrowLeft, Activity, Box, Package, AlertTriangle } from 'lucide-react';

        // 1. UTILIDADES Y LÓGICA (REFACTORIZADO: TOPOLOGICAL SORT + SCOPE NESTING)
        const serializeNodesLinear = (nodes, edges, mode) => {
            const nodeMap = new Map(nodes.map(n => [n.id, { ...n }]));
            
            // --- ORDENAMIENTO TOPOLÓGICO ---
            const adjacency = new Map(); 
            const inDegree = new Map();
            
            nodes.forEach(n => {
                adjacency.set(n.id, []);
                inDegree.set(n.id, 0);
            });

            edges.forEach(edge => {
                if (nodeMap.has(edge.source) && nodeMap.has(edge.target)) {
                    adjacency.get(edge.source).push(edge.target);
                    inDegree.set(edge.target, (inDegree.get(edge.target) || 0) + 1);
                }
            });

            const queue = [];
            nodes.forEach(n => { if (inDegree.get(n.id) === 0) queue.push(n); });
            queue.sort((a, b) => a.position.y - b.position.y); // Desempate visual

            const sortedIds = []; // Usaremos IDs para referencia rápida
            while (queue.length > 0) {
                const node = queue.shift();
                sortedIds.push(node.id);
                
                const neighbors = adjacency.get(node.id)
                    .map(id => nodeMap.get(id))
                    .sort((a, b) => a.position.y - b.position.y); // Flujo visual vertical

                neighbors.forEach(neighbor => {
                    inDegree.set(neighbor.id, inDegree.get(neighbor.id) - 1);
                    if (inDegree.get(neighbor.id) === 0) queue.push(neighbor);
                });
            }

            // Agregar nodos cíclicos o sueltos al final si faltaron
            if (sortedIds.length !== nodes.length) {
                nodes.forEach(n => { if (!sortedIds.includes(n.id)) sortedIds.push(n.id); });
            }

            // --- DETECCIÓN DE SCOPE ---
            // Definimos qué tipos de nodos crean un nuevo nivel de indentación
            const CONTAINER_TYPES = ['py_class', 'py_func', 'py_if', 'py_loop', 'py_while', 'py_try'];
            
            // Mapa para saber quién es el padre (Container) de cada nodo
            const parentMap = new Map(); // NodeID -> ParentID (null es root)
            
            // Recorremos el grafo usando BFS para propagar el Scope
            const scopeQueue = [];
            
            // Iniciamos con los nodos raíz del grafo visual
            nodes.forEach(n => {
                // Un nodo es raíz visual si no tiene inputs O si sus inputs no son contenedores directos visuales
                // Simplificación: Analizar conexiones salientes de Contenedores
                if(CONTAINER_TYPES.includes(n.type)) {
                    // Si soy contenedor, mis hijos pertenecen a mi scope (a menos que ya tengan uno asignado más cercano)
                }
            });

            // Propagación de Scope Dominante
            // 1. Inicializar todos en scope 'root'
            sortedIds.forEach(id => parentMap.set(id, null));

            // 2. Propagar scopes. Iteramos en orden topológico para asegurar que procesamos padres antes que hijos.
            sortedIds.forEach(currentId => {
                const currentNode = nodeMap.get(currentId);
                const currentScope = parentMap.get(currentId); // El scope donde vive este nodo

                // Si este nodo es un contenedor, define un NUEVO scope para sus hijos
                // Si NO es contenedor, sus hijos heredan el scope actual
                const effectiveScopeForChildren = CONTAINER_TYPES.includes(currentNode.type) ? currentId : currentScope;

                // Buscar hijos directos (Conexiones salientes)
                const childrenIds = adjacency.get(currentId);
                childrenIds.forEach(childId => {
                    // Solo asignamos padre si aún no tiene (o para resolver conflictos de rutas múltiples,
                    // priorizamos el contenedor inmediato. Por simplicidad de árbol: First wins o Topology logic).
                    // En un flujo tipo "Bosque", el padre es el nodo del que cuelgas.
                    
                    // Regla: Si el nodo actual es un contenedor, CAPTURA al hijo.
                    // Si el nodo actual es de paso (ej. variable), PASA el scope que tenía.
                    
                    // Verificamos si ya tiene un padre asignado. 
                    // Si ya tiene padre, hay convergencia. En Python visual simple, mantenemos el primer padre lógico.
                    if (parentMap.get(childId) === null) {
                        parentMap.set(childId, effectiveScopeForChildren);
                    }
                });
            });

            // --- CONSTRUCCIÓN DEL ÁRBOL ---
            const blocksByScope = new Map(); // ScopeID -> [BlockList]
            blocksByScope.set(null, []); // Root scope

            // Crear la estructura de bloques base
            const rawBlocks = new Map();
            
            sortedIds.forEach(id => {
                const node = nodeMap.get(id);
                // Lógica de mapeo de datos original...
                let block = { ...node.data, type: node.type, id: node.id }; // Guardamos ID para debug

                // --- INYECCIÓN DE DATOS INTELIGENTE (Input/Math/Print) ---
                const getConnectedInputs = (targetId) => {
                    return edges.filter(e => e.target === targetId).map(e => {
                        const src = nodeMap.get(e.source);
                        return src?.data?.var_name || src?.data?.target || null;
                    }).filter(Boolean);
                };
                
                if (mode === 'python') {
                    const inputs = getConnectedInputs(id);
                    if (node.type === 'py_math' || node.type === 'py_compare') {
                        if (!block.left && inputs.length > 0) block.left = inputs[0];
                        if (!block.right && inputs.length > 1) block.right = inputs[1];
                    }
                    if (node.type === 'py_print' && inputs.length > 0 && !block.content) {
                        block.content = inputs[0];
                    }
                }
                // Mapeo ML
                if (mode === 'ml') {
                    // CASO 1: Dataset -> Entrenamiento
                    if (node.type.includes('train')) {
                        const dsEdge = edges.find(e => e.target === node.id);
                        if (dsEdge) {
                            const dsNode = nodeMap.get(dsEdge.source);
                            // CORRECCIÓN CRÍTICA: " || 'data' " evita que se envíe vacío/undefined
                            if (dsNode) block.dataset = dsNode.data.name || 'data';
                        }
                    }

                    // CASO 2: Entrenamiento -> Predicción 
                    if (node.type === 'ml_predict') {
                        const modelEdge = edges.find(e => e.target === node.id);
                        if (modelEdge) {
                            const modelNode = nodeMap.get(modelEdge.source);
                            // CORRECCIÓN CRÍTICA: " || 'model' " evita error de nombre
                            if (modelNode) block.model = modelNode.data.model_name || 'model';
                        }
                    }
                }

                // Inicializar array de cuerpo para contenedores
                if (CONTAINER_TYPES.includes(node.type)) {
                    block.body = [];
                }

                rawBlocks.set(id, block);

                // ASIGNAR AL GRUPO CORRECTO
                const parentId = parentMap.get(id);
                
                // Si el padre no existe (caso raro de desconexión), mandar a root
                const safeParentId = rawBlocks.has(parentId) ? parentId : null;
                
                if (!blocksByScope.has(safeParentId)) {
                    blocksByScope.set(safeParentId, []);
                }
                blocksByScope.get(safeParentId).push(block);
            });

            // --- ENSAMBLAJE RECURSIVO ---
            // Ahora movemos los bloques de los mapas temporales a los arrays 'body' de sus padres
            // Como iteramos por IDs, necesitamos inyectar las listas.
            
            // Las listas en blocksByScope ya están ordenadas topológicamente porque sortedIds lo estaba.
            
            // Iteramos sobre todos los scopes (excepto null) y los metemos en su padre
            blocksByScope.forEach((children, scopeId) => {
                if (scopeId !== null) {
                    const parentBlock = rawBlocks.get(scopeId);
                    if (parentBlock) {
                        parentBlock.body = children;
                    }
                }
            });

            // Retornamos solo los bloques del nivel raíz (null)
            // Ya que los hijos están anidados dentro de los padres recursivamente.
            return blocksByScope.get(null);
        };

        // 2. COMPONENTES UI
        
        // --- COMPONENTE ESPECIAL PARA DATASET ---
        // Este bloque va suelto, antes de definir nodeTypes
        const DatasetNode = ({ data, id }) => {
            const [files, setFiles] = useState([]);

            // Efecto: Cuando el usuario elige 'csv', pedimos la lista a Python
            useEffect(() => {
                if (data.source === 'csv') {
                    const fetchFiles = async () => {
                        if (window.eel) {
                            try {
                                // LLAMADA AL PUENTE (main.py)
                                const res = await window.eel.api_file_list()();
                                if (res && res.datasets) {
                                    setFiles(res.datasets);
                                }
                            } catch (e) {
                                console.error("Error cargando archivos:", e);
                            }
                        }
                    };
                    fetchFiles();
                }
            }, [data.source]);

            return (
                <BaseNode title="Dataset" icon={Database} color="bg-blue-600">
                    <div>
                        <label className="node-label">Nombre interno</label>
                        <input name="name" className="node-input nodrag" value={data.name||'data'} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} />
                    </div>
                    <div className="mt-1">
                        <label className="node-label">Fuente</label>
                        <select name="source" className="node-input nodrag" value={data.source||'inline'} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})}>
                            <option value="inline">Manual (Inline)</option>
                            <option value="csv">Archivo CSV/JSON</option>
                        </select>
                    </div>
                    
                    {/* DROP-DOWN DINÁMICO */}
                    {data.source === 'csv' && (
                        <div className="mt-1 animate-fade-in">
                            <label className="node-label text-blue-300">Seleccionar Archivo</label>
                            <select 
                                name="path" 
                                className="node-input nodrag border-blue-500" 
                                value={data.path || ''} 
                                onChange={e => data.onChange(id, { ...data, path: e.target.value })}
                            >
                                <option value="">-- Elige un archivo --</option>
                                {files.length === 0 && <option disabled>Buscando en /datasets...</option>}
                                {files.map(f => (
                                    <option key={f} value={f}>{f}</option>
                                ))}
                            </select>
                        </div>
                    )}
                </BaseNode>
            );
        };

        const SimulationView = ({ active, status }) => {
            const [step, setStep] = useState(0);
            useEffect(() => { if (!active || status === 'error') return; const i = setInterval(() => setStep(s => (s + 1) % 5), 600); return () => clearInterval(i); }, [active, status]);
            const c = status === 'error' ? 'text-red-500' : active ? 'text-green-400' : 'text-gray-600';
            const bg = status === 'error' ? 'bg-red-900/50 border-red-500' : active ? 'bg-green-900/50 border-green-500' : 'bg-gray-800 border-gray-600';
            return (
                <div className="flex flex-col items-center justify-center h-full bg-[#111827] relative overflow-hidden">
                    <div className="absolute inset-0 opacity-5" style={{backgroundImage: 'radial-gradient(#4ade80 1px, transparent 1px)', backgroundSize: '30px 30px'}}></div>
                    <h2 className={`text-xl font-mono mb-8 flex items-center gap-3 ${c}`}><Activity className={active ? "animate-pulse" : ""} />{status === 'error' ? 'ERROR' : active ? 'SIMULACIÓN: ACTIVA' : 'INACTIVO'}</h2>
                    <div className="flex items-center gap-16 relative">
                        <div className="flex flex-col gap-4">{[0,1,2].map(i => <div key={i} className={`w-12 h-12 rounded-full border-2 flex items-center justify-center transition-all duration-300 ${bg} ${step === 0 && active ? 'scale-110 shadow-[0_0_15px_currentColor]' : ''}`}><span className="text-[10px] font-bold">X{i}</span></div>)}</div>
                        <div className={`w-24 h-24 rounded-xl border-2 flex items-center justify-center z-10 transition-all duration-300 ${bg} ${step === 2 && active ? 'scale-110 rotate-3 shadow-[0_0_20px_currentColor]' : ''}`}><Brain size={40} className={active ? "animate-pulse" : "opacity-50"} /></div>
                        <div className={`w-16 h-16 rounded-full border-2 flex items-center justify-center z-10 transition-all duration-300 ${bg} ${step === 4 && active ? 'scale-125 shadow-[0_0_25px_currentColor]' : ''}`}><span className="text-xs font-bold">Y_PRED</span></div>
                    </div>
                </div>
            );
        };

        const TerminalLog = ({ logs }) => {
            const endRef = useRef(null);
            useEffect(() => endRef.current?.scrollIntoView({ behavior: "smooth" }), [logs]);
            return (
                <div className="vscode-terminal p-3 h-full overflow-y-auto text-sm">
                    {logs.map((log, i) => {
                        let cl = 'text-gray-400';
                        if (log.type === 'error') cl = 'text-red-400'; else if (log.type === 'warn') cl = 'text-yellow-400'; else if (log.type === 'success') cl = 'text-green-400'; else if (log.type === 'output') cl = 'text-white';
                        return <div key={i} className={`whitespace-pre-wrap break-words mb-0.5 ${cl}`}>{log.type !== 'output' && <span className="opacity-50 text-xs mr-2 select-none">[{log.time}]</span>}<span>{log.msg}</span></div>;
                    })}
                    <div ref={endRef} />
                </div>
            );
        };

        const SidebarBtn = ({ label, icon: Icon, color, nodeType, onDragStart }) => (
            <div 
                className="w-full text-left p-2 hover:bg-gray-800 rounded-md flex items-center gap-3 text-sm transition-colors group cursor-grab active:cursor-grabbing" 
                draggable 
                onDragStart={(e) => onDragStart(e, nodeType, label)}
            >
                <Icon size={16} className={`${color} group-hover:scale-110 transition-transform`} /><span className="text-gray-300 group-hover:text-white">{label}</span>
            </div>
        );

        const BaseNode = ({ data, title, icon: Icon, color, children }) => (
            <div>
                <div className={`forest-node-header ${color} text-white`}>
                    <Icon size={16} />
                    <span>{title}</span>
                </div>
                <div className="forest-node-body">{children}</div>
                <Handle type="target" position="left" className="!bg-gray-400 !w-3 !h-3 hover:!bg-white" />
                <Handle type="source" position="right" className="!bg-blue-500 !w-3 !h-3 hover:!bg-white" />
            </div>
        );

        // 3. DEFINICIÓN DE NODOS
        const nodeTypes = {
            ml_dataset: DatasetNode, // Usamos el componente corregido
            ml_train_dt: ({ data, id }) => <BaseNode title="Decision Tree" icon={GitBranch} color="bg-emerald-600"><input name="model_name" placeholder="model" className="node-input nodrag" value={data.model_name||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><div className="flex gap-2 mt-1"><div><label className="node-label">Depth</label><input name="max_depth" type="number" className="node-input nodrag" value={data.max_depth||5} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div><div><label className="node-label">MinLeaf</label><input name="min_size" type="number" className="node-input nodrag" value={data.min_size||1} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div></div></BaseNode>,
            ml_train_rf: ({ data, id }) => <BaseNode title="Random Forest" icon={Layers} color="bg-emerald-700"><input name="model_name" placeholder="model" className="node-input nodrag" value={data.model_name||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><div className="flex gap-2 mt-1"><div><label className="node-label">Trees</label><input name="n_trees" type="number" className="node-input nodrag" value={data.n_trees||10} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div><div><label className="node-label">Depth</label><input name="max_depth" type="number" className="node-input nodrag" value={data.max_depth||5} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div></div></BaseNode>,
            // 1. NEURAL NET (Con opción de escalado)
            ml_train_nn: ({ data, id }) => (
                <BaseNode title="Neural Net" icon={Brain} color="bg-indigo-600">
                    <input name="model_name" placeholder="model" className="node-input nodrag" value={data.model_name||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} />
                    <div className="grid grid-cols-2 gap-1 mt-1">
                        <div><label className="node-label">Hidden</label><input name="hidden_size" type="number" className="node-input nodrag" value={data.hidden_size||4} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div>
                        <div><label className="node-label">Epochs</label><input name="epochs" type="number" className="node-input nodrag" value={data.epochs||1000} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div>
                        <div><label className="node-label">LR</label><input name="lr" type="number" step="0.01" className="node-input nodrag" value={data.lr||0.1} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div>
                        <div><label className="node-label">Inputs</label><input name="n_inputs" type="number" className="node-input nodrag" value={data.n_inputs||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div>
                    </div>
                    {/* NUEVO CAMPO: ESCALADO */}
                    <div className="mt-1 border-t border-indigo-500/30 pt-1">
                        <label className="node-label text-indigo-200">Preprocesamiento</label>
                        <select name="scaling" className="node-input nodrag text-xs" value={data.scaling||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})}>
                            <option value="">Sin Escalado (Raw)</option>
                            <option value="standard">Standard (Z-Score)</option>
                        </select>
                    </div>
                </BaseNode>
            ),

            // 2. SVM (Con opción de escalado - CRÍTICO para SVM)
            ml_train_svm: ({ data, id }) => (
                <BaseNode title="SVM" icon={Split} color="bg-pink-600">
                    <input name="model_name" placeholder="model" className="node-input nodrag" value={data.model_name||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} />
                    <div className="flex gap-2 mt-1">
                        <div><label className="node-label">Iter</label><input name="n_iters" type="number" className="node-input nodrag" value={data.n_iters||1000} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div>
                        <div><label className="node-label">LR</label><input name="learning_rate" type="number" step="0.001" className="node-input nodrag" value={data.learning_rate||0.001} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div>
                    </div>
                    <div className="mt-1">
                        <select name="scaling" className="node-input nodrag text-xs" value={data.scaling||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})}>
                            <option value="">No Scale</option>
                            <option value="standard">StandardScaler</option>
                        </select>
                    </div>
                </BaseNode>
            ),

            // 3. LINEAR REGRESSION
            ml_train_linear: ({ data, id }) => (
                <BaseNode title="Linear Reg" icon={ArrowRight} color="bg-cyan-600">
                    <input name="model_name" placeholder="model" className="node-input nodrag" value={data.model_name||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} />
                    <div className="flex gap-2 mt-1">
                        <div><label className="node-label">Epochs</label><input name="epochs" type="number" className="node-input nodrag" value={data.epochs||1000} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div>
                        <div><label className="node-label">LR</label><input name="learning_rate" type="number" step="0.01" className="node-input nodrag" value={data.learning_rate||0.01} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div>
                    </div>
                    <div className="mt-1">
                        <select name="scaling" className="node-input nodrag text-xs" value={data.scaling||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})}>
                            <option value="">No Scale</option>
                            <option value="standard">StandardScaler</option>
                        </select>
                    </div>
                </BaseNode>
            ),

            // 4. KNN (Opcional, pero útil)
            ml_train_knn: ({ data, id }) => (
                <BaseNode title="KNN" icon={Users} color="bg-purple-600">
                    <input name="model_name" placeholder="model" className="node-input nodrag" value={data.model_name||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} />
                    <div className="mt-1">
                        <label className="node-label">K</label>
                        <input name="k" type="number" className="node-input nodrag" value={data.k||3} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} />
                    </div>
                    <select name="task" className="node-input nodrag mt-1" value={data.task||'classification'} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})}>
                        <option value="classification">Clasificación</option>
                        <option value="regression">Regresión</option>
                    </select>
                    <div className="mt-1">
                        <select name="scaling" className="node-input nodrag text-xs" value={data.scaling||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})}>
                            <option value="">No Scale</option>
                            <option value="standard">StandardScaler</option>
                        </select>
                    </div>
                </BaseNode>
            ),
            ml_predict: ({ data, id }) => <BaseNode title="Ejecutar" icon={PlayCircle} color="bg-red-600"><select name="action_type" className="node-input nodrag mb-2" value={data.action_type||'predict'} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})}><option value="predict">Predict</option><option value="eval">Eval</option></select>{data.action_type==='predict'&&<div><label className="node-label">X</label><input name="X" placeholder="[[1,2]]" className="node-input nodrag" value={data.X||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div>}</BaseNode>,
            
            py_var: ({ data, id }) => <BaseNode title="Variable" icon={Variable} color="bg-yellow-600"><div className="flex gap-2 items-center"><input name="var_name" placeholder="x" className="node-input nodrag w-1/3" value={data.var_name||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><span className="font-bold">=</span><input name="value" placeholder="10" className="node-input nodrag" value={data.value||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div></BaseNode>,
            py_print: ({ data, id }) => <BaseNode title="Print" icon={Terminal} color="bg-gray-600"><input name="content" placeholder="msg" className="node-input nodrag" value={data.content||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></BaseNode>,
            py_if: ({ data, id }) => <BaseNode title="If" icon={Split} color="bg-orange-600"><input name="condition" placeholder="x > 5" className="node-input nodrag" value={data.condition||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><div className="text-[10px] text-gray-300 mt-1">Conectar a derecha</div></BaseNode>,
            py_loop: ({ data, id }) => <BaseNode title="For" icon={Repeat} color="bg-orange-700"><div className="flex gap-1 items-center mb-1"><span>for</span><input name="iterator" className="node-input nodrag w-8 p-0 text-center" value={data.iterator||'i'} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><span>in</span></div><input name="iterable" placeholder="range(10)" className="node-input nodrag" value={data.iterable||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></BaseNode>,
            py_while: ({ data, id }) => <BaseNode title="While" icon={RefreshCw} color="bg-orange-800"><input name="condition" placeholder="cond" className="node-input nodrag" value={data.condition||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></BaseNode>,
            py_math: ({ data, id }) => <BaseNode title="Math" icon={Calculator} color="bg-teal-600"><div className="flex gap-1"><input name="left" className="node-input nodrag w-1/3" value={data.left||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><select name="op" className="node-input nodrag w-1/4 p-0 text-center" value={data.op||'+'} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})}><option>+</option><option>-</option><option>*</option><option>/</option></select><input name="right" className="node-input nodrag w-1/3" value={data.right||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div><div className="mt-1 flex items-center gap-1"><span className="text-xs">Save:</span><input name="target" placeholder="res" className="node-input nodrag" value={data.target||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div></BaseNode>,
            py_compare: ({ data, id }) => <BaseNode title="Compare" icon={CheckSquare} color="bg-cyan-700"><div className="flex gap-1"><input name="left" className="node-input nodrag w-1/3" value={data.left||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><select name="op" className="node-input nodrag w-1/4 p-0 text-center" value={data.op||'=='} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})}><option>==</option><option>&gt;</option><option>&lt;</option></select><input name="right" className="node-input nodrag w-1/3" value={data.right||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div></BaseNode>,
            py_func: ({ data, id }) => <BaseNode title="Function" icon={FunctionSquare} color="bg-violet-600"><input name="func_name" placeholder="name" className="node-input nodrag mb-1" value={data.func_name||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><input name="args" placeholder="args" className="node-input nodrag" value={data.args||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></BaseNode>,
            py_return: ({ data, id }) => <BaseNode title="Return" icon={ArrowLeft} color="bg-rose-600"><input name="value" placeholder="val" className="node-input nodrag" value={data.value||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></BaseNode>,
            py_control: ({ data, id }) => <BaseNode title="Control" icon={XCircle} color="bg-red-800"><select name="type" className="node-input nodrag" value={data.type||'break'} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})}><option value="break">Break</option><option value="continue">Continue</option><option value="pass">Pass</option></select></BaseNode>,
            py_input: ({ data, id }) => <BaseNode title="Input" icon={Keyboard} color="bg-slate-600"><input name="prompt" placeholder="msg" className="node-input nodrag mb-1" value={data.prompt||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><input name="target" placeholder="var" className="node-input nodrag" value={data.target||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></BaseNode>,
            py_class: ({ data, id }) => <BaseNode title="Class" icon={Box} color="bg-indigo-700"><input name="name" placeholder="Name" className="node-input nodrag mb-1" value={data.name||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><input name="bases" placeholder="Inherits" className="node-input nodrag" value={data.bases||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></BaseNode>,
            py_import: ({ data, id }) => <BaseNode title="Import" icon={Package} color="bg-sky-700"><div className="flex gap-1 mb-1"><span className="text-xs">from</span><input name="from" className="node-input nodrag" value={data.from||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div><div className="flex gap-1"><span className="text-xs">import</span><input name="names" className="node-input nodrag" value={data.names||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div></BaseNode>,
            py_try: ({ data, id }) => <BaseNode title="Try/Except" icon={AlertTriangle} color="bg-amber-600"><div className="text-xs text-gray-300">Errors handled below</div></BaseNode>
        };

        // --- 4. PANTALLAS DE LA APP ---
        const WelcomeScreen = ({ onNew, onOpen }) => (
            <div className="h-full flex flex-col items-center justify-center bg-gray-900 text-white relative overflow-hidden">
                <div className="absolute inset-0 opacity-10 pointer-events-none">
                    <div className="absolute top-0 left-0 w-64 h-64 bg-green-500 rounded-full mix-blend-multiply filter blur-3xl animate-blob"></div>
                    <div className="absolute top-0 right-0 w-64 h-64 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl animate-blob animation-delay-2000"></div>
                    <div className="absolute bottom-0 left-20 w-64 h-64 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl animate-blob animation-delay-4000"></div>
                </div>
                <div className="z-10 text-center space-y-8 p-8 bg-gray-800/50 backdrop-blur-md rounded-2xl border border-gray-700 shadow-2xl max-w-lg w-full">
                    <div className="flex justify-center mb-4"><div className="bg-green-500 p-4 rounded-full shadow-lg shadow-green-500/20"><Sprout size={48} className="text-white" /></div></div>
                    <div><h1 className="text-4xl font-bold bg-gradient-to-r from-green-400 to-blue-500 bg-clip-text text-transparent">EduBot Forest Studio</h1><p className="text-gray-400 mt-2">v1.0 Stable • Python • Machine Learning • TinyML</p></div>
                    <div className="space-y-3">
                        <button onClick={() => onNew('ml')} className="w-full flex items-center justify-center gap-3 p-4 bg-gray-700 hover:bg-gray-600 rounded-xl transition-all border border-gray-600 hover:border-gray-500 group"><FileJson className="text-blue-400 group-hover:scale-110 transition-transform" /><div className="text-left"><div className="font-semibold">Nuevo Proyecto ML</div><div className="text-xs text-gray-400">Crear modelos de IA visualmente</div></div></button>
                        <button onClick={() => onNew('python')} className="w-full flex items-center justify-center gap-3 p-4 bg-gray-700 hover:bg-gray-600 rounded-xl transition-all border border-gray-600 hover:border-gray-500 group"><Code className="text-yellow-400 group-hover:scale-110 transition-transform" /><div className="text-left"><div className="font-semibold">Fundamentos Python</div><div className="text-xs text-gray-400">Aprender lógica de programación</div></div></button>
                        <button onClick={onOpen} className="w-full flex items-center justify-center gap-3 p-4 bg-gray-700 hover:bg-gray-600 rounded-xl transition-all border border-gray-600 hover:border-gray-500 group"><FolderOpen className="text-purple-400 group-hover:scale-110 transition-transform" /><div className="text-left"><div className="font-semibold">Abrir Proyecto</div><div className="text-xs text-gray-400">Cargar archivo .edubotproj</div></div></button>
                    </div>
                </div>
            </div>
        );

        import { getBezierPath, BaseEdge, useStore } from 'reactflow';

        // A. MAPA DE COLORES
        const NODE_COLORS = {
            // ML Nodes
            ml_dataset: '#2563eb',   // blue-600
            ml_train_dt: '#059669',  // emerald-600
            ml_train_rf: '#047857',  // emerald-700
            ml_train_knn: '#9333ea', // purple-600
            ml_train_svm: '#db2777', // pink-600
            ml_train_linear: '#0891b2', // cyan-600
            ml_train_nn: '#4f46e5',  // indigo-600
            ml_predict: '#dc2626',   // red-600
            // Python Nodes
            py_var: '#ca8a04',       // yellow-600
            py_print: '#4b5563',     // gray-600
            py_if: '#ea580c',        // orange-600
            py_loop: '#c2410c',      // orange-700
            py_math: '#0d9488',      // teal-600
            py_func: '#7c3aed',      // violet-600
            // Default
            default: '#6b7280'
        };

        // B. COMPONENTE DE CONEXIÓN INTELIGENTE
        const SmartEdge = ({ id, source, target, sourceX, sourceY, targetX, targetY, sourcePosition, targetPosition, style = {}, markerEnd, data }) => {
            // Obtener nodos internos para saber sus tipos
            const sourceNode = useStore(s => s.nodeInternals.get(source));
            const targetNode = useStore(s => s.nodeInternals.get(target));

            const [edgePath] = getBezierPath({ sourceX, sourceY, sourcePosition, targetX, targetY, targetPosition });

            // Determinar estado (idle, active, error)
            const status = data?.status || 'idle'; // 'idle' | 'active' | 'error'

            // Resolver Colores
            const colorSrc = NODE_COLORS[sourceNode?.type] || NODE_COLORS.default;
            const colorTgt = NODE_COLORS[targetNode?.type] || NODE_COLORS.default;
            
            // Definir estilo dinámico
            let edgeStyle = { ...style };
            let gradientId = `grad-${id}`;

            // Lógica de visualización
            if (status === 'error') {
                // Caso Error: Naranja sólido
                edgeStyle.stroke = '#f97316'; 
            } else if (status === 'active') {
                // Caso Flujo Activo: Gradiente brillante + Animación CSS
                edgeStyle.stroke = `url(#${gradientId})`;
            } else {
                // Caso Idle (Gris/Apagado o Gradiente suave)
                edgeStyle.stroke = '#4b5563'; 
                edgeStyle.opacity = 0.5;
            }

            return (
                <>
                    <defs>
                        <linearGradient id={gradientId} x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stopColor={colorSrc} />
                            <stop offset="100%" stopColor={colorTgt} />
                        </linearGradient>
                    </defs>
                    <BaseEdge 
                        path={edgePath} 
                        markerEnd={markerEnd} 
                        style={edgeStyle} 
                        className={status === 'active' ? 'edge-path-active' : status === 'error' ? 'edge-path-error' : 'edge-path-idle'}
                    />
                </>
            );
        };
        
        // C. REGISTRO DE TIPO
        const edgeTypes = {
            smart: SmartEdge,
        };

        const EditorContent = ({ mode, onBack, initialNodes, initialEdges }) => {
            const [nodes, setNodes, onNodesChange] = useNodesState(initialNodes || []);
            const [edges, setEdges, onEdgesChange] = useEdgesState(initialEdges || []);
            const [reactFlowInstance, setReactFlowInstance] = useState(null);
            const [logs, setLogs] = useState([{ time: new Date().toLocaleTimeString(), msg: `Modo: ${mode === 'ml' ? 'Machine Learning' : 'Python Fundamentals'}`, type: 'info' }]);
            const [activeTab, setActiveTab] = useState('forest'); 
            const [pythonCode, setPythonCode] = useState("# El código generado aparecerá aquí...");
            const [memoryStats, setMemoryStats] = useState(null);
            const [simulationStatus, setSimulationStatus] = useState({ active: false, status: 'idle' });
            const reactFlowWrapper = useRef(null);

            const addLog = (msg, type = 'info') => setLogs(p => [...p, { time: new Date().toLocaleTimeString(), msg, type }]);
            
            const onConnect = useCallback((params) => {
                setEdges((eds) => addEdge({ ...params, type: 'smart', animated: false, data: { status: 'idle' } }, eds));
            }, [setEdges]);
            
            const onNodeDataChange = (id, newData) => {
                setNodes((nds) => nds.map((node) => node.id === id ? { ...node, data: newData } : node));
            };

            const onDragOver = useCallback((event) => { event.preventDefault(); event.dataTransfer.dropEffect = 'move'; }, []);
            
            const onDrop = useCallback((event) => {
                event.preventDefault();
                const type = event.dataTransfer.getData('application/reactflow/type');
                const label = event.dataTransfer.getData('application/reactflow/label');
                if (!type || !reactFlowInstance) return;
                const position = reactFlowInstance.screenToFlowPosition({ x: event.clientX, y: event.clientY });
                const newNode = { id: `${type}_${Date.now()}`, type, position, data: { label, onChange: onNodeDataChange, model_name: `m_${Math.floor(Math.random()*100)}` } };
                setNodes((nds) => nds.concat(newNode));
                addLog(`Nodo: ${label}`);
            }, [reactFlowInstance]);

            // Callback para el SidebarBtn
            const onDragStart = (event, nodeType, label) => {
                event.dataTransfer.setData('application/reactflow/type', nodeType);
                event.dataTransfer.setData('application/reactflow/label', label);
                event.dataTransfer.effectAllowed = 'move';
            };

            const deleteSelected = () => {
                const selected = nodes.filter(n => n.selected);
                if (!selected.length) return;
                setNodes(nds => nds.filter(n => !n.selected));
                setEdges(eds => eds.filter(e => !selected.some(n => n.id === e.source || n.id === e.target)));
                addLog(`Eliminados ${selected.length} nodos`, 'warn');
            };

            const translateToCode = async () => {
                const blocks = serializeNodesLinear(nodes, edges, mode);
                try {
                    if(window.eel) {
                        const res = await window.eel.api_translate("to_python", blocks)();
                        if (res.result) { setPythonCode(res.result); addLog("Traducción OK", 'success'); }
                        else addLog(`Error: ${res.error}`, 'error');
                    }
                } catch (e) { addLog(`Error: ${e}`, 'error'); }
            };

            const runPipeline = async () => {
                addLog("Ejecutando...", 'warn');
                
                // Efecto Visual: Poner conexiones en modo "Activo" (Simulación de flujo)
                setEdges(eds => eds.map(e => ({ ...e, data: { status: 'active' } })));

                const blocks = serializeNodesLinear(nodes, edges, mode);
                try {
                    if (window.eel) {
                        const res = await window.eel.api_execute(blocks)();
                        if (res.success) {
                            addLog("Finalizado.", 'success');
                            if (mode === 'ml') setSimulationStatus({ active: true, status: 'success' });
                            
                            // LOGS DE SALIDA
                            if(res.results) res.results.forEach(r => {
                                if(r.result?.status === 'predicted') addLog(`Salida: ${JSON.stringify(r.result.preds)}`, 'success');
                                if(r.result?.status === 'evaluated') addLog(`Métricas: ${JSON.stringify(r.result.result)}`, 'info');
                            });
                            if(res.output) addLog(res.output, 'output');

                            // Éxito: Volver a estado normal.
                            // Aquí las dejamos "activas" un momento y luego idle, o las dejamos idle directo.
                            // Para efecto pedagógico, se deja en gradiente suave tras éxito.
                            setTimeout(() => {
                                setEdges(eds => eds.map(e => ({ ...e, data: { status: 'active' } }))); // Mantener bonito o cambiar a 'idle'
                            }, 500);

                        } else {
                            if (mode === 'ml') setSimulationStatus({ active: false, status: 'error' });
                            addLog(`Error: ${res.error}`, 'error');
                            
                            // Error: Poner conexiones en Naranja
                            setEdges(eds => eds.map(e => ({ ...e, data: { status: 'error' } })));
                        }
                    }
                } catch (e) { 
                    addLog(`Error: ${e}`, 'error');
                    setEdges(eds => eds.map(e => ({ ...e, data: { status: 'error' } })));
                }
            };

            const exportToC = async () => {
                // Buscar el nodo de entrenamiento
                const mn = nodes.find(n => n.type.includes('ml_train'));
                
                if(!mn) { 
                    addLog("Error: No hay ningún modelo de entrenamiento en el bosque.", 'error'); 
                    return; 
                }
                
                const modelName = mn.data.model_name;
                if(!modelName) {
                    addLog("Error: El modelo no tiene nombre definido.", 'error');
                    return;
                }

                addLog(`⚙️ Generando código C para '${modelName}'...`, 'info');

                // Llamada al Backend
                if(window.eel) {
                    try {
                        const res = await window.eel.api_export_c_model(modelName)();
                        
                        if(res.success) {
                            addLog(`✅ ¡ÉXITO! Archivo guardado en:`, 'success');
                            addLog(res.path, 'output'); // Muestra la ruta en blanco brillante
                            alert(`Código exportado correctamente en:\n${res.path}`);
                        } else {
                            addLog(`❌ Falló la exportación: ${res.error}`, 'error');
                        }
                    } catch(e) {
                        addLog(`Error de comunicación con Python: ${e}`, 'error');
                    }
                } else {
                    addLog("Error: Backend Eel no detectado.", 'error');
                }
            };

            const checkMemory = async () => {
                const mn = nodes.find(n => n.type.includes('train'));
                if (!mn) { addLog("Sin modelos", 'warn'); return; }
                try {
                    const res = await window.eel.api_estimate_memory_desktop(mn.data.model_name)();
                    if(res.error) addLog(res.error, 'error');
                    else { setMemoryStats(res); addLog(`Flash: ${res.flash_percent}%`, 'success'); }
                } catch(e) { addLog(e, 'error'); }
            };

            const saveProject = async () => {
                const name = prompt("Nombre:"); if(!name) return;
                const data = { blocks: nodes.map(n=>({...n, type:n.type})), edges, mode };
                try { await window.eel.api_save_project(data, name)(); addLog("Guardado", 'success'); } catch(e) { addLog(e, 'error'); }
            };

            return (
                <div className="flex h-full flex-col">
                    <div className="h-14 bg-gray-900 border-b border-gray-700 flex items-center px-4 justify-between shrink-0">
                        <div className="flex items-center gap-4">
                            <button onClick={onBack} className="text-gray-400 hover:text-white flex items-center gap-1 text-sm font-bold"><ArrowLeft size={16}/> Inicio</button>
                            <div className="h-6 w-px bg-gray-700"></div>
                            <div className="flex bg-gray-800 rounded p-1">
                                <button onClick={() => setActiveTab('forest')} className={`px-3 py-1 rounded text-xs font-medium ${activeTab==='forest'?'bg-gray-600 text-white':'text-gray-400'}`}>Bosque</button>
                                {mode==='ml' && <button onClick={() => setActiveTab('simulation')} className={`px-3 py-1 rounded text-xs font-medium ${activeTab==='simulation'?'bg-gray-600 text-white':'text-gray-400'}`}>Simulación</button>}
                                <button onClick={() => { setActiveTab('code'); translateToCode(); }} className={`px-3 py-1 rounded text-xs font-medium ${activeTab==='code'?'bg-gray-600 text-white':'text-gray-400'}`}>Python</button>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={deleteSelected} className="p-2 rounded hover:bg-red-900/30 text-red-400"><Trash2 size={18}/></button>
                            <button onClick={saveProject} className="p-2 rounded hover:bg-blue-900/30 text-blue-400"><Save size={18}/></button>
                            <div className="h-6 w-px bg-gray-700 mx-1"></div>
                            {mode==='ml' && (<><button onClick={checkMemory} className="bg-gray-800 px-3 py-1.5 rounded text-xs text-gray-300 border border-gray-700 hover:border-gray-600 flex gap-2"><Cpu size={14}/> Memoria</button><button onClick={exportToC} className="bg-gray-800 px-3 py-1.5 rounded text-xs text-gray-300 border border-gray-700 hover:border-gray-600 flex gap-2"><Cpu size={14}/> Exportar C</button></>)}
                            <button onClick={runPipeline} className="bg-green-600 hover:bg-green-500 text-white px-4 py-1.5 rounded text-sm font-semibold flex items-center gap-2 shadow-lg"><Play size={16} fill="currentColor"/> Ejecutar</button>
                        </div>
                    </div>
                    <div className="flex-1 flex overflow-hidden">
                        <div className="w-64 bg-gray-900 border-r border-gray-700 flex flex-col shrink-0">
                            <div className="p-3 text-xs font-bold text-gray-500 uppercase tracking-wider border-b border-gray-800">{mode==='ml'?'Machine Learning':'Python'}</div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-1">
                                {mode==='ml' ? (<>
                                    <SidebarBtn label="Dataset" icon={Database} color="text-blue-400" nodeType="ml_dataset" onDragStart={onDragStart} />
                                    <div className="my-2 border-t border-gray-800"></div>
                                    <SidebarBtn label="Decision Tree" icon={GitBranch} color="text-emerald-400" nodeType="ml_train_dt" onDragStart={onDragStart} />
                                    <SidebarBtn label="Random Forest" icon={Layers} color="text-emerald-500" nodeType="ml_train_rf" onDragStart={onDragStart} />
                                    <SidebarBtn label="KNN" icon={Users} color="text-purple-400" nodeType="ml_train_knn" onDragStart={onDragStart} />
                                    <SidebarBtn label="SVM" icon={Split} color="text-pink-400" nodeType="ml_train_svm" onDragStart={onDragStart} />
                                    <SidebarBtn label="Linear Reg" icon={ArrowRight} color="text-cyan-400" nodeType="ml_train_linear" onDragStart={onDragStart} />
                                    <SidebarBtn label="Neural Net" icon={Brain} color="text-indigo-400" nodeType="ml_train_nn" onDragStart={onDragStart} />
                                    <div className="my-2 border-t border-gray-800"></div>
                                    <SidebarBtn label="Ejecutar" icon={PlayCircle} color="text-red-400" nodeType="ml_predict" onDragStart={onDragStart} />
                                </>) : (<>
                                    <SidebarBtn label="Variable" icon={Variable} color="text-yellow-400" nodeType="py_var" onDragStart={onDragStart} />
                                    <SidebarBtn label="Input" icon={Keyboard} color="text-slate-400" nodeType="py_input" onDragStart={onDragStart} />
                                    <SidebarBtn label="Print" icon={Terminal} color="text-gray-400" nodeType="py_print" onDragStart={onDragStart} />
                                    <div className="my-2 border-t border-gray-800"></div>
                                    <SidebarBtn label="If" icon={Split} color="text-orange-400" nodeType="py_if" onDragStart={onDragStart} />
                                    <SidebarBtn label="For" icon={Repeat} color="text-orange-500" nodeType="py_loop" onDragStart={onDragStart} />
                                    <SidebarBtn label="While" icon={RefreshCw} color="text-orange-600" nodeType="py_while" onDragStart={onDragStart} />
                                    <SidebarBtn label="Control" icon={XCircle} color="text-red-500" nodeType="py_control" onDragStart={onDragStart} />
                                    <div className="my-2 border-t border-gray-800"></div>
                                    <SidebarBtn label="Math" icon={Calculator} color="text-teal-400" nodeType="py_math" onDragStart={onDragStart} />
                                    <SidebarBtn label="Compare" icon={CheckSquare} color="text-cyan-400" nodeType="py_compare" onDragStart={onDragStart} />
                                    <SidebarBtn label="Function" icon={FunctionSquare} color="text-violet-400" nodeType="py_func" onDragStart={onDragStart} />
                                    <SidebarBtn label="Return" icon={ArrowLeft} color="text-rose-400" nodeType="py_return" onDragStart={onDragStart} />
                                    <div className="my-2 border-t border-gray-800"></div>
                                    <SidebarBtn label="Class" icon={Box} color="text-indigo-400" nodeType="py_class" onDragStart={onDragStart} />
                                    <SidebarBtn label="Import" icon={Package} color="text-sky-400" nodeType="py_import" onDragStart={onDragStart} />
                                    <SidebarBtn label="Try/Except" icon={AlertTriangle} color="text-amber-400" nodeType="py_try" onDragStart={onDragStart} />
                                </>)}
                            </div>
                            {mode==='ml' && memoryStats && <div className="p-3 bg-gray-800 border-t border-gray-700 text-[10px] font-mono"><div>Flash: {memoryStats.flash_percent}%</div></div>}
                        </div>
                        <div className="flex-1 relative bg-[#1e1e1e]" ref={reactFlowWrapper}>
                            {activeTab==='forest' ? <div className="h-full w-full"><ReactFlow nodes={nodes} edges={edges} onNodesChange={onNodesChange} onEdgesChange={onEdgesChange} onConnect={onConnect} edgeTypes={edgeTypes} onInit={setReactFlowInstance} onDrop={onDrop} onDragOver={onDragOver} nodeTypes={nodeTypes} fitView snapToGrid snapGrid={[15,15]}><Background color="#333" gap={20} /><Controls className="bg-gray-800 border-gray-700 fill-white text-white" /></ReactFlow></div> :
                             activeTab==='simulation' && mode==='ml' ? <SimulationView active={simulationStatus.active} status={simulationStatus.status} /> :
                             <div className="h-full w-full relative"><textarea className="w-full h-full bg-[#1e1e1e] text-green-400 p-4 font-mono text-sm resize-none focus:outline-none" value={pythonCode} readOnly spellCheck="false"></textarea></div>}
                        </div>
                    </div>
                    <div className="h-40 border-t border-gray-700 flex flex-col bg-black shrink-0"><div className="bg-gray-800 text-[10px] uppercase font-bold tracking-wider px-3 py-1 text-gray-400 border-b border-gray-700 flex justify-between"><span>Terminal</span><button onClick={()=>setLogs([])} className="hover:text-white">Clear</button></div><TerminalLog logs={logs} /></div>
                </div>
            );
        };

        const Editor = ({ mode, onBack, initialNodes, initialEdges }) => {
            return (
                <ReactFlowProvider>
                    <EditorContent mode={mode} onBack={onBack} initialNodes={initialNodes} initialEdges={initialEdges} />
                </ReactFlowProvider>
            );
        };

        // --- 5. COMPONENTE PRINCIPAL ---
        const Main = () => {
            const [view, setView] = useState('welcome');
            const [mode, setMode] = useState('ml');
            const [initialData, setInitialData] = useState(null);
            const handleNewProject = (selectedMode) => { setMode(selectedMode); setInitialData(null); setView('editor'); };
            const handleOpenProject = async () => {
                const name = prompt("Nombre proyecto:"); if(!name) return;
                try { const data = await window.eel.api_load_project(name)(); if(data) { setMode(data.mode||'ml'); setInitialData(data); setView('editor'); } } catch(e) { console.error(e); }
            };
            return view === 'welcome' ? <WelcomeScreen onNew={handleNewProject} onOpen={handleOpenProject} /> : <Editor mode={mode} onBack={()=>setView('welcome')} initialNodes={initialData?.blocks} initialEdges={initialData?.edges} />;
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<Main />);
    </script>
</body>
</html>
