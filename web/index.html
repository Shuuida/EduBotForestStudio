<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBot Forest Studio</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React Flow Styles -->
    <link href="https://cdn.jsdelivr.net/npm/reactflow@11.10.1/dist/style.min.css" rel="stylesheet">
    
    <!-- Configuración del Tema VS Code para Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vscode: {
                            bg: '#1e1e1e',         // Fondo principal editor
                            sidebar: '#252526',    // Fondo barra lateral
                            activity: '#333333',   // Fondo barra iconos izquierda
                            status: '#007acc',     // Azul VS Code (Status bar)
                            text: '#cccccc',       // Texto normal
                            textLight: '#ffffff',  // Texto destacado
                            hover: '#2a2d2e',      // Hover en listas
                            selection: '#094771',  // Selección
                            border: '#454545'      // Bordes sutiles
                        }
                    },
                    fontFamily: {
                        sans: ['"Segoe UI"', 'San Francisco', 'Helvetica Neue', 'Arial', 'sans-serif'],
                        mono: ['Consolas', '"Courier New"', 'monospace']
                    }
                }
            }
        }
    </script>

    <style>
        /* Ajustes finos para React Flow en modo oscuro */
        .react-flow__node {
            border-radius: 4px;
            border: 1px solid #454545;
            background: #252526;
            color: #cccccc;
            font-family: 'Segoe UI', sans-serif;
        }
        .react-flow__handle {
            background: #cccccc;
            width: 8px;
            height: 8px;
        }
        .react-flow__controls {
            box-shadow: none;
            border: 1px solid #454545;
        }
        .react-flow__controls-button {
            background: #252526;
            border-bottom: 1px solid #454545;
            fill: #cccccc;
        }
        .react-flow__controls-button:hover {
            background: #333333;
        }
        /* Scrollbar estilo VS Code */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1e1e; 
        }
        ::-webkit-scrollbar-thumb {
            background: #424242; 
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4f4f4f; 
        }
    </style>
</head>
<body class="bg-vscode-bg text-vscode-text h-screen w-screen overflow-hidden select-none">
    <div id="root" class="h-full w-full"></div>

    <!-- IMPORTANTE: React Flow y Componentes -->
    <!-- Usamos módulos ES para importar ReactFlow desde CDN compatible -->
    <script type="module">
        import { ReactFlow, Controls, Background, applyNodeChanges, applyEdgeChanges, addEdge } from 'https://cdn.jsdelivr.net/npm/@xyflow/react@12.0.0-next.16/+esm';
        
        // Exponemos ReactFlow al scope global para que Babel pueda verlo
        window.ReactFlow = ReactFlow;
        window.Controls = Controls;
        window.Background = Background;
        window.applyNodeChanges = applyNodeChanges;
        window.applyEdgeChanges = applyEdgeChanges;
        window.addEdge = addEdge;
    </script>

    <script type="text/babel" data-type="module">
        const { useState, useCallback, useEffect } = React;
        
        // ----------------------------
        // ICONOS SVG (Solución para evitar errores CDN)
        const Icon = ({ path, size = 24, className = "" }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
            >
                {path}
            </svg>
        );

        const Icons = {
            FileCode: ({ size, className }) => <Icon size={size} className={className} path={<><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="m10 13-2 2 2 2"/><path d="m14 17 2-2-2-2"/></>} />,
            FolderOpen: ({ size, className }) => <Icon size={size} className={className} path={<><path d="m6 14 1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-3.25 7a2 2 0 0 1-1.8 1.17H5a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h4l2.5 2.5h7.5"/></>} />,
            Play: ({ size, className }) => <Icon size={size} className={className} path={<polygon points="5 3 19 12 5 21 5 3"/>} />,
            Settings: ({ size, className }) => <Icon size={size} className={className} path={<><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>} />,
            GitBranch: ({ size, className }) => <Icon size={size} className={className} path={<><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></>} />,
            Search: ({ size, className }) => <Icon size={size} className={className} path={<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>} />,
            X: ({ size, className }) => <Icon size={size} className={className} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />,
            Box: ({ size, className }) => <Icon size={size} className={className} path={<><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></>} />,
            Brain: ({ size, className }) => <Icon size={size} className={className} path={<><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></>} />,
            Trees: ({ size, className }) => <Icon size={size} className={className} path={<><path d="M10 10v.2A3 3 0 0 1 8.9 16v0H5v0h0a3 3 0 0 1-1-5.8V10a3 3 0 0 1 5.3-2.1"/><path d="M7 16v6"/><path d="M13 19v3"/><path d="M12 19h8.3a1 1 0 0 0 .7-1.7L18 14h.3a1 1 0 0 0 .7-1.7L16 9h.2a1 1 0 0 0 .6-1.7L13 3l-1.4 1.5"/></>} />,
            Type: ({ size, className }) => <Icon size={size} className={className} path={<><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></>} />,
        };

        // ----------------------------------------
        // COMPONENTE: PANTALLA DE BIENVENIDA
        const WelcomeScreen = ({ onNewProject }) => {
            return (
                <div className="h-full w-full flex flex-col bg-vscode-bg text-vscode-text font-sans">
                    {/* Fake Tab Bar */}
                    <div className="h-9 bg-vscode-bg flex items-center px-4 border-b border-vscode-border">
                        <div className="flex items-center bg-vscode-sidebar px-3 py-1 text-sm text-vscode-textLight border-t border-vscode-status">
                            <span className="mr-2">Bienvenido</span>
                            <Icons.X size={14} className="hover:text-white cursor-pointer" />
                        </div>
                    </div>

                    <div className="flex-1 flex justify-center items-start pt-20 overflow-y-auto">
                        <div className="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-16 px-8">
                            
                            {/* Columna Izquierda: Logo y Acciones */}
                            <div className="flex flex-col gap-6">
                                <div className="mb-4">
                                    <h1 className="text-4xl font-light text-vscode-textLight mb-2">EduBot Forest Studio</h1>
                                    <h2 className="text-xl text-gray-500">Edición de IA Evolucionada</h2>
                                </div>

                                <div className="flex flex-col gap-2">
                                    <h3 className="text-lg text-vscode-textLight mb-2">Iniciar</h3>
                                    
                                    <button onClick={onNewProject} className="group flex items-center gap-3 text-vscode-text hover:text-vscode-status transition-colors text-left">
                                        <Icons.FileCode size={20} className="text-vscode-status" />
                                        <div>
                                            <span className="text-vscode-status group-hover:underline">Nuevo Proyecto de Bosque...</span>
                                            <p className="text-xs text-gray-500">Crear un nuevo flujo de ML desde cero</p>
                                        </div>
                                    </button>

                                    <button className="group flex items-center gap-3 text-vscode-text hover:text-vscode-status transition-colors text-left">
                                        <Icons.FolderOpen size={20} className="text-vscode-status" />
                                        <div>
                                            <span className="text-vscode-status group-hover:underline">Abrir Proyecto...</span>
                                            <p className="text-xs text-gray-500">Cargar un archivo .edubotproj existente</p>
                                        </div>
                                    </button>
                                    
                                    <button className="group flex items-center gap-3 text-vscode-text hover:text-vscode-status transition-colors text-left">
                                        <Icons.GitBranch size={20} className="text-vscode-status" />
                                        <div>
                                            <span className="text-vscode-status group-hover:underline">Clonar desde Repositorio</span>
                                        </div>
                                    </button>
                                </div>

                                <div className="mt-8">
                                    <h3 className="text-lg text-vscode-textLight mb-2">Reciente</h3>
                                    <div className="flex flex-col gap-1 text-sm">
                                        <a href="#" className="hover:bg-vscode-hover hover:text-white py-1 px-2 -ml-2 rounded flex justify-between group">
                                            <span>iris_classification.edubot</span>
                                            <span className="text-gray-500 group-hover:text-gray-300">~/Documentos/ML</span>
                                        </a>
                                        <a href="#" className="hover:bg-vscode-hover hover:text-white py-1 px-2 -ml-2 rounded flex justify-between group">
                                            <span>titanic_forest.edubot</span>
                                            <span className="text-gray-500 group-hover:text-gray-300">~/Clase_IA_2</span>
                                        </a>
                                    </div>
                                </div>
                            </div>

                            {/* Columna Derecha: Ayuda y Tips */}
                            <div className="flex flex-col gap-6">
                                <div>
                                    <h3 className="text-lg text-vscode-textLight mb-4">Aprende</h3>
                                    <div className="flex flex-col gap-3">
                                        <div className="bg-vscode-activity p-3 border-l-2 border-vscode-status cursor-pointer hover:bg-vscode-hover">
                                            <h4 className="font-semibold text-white flex items-center gap-2">
                                                <Icons.Play size={14} /> Conceptos Básicos
                                            </h4>
                                            <p className="text-xs mt-1">Aprende cómo funciona un Árbol de Decisión.</p>
                                        </div>
                                        <div className="bg-vscode-activity p-3 border-l-2 border-transparent hover:border-vscode-status cursor-pointer hover:bg-vscode-hover">
                                            <h4 className="font-semibold text-white flex items-center gap-2">
                                                <Icons.Trees size={14} /> Programación en Bosques
                                            </h4>
                                            <p className="text-xs mt-1">Tutorial interactivo sobre Random Forest.</p>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="mt-auto">
                                    <p className="text-xs text-gray-500">
                                        Tip: Puedes arrastrar archivos .csv directamente al editor para comenzar.
                                    </p>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        };

        // ---------------------------------------------
        // COMPONENTE: EDITOR PRINCIPAL (IDE)
        const EditorInterface = () => {
            // Estado básico de ReactFlow
            const [nodes, setNodes] = useState([]);
            const [edges, setEdges] = useState([]);

            const onNodesChange = useCallback(
                (changes) => setNodes((nds) => window.applyNodeChanges(changes, nds)),
                [],
            );
            const onEdgesChange = useCallback(
                (changes) => setEdges((eds) => window.applyEdgeChanges(changes, eds)),
                [],
            );
            const onConnect = useCallback(
                (params) => setEdges((eds) => window.addEdge(params, eds)),
                [],
            );

            // Función simulada para "Soltar" un nodo (Drag & Drop simplificado para el demo)
            const addNode = (type, label) => {
                const id = Math.random().toString();
                const newNode = {
                    id,
                    position: { x: Math.random() * 300 + 50, y: Math.random() * 300 + 50 },
                    data: { label: label },
                    style: { border: '1px solid #007acc', backgroundColor: '#1e1e1e', color: 'white', padding: '10px', minWidth: '150px' },
                };
                setNodes((nds) => nds.concat(newNode));
            };

            return (
                <div className="h-full w-full flex bg-vscode-bg overflow-hidden">
                    
                    {/* 1. ACTIVITY BAR (Izquierda Extrema) */}
                    <div className="w-12 bg-vscode-activity flex flex-col items-center py-2 justify-between z-10">
                        <div className="flex flex-col gap-4">
                            <div className="group relative flex justify-center w-full py-2 border-l-2 border-vscode-status cursor-pointer">
                                <Icons.FileCode size={24} className="text-white" />
                                {/* Tooltip estilo VS Code */}
                                <div className="absolute left-12 top-2 bg-vscode-sidebar text-white text-xs px-2 py-1 rounded border border-black opacity-0 group-hover:opacity-100 whitespace-nowrap z-50 pointer-events-none shadow-xl">
                                    Explorador de Nodos
                                </div>
                            </div>
                            <div className="group relative flex justify-center w-full py-2 opacity-60 hover:opacity-100 cursor-pointer">
                                <Icons.Search size={24} className="text-white" />
                                <div className="absolute left-12 top-2 bg-vscode-sidebar text-white text-xs px-2 py-1 rounded border border-black opacity-0 group-hover:opacity-100 whitespace-nowrap z-50 pointer-events-none shadow-xl">
                                    Buscar
                                </div>
                            </div>
                            <div className="group relative flex justify-center w-full py-2 opacity-60 hover:opacity-100 cursor-pointer">
                                <Icons.GitBranch size={24} className="text-white" />
                                <div className="absolute left-12 top-2 bg-vscode-sidebar text-white text-xs px-2 py-1 rounded border border-black opacity-0 group-hover:opacity-100 whitespace-nowrap z-50 pointer-events-none shadow-xl">
                                    Control de Versiones
                                </div>
                            </div>
                            <div className="group relative flex justify-center w-full py-2 opacity-60 hover:opacity-100 cursor-pointer">
                                <Icons.Play size={24} className="text-green-500" />
                                <div className="absolute left-12 top-2 bg-vscode-sidebar text-white text-xs px-2 py-1 rounded border border-black opacity-0 group-hover:opacity-100 whitespace-nowrap z-50 pointer-events-none shadow-xl">
                                    Ejecutar y Depurar
                                </div>
                            </div>
                        </div>
                        <div className="flex flex-col gap-4 mb-2">
                             <div className="group relative flex justify-center w-full py-2 opacity-60 hover:opacity-100 cursor-pointer">
                                <Icons.Settings size={24} className="text-white" />
                            </div>
                        </div>
                    </div>

                    {/* 2. SIDEBAR (Explorador de Nodos) */}
                    <div className="w-60 bg-vscode-sidebar border-r border-vscode-activity flex flex-col">
                        <div className="h-9 px-4 flex items-center text-xs font-semibold tracking-wide text-gray-400 uppercase">
                            Explorador: Bosque
                        </div>
                        
                        <div className="flex-1 overflow-y-auto">
                            {/* Grupo: DATOS */}
                            <div className="px-2 py-1">
                                <div className="flex items-center gap-1 text-vscode-text font-bold text-xs mb-1 cursor-pointer hover:bg-vscode-hover p-1 rounded">
                                    <span className="transform rotate-90 text-gray-500">▶</span> DATOS
                                </div>
                                <div className="pl-4 flex flex-col gap-1">
                                    <div onClick={() => addNode('dataset', '📦 Dataset')} className="flex items-center gap-2 text-sm text-gray-300 hover:bg-vscode-hover hover:text-white cursor-pointer py-1 px-2 rounded transition-colors">
                                        <Icons.Box size={14} className="text-blue-400" /> Dataset
                                    </div>
                                    <div onClick={() => addNode('split', '🍴 Dividir Datos')} className="flex items-center gap-2 text-sm text-gray-300 hover:bg-vscode-hover hover:text-white cursor-pointer py-1 px-2 rounded transition-colors">
                                        <Icons.GitBranch size={14} className="text-orange-400" /> Dividir Train/Test
                                    </div>
                                </div>
                            </div>

                            {/* Grupo: MODELOS */}
                            <div className="px-2 py-1 mt-2">
                                <div className="flex items-center gap-1 text-vscode-text font-bold text-xs mb-1 cursor-pointer hover:bg-vscode-hover p-1 rounded">
                                    <span className="transform rotate-90 text-gray-500">▶</span> MODELOS ML
                                </div>
                                <div className="pl-4 flex flex-col gap-1">
                                    <div onClick={() => addNode('dt', '🌳 Árbol Decisión')} className="flex items-center gap-2 text-sm text-gray-300 hover:bg-vscode-hover hover:text-white cursor-pointer py-1 px-2 rounded transition-colors">
                                        <Icons.Trees size={14} className="text-green-500" /> Árbol de Decisión
                                    </div>
                                    <div onClick={() => addNode('rf', '🌲 Random Forest')} className="flex items-center gap-2 text-sm text-gray-300 hover:bg-vscode-hover hover:text-white cursor-pointer py-1 px-2 rounded transition-colors">
                                        <Icons.Trees size={14} className="text-green-400" /> Random Forest
                                    </div>
                                    <div onClick={() => addNode('nn', '🧠 Neural Network')} className="flex items-center gap-2 text-sm text-gray-300 hover:bg-vscode-hover hover:text-white cursor-pointer py-1 px-2 rounded transition-colors">
                                        <Icons.Brain size={14} className="text-purple-400" /> Neural Network
                                    </div>
                                </div>
                            </div>

                            {/* Grupo: LÓGICA PYTHON */}
                            <div className="px-2 py-1 mt-2">
                                <div className="flex items-center gap-1 text-vscode-text font-bold text-xs mb-1 cursor-pointer hover:bg-vscode-hover p-1 rounded">
                                    <span className="transform rotate-90 text-gray-500">▶</span> LOGICA
                                </div>
                                <div className="pl-4 flex flex-col gap-1">
                                    <div onClick={() => addNode('print', '🖨️ Imprimir')} className="flex items-center gap-2 text-sm text-gray-300 hover:bg-vscode-hover hover:text-white cursor-pointer py-1 px-2 rounded transition-colors">
                                        <Icons.Type size={14} className="text-gray-400" /> Imprimir
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 3. MAIN AREA (Canvas) */}
                    <div className="flex-1 flex flex-col h-full relative">
                        
                        {/* Tab Bar Simplificado */}
                        <div className="h-9 bg-vscode-bg flex items-center border-b border-black">
                            <div className="h-full bg-vscode-bg px-4 flex items-center gap-2 text-sm text-vscode-textLight border-t border-vscode-status border-r border-vscode-activity">
                                <Icons.FileCode size={14} className="text-yellow-400" />
                                <span>bosque_proyecto.edubot</span>
                                <Icons.X size={14} className="ml-2 hover:bg-vscode-hover rounded p-0.5 cursor-pointer" />
                            </div>
                        </div>

                        {/* React Flow Canvas */}
                        <div className="flex-1 bg-vscode-bg">
                            <div style={{ width: '100%', height: '100%' }}>
                                <div className="absolute top-4 right-4 z-20 flex gap-2">
                                    <button className="bg-green-700 hover:bg-green-600 text-white text-sm px-3 py-1 rounded flex items-center gap-2 shadow-lg">
                                        <Icons.Play size={14} /> Ejecutar Bosque
                                    </button>
                                </div>

                                { window.ReactFlow ? (
                                    <window.ReactFlow
                                        nodes={nodes}
                                        edges={edges}
                                        onNodesChange={onNodesChange}
                                        onEdgesChange={onEdgesChange}
                                        onConnect={onConnect}
                                        fitView
                                        minZoom={0.2}
                                        style={{ background: '#1e1e1e' }} // Color de fondo del editor
                                    >
                                        <window.Background color="#333" gap={20} size={1} />
                                        <window.Controls />
                                    </window.ReactFlow>
                                ) : (
                                    <div className="flex items-center justify-center h-full text-gray-500">
                                        Cargando motor de bosque...
                                    </div>
                                )}
                            </div>
                        </div>
                        
                        {/* Status Bar */}
                        <div className="h-6 bg-vscode-status text-white flex items-center justify-between px-3 text-xs select-none z-20">
                            <div className="flex gap-4">
                                <span className="flex items-center gap-1"><Icons.GitBranch size={10} /> main*</span>
                                <span className="flex items-center gap-1"><Icons.X size={10} /> 0 Errores</span>
                            </div>
                            <div className="flex gap-4">
                                <span>EduBot Engine: Listo</span>
                                <span>Python 3.11</span>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        // --------------------------------------
        // APP MAIN CONTAINER
        const App = () => {
            const [projectStarted, setProjectStarted] = useState(false);

            return (
                <>
                    { !projectStarted ? (
                        <WelcomeScreen onNewProject={() => setProjectStarted(true)} />
                    ) : (
                        <EditorInterface />
                    )}
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
