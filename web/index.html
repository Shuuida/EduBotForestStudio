<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBot Forest Studio - Offline Suite</title>
    
    <script type="text/javascript" src="/eel.js"></script>
    
    <script>
        window.module = undefined;
        window.exports = undefined;
        window.require = undefined;
        window.define = undefined; // Evita conflictos con AMD loaders
        window.global = window;    // Shim para librerías antiguas
        window.process = { env: { NODE_ENV: 'production' } };
    </script>
    
    <link href="libs/reactflow.css" rel="stylesheet"/>
    <link href="libs/prism.css" rel="stylesheet"/>
    
    <script src="libs/tailwind.js"></script>
    <script src="libs/babel.min.js"></script>
    <script src="libs/prism.js"></script>
    <script src="libs/prism-python.js"></script>
    
    <script src="libs/react.js"></script>
    <script src="libs/react-dom.js"></script>
    
    <script src="libs/reactflow.js"></script>

    <style>
        body { background-color: #111827; color: #e5e7eb; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .react-flow__node { background: #1f2937; border: 1px solid #374151; border-radius: 8px; color: white; min-width: 180px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .react-flow__node.selected { border-color: #3b82f6; box-shadow: 0 0 0 2px #3b82f6; }
        .forest-node-header { padding: 8px 12px; border-bottom: 1px solid #374151; font-weight: 600; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; border-top-left-radius: 8px; border-top-right-radius: 8px; }
        .forest-node-body { padding: 10px; font-size: 0.8rem; display: flex; flex-direction: column; gap: 6px; }
        .node-input { background-color: #111827; border: 1px solid #374151; color: #d1d5db; padding: 4px 8px; border-radius: 4px; width: 100%; font-size: 0.75rem; outline: none; }
        .node-input:focus { border-color: #3b82f6; }
        .node-label { font-size: 0.7rem; color: #9ca3af; margin-bottom: 2px; display: block; }
        .vscode-terminal { font-family: 'Consolas', 'Monaco', 'Courier New', monospace; background-color: #1e1e1e; color: #cccccc; line-height: 1.4; }
        
        /* Animaciones */
        @keyframes flowPulse { 0% { opacity: 0.2; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.2; transform: scale(1); } }
        .flow-particle { animation: flowPulse 1.5s infinite; }
        .edge-path-active { stroke-width: 3; filter: drop-shadow(0 0 4px currentColor); animation: dashdraw 1s linear infinite; stroke-dasharray: 10; }
        .edge-path-error { stroke: #f97316 !important; stroke-width: 3; stroke-dasharray: 5; }
        .edge-path-idle { stroke-width: 2; opacity: 0.8; }
        @keyframes dashdraw { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }

        /* UI */
        .w-64.bg-gray-900.border-r.border-gray-700 { background: linear-gradient(to bottom, #111827, #0a0a0a); border-right: 1px solid #1f2937 !important; box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.03); }
        .w-64 .border-b.border-gray-800 { background: #111827; border-bottom-color: #1f2937 !important; color: #9ca3af !important; letter-spacing: 0.05em; text-shadow: 0 1px 1px rgba(0,0,0,0.5); }
        .react-flow__controls { background-color: #1f2937 !important; border: 1px solid #374151 !important; border-radius: 8px !important; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2) !important; margin-bottom: 16px; margin-left: 16px; }
        .react-flow__controls-button { background-color: transparent !important; border-bottom: 1px solid #374151 !important; border-radius: 0 !important; color: #9ca3af !important; transition: all 0.2s ease; width: 32px !important; height: 32px !important; }
        .react-flow__controls-button:last-child { border-bottom: none !important; }
        .react-flow__controls-button:hover { background-color: #374151 !important; color: #ffffff !important; }
        .react-flow__controls-button svg { fill: currentColor !important; stroke: currentColor !important; width: 18px; height: 18px; max-width: none; max-height: none; }
        .react-flow__controls-fitview svg { transform: scale(1.1); }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #111827; border-left: 1px solid #1f2937; }
        ::-webkit-scrollbar-thumb { background-color: #374151; border-radius: 4px; border: 2px solid #111827; }
        ::-webkit-scrollbar-thumb:hover { background-color: #4b5563; }
        ::-webkit-scrollbar-corner { background: #111827; }
        
        .tutorial-overlay { position: absolute; inset: 0; z-index: 50; background: rgba(0, 0, 0, 0.6); -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; animation: fadeIn 0.3s ease; }
        .tutorial-card { background: #1f2937; border: 1px solid #374151; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); border-radius: 16px; padding: 24px; max-width: 450px; width: 90%; text-align: center; position: relative; animation: slideUp 0.4s ease; }

        const { 
            Users, Sprout, Cpu, Play, Terminal, Trash2, Save, FolderOpen, Code, 
            Variable, FunctionSquare, Repeat, Split, XCircle, Keyboard, RefreshCw, 
            Calculator, CheckSquare, ArrowLeft, Box, Package, AlertTriangle, 
            FileWarning, Settings, Monitor, Share2, X, Copy
        } = Icons;

        // LÓGICA DEL MOTOR (SERIALIZACIÓN & SCOPE)

        const serializeNodesLinear = (nodes, edges) => {
            const nodeMap = new Map(nodes.map(n => [n.id, { ...n }]));

            const sortNodes = (a, b) => {
                // Si están a menos de 25px de diferencia vertical, los consideramos en la misma línea.
                if (Math.abs(a.position.y - b.position.y) < 25) {
                    return a.position.x - b.position.x; // Izquierda a Derecha
                }
                return a.position.y - b.position.y; // Arriba hacia Abajo (Prioridad Sagrada)
            };
            
            // ORDENAMIENTO TOPOLÓGICO
            const adjacency = new Map(); 
            const inDegree = new Map();
            
            nodes.forEach(n => {
                adjacency.set(n.id, []);
                inDegree.set(n.id, 0);
            });

            edges.forEach(edge => {
                if (nodeMap.has(edge.source) && nodeMap.has(edge.target)) {
                    adjacency.get(edge.source).push(edge.target);
                    inDegree.set(edge.target, (inDegree.get(edge.target) || 0) + 1);
                }
            });

            const queue = [];
            nodes.forEach(n => { if (inDegree.get(n.id) === 0) queue.push(n); });
            queue.sort(sortNodes);

            const sortedIds = [];
            while (queue.length > 0) {
                const node = queue.shift();
                sortedIds.push(node.id);
                
                const neighbors = adjacency.get(node.id)
                    .map(id => nodeMap.get(id))
                    .sort(sortNodes);

                neighbors.forEach(neighbor => {
                    inDegree.set(neighbor.id, inDegree.get(neighbor.id) - 1);
                    if (inDegree.get(neighbor.id) === 0) queue.push(neighbor);
                });
            }

            if (sortedIds.length !== nodes.length) {
                nodes.forEach(n => { if (!sortedIds.includes(n.id)) sortedIds.push(n.id); });
            }

            // DETECCIÓN DE SCOPE
            const CONTAINER_TYPES = ['py_class', 'py_func', 'py_init', 'py_if', 'py_elif', 'py_else', 'py_loop', 'py_while', 'py_try', 'py_except'];
            const parentMap = new Map(); 
            sortedIds.forEach(id => parentMap.set(id, null));

            sortedIds.forEach(currentId => {
                const currentNode = nodeMap.get(currentId);
                const currentScope = parentMap.get(currentId);
                const effectiveScopeForChildren = CONTAINER_TYPES.includes(currentNode.type) ? currentId : currentScope;

                const childrenIds = adjacency.get(currentId);
                childrenIds.forEach(childId => {
                    if (parentMap.get(childId) === null) {
                        parentMap.set(childId, effectiveScopeForChildren);
                    }
                });
            });

            const blocksByScope = new Map();
            blocksByScope.set(null, []);

            const rawBlocks = new Map();
            
            sortedIds.forEach(id => {
                const node = nodeMap.get(id);
                const { onChange, ...nodeData } = node.data || {};
                let block = { ...nodeData, type: node.type, id: node.id };

                const getConnectedInputs = (targetId) => {
                    return edges.filter(e => e.target === targetId).map(e => {
                        const src = nodeMap.get(e.source);
                        return src?.data?.var_name || src?.data?.target || null;
                    }).filter(Boolean);
                };
                
                const inputs = getConnectedInputs(id);
                if (node.type === 'py_math' || node.type === 'py_compare') {
                    if (!block.left && inputs.length > 0) block.left = inputs[0];
                    if (!block.right && inputs.length > 1) block.right = inputs[1];
                }
                if (node.type === 'py_print' && inputs.length > 0 && !block.content) {
                    block.content = inputs[0];
                }
                if (node.type === 'py_loop' && (!block.iterator || block.iterator.trim() === '')) {
                    block.iterator = 'i';
                }
                if (CONTAINER_TYPES.includes(node.type)) {
                    block.body = [];
                }

                rawBlocks.set(id, block);

                const parentId = parentMap.get(id);
                const safeParentId = rawBlocks.has(parentId) ? parentId : null;
                
                if (!blocksByScope.has(safeParentId)) {
                    blocksByScope.set(safeParentId, []);
                }
                blocksByScope.get(safeParentId).push(block);
            });

            blocksByScope.forEach((children, scopeId) => {
                if (scopeId !== null) {
                    const parentBlock = rawBlocks.get(scopeId);
                    if (parentBlock) {
                        parentBlock.body = children;
                    }
                }
            });

            return blocksByScope.get(null);
        };

        // COMPONENTES UI Y NODOS

        const StudentAuth = ({ onOpenTeacherDashboard, showModal, closeModal }) => {
            const role = localStorage.getItem('edubot_role') || 'student';
            const studentName = localStorage.getItem('edubot_student_name') || 'Estudiante';

            const handleLogout = () => {
                showModal({
                    type: 'confirm', title: 'Cerrar Sesión', message: '¿Estás seguro de que deseas cerrar tu sesión actual?',
                    onConfirm: () => {
                        closeModal();
                        localStorage.removeItem('edubot_role');
                        localStorage.removeItem('edubot_student_name');
                        window.location.reload(); 
                    },
                    onCancel: closeModal
                });
            };

            if (role === 'teacher') {
                return (
                    <div className="flex items-center gap-3 bg-indigo-900/40 border border-indigo-500/50 px-3 py-1.5 rounded-lg">
                        <span className="text-xs font-bold text-indigo-300">Modo Profesor</span>
                        <button onClick={onOpenTeacherDashboard} className="text-xs bg-indigo-600 hover:bg-indigo-500 text-white px-2 py-1 rounded transition-colors">Dashboard</button>
                        <button onClick={handleLogout} className="text-xs text-red-400 hover:text-red-300 ml-2">Salir</button>
                    </div>
                );
            }

            return (
                <div className="flex items-center gap-2 bg-gray-800/50 border border-gray-700 px-3 py-1.5 rounded-lg">
                    <Users size={14} className="text-blue-400" />
                    <span className="text-xs font-bold text-gray-200">{studentName}</span>
                    <div className="h-4 w-px bg-gray-600 mx-1"></div>
                    <button onClick={handleLogout} className="text-xs text-red-400 hover:text-red-300" title="Cerrar sesión">Salir</button>
                </div>
            );
        };

        const TeacherDashboard = ({ onClose, showModal, closeModal }) => {
            const [grades, setGrades] = useState([]);
            
            // Estados para Filtros de Auditoría
            const [filterYear, setFilterYear] = useState('Todos');
            const [filterSection, setFilterSection] = useState('Todas');
            const [filterTopic, setFilterTopic] = useState('Todos');

            // Estados para el modal CRUD
            const [showManualForm, setShowManualForm] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const [editingId, setEditingId] = useState(null); 
            
            const [manualData, setManualData] = useState({ 
                student: '', challenge: '', score: '', 
                year: '3er Año', section: 'A', topic: 'Lógica Básica' 
            });
            const [loading, setLoading] = useState(false);

            const loadGrades = async () => {
                if (window.eel) {
                    const res = await window.eel.api_get_grades()();
                    if (res.success) {
                        setGrades(res.grades);
                    }
                }
            };

            useEffect(() => { loadGrades(); }, []);

            const uniqueYears = ['Todos', ...new Set(grades.map(g => g.year || 'General'))];
            const uniqueSections = ['Todas', ...new Set(grades.map(g => g.section || 'Única'))];
            const uniqueTopics = ['Todos', ...new Set(grades.map(g => g.topic || 'Sin Asignar'))];

            const filteredGrades = grades.filter(g => {
                const matchYear = filterYear === 'Todos' || (g.year || 'General') === filterYear;
                const matchSection = filterSection === 'Todas' || (g.section || 'Única') === filterSection;
                const matchTopic = filterTopic === 'Todos' || (g.topic || 'Sin Asignar') === filterTopic;
                return matchYear && matchSection && matchTopic;
            });

            const openCreateModal = () => {
                setManualData({ student: '', challenge: '', score: '', year: '3er Año', section: 'A', topic: 'Lógica Básica' });
                setIsEditing(false);
                setEditingId(null);
                setShowManualForm(true);
            };

            const openEditModal = (grade) => {
                setManualData({
                    student: grade.student,
                    challenge: grade.challenge,
                    score: grade.score,
                    year: grade.year || 'General',
                    section: grade.section || 'Única',
                    topic: grade.topic || 'Sin Asignar'
                });
                setIsEditing(true);
                setEditingId(grade.timestamp); 
                setShowManualForm(true);
            };

            const handleDeleteGrade = (timestamp) => {
                showModal({
                    type: 'confirm', 
                    title: 'Eliminar Registro',
                    message: '¿Estás seguro de que deseas eliminar este registro? Esta acción es irreversible y se aplicará a filas con el mismo timestamp ' + timestamp + '.',
                    onConfirm: async () => {
                        closeModal(); // Ocultamos la ventana de confirmación
                        const res = await window.eel.api_delete_grade(timestamp)();
                        if (res.success) {
                            loadGrades();
                            // Aviso de éxito con pequeño delay para transición suave
                            setTimeout(() => showModal({ 
                                type: 'alert', 
                                title: 'Registro Eliminado', 
                                message: 'La calificación fue eliminada de la base de datos de auditoría con el timestamp ' + timestamp + '.', 
                                onConfirm: closeModal 
                            }), 200);
                        } else {
                            setTimeout(() => showModal({ type: 'alert', title: 'Error al eliminar', message: res.error, onConfirm: closeModal }), 200);
                        }
                    },
                    onCancel: closeModal
                });
            };

            const handleSaveManualGrade = async () => {
                if (!manualData.student || !manualData.challenge || !manualData.score) {
                    showModal({ type: 'alert', title: 'Campos Incompletos', message: 'Estudiante, Evaluación y Puntaje son obligatorios.', onConfirm: closeModal });
                    return;
                }
                
                setLoading(true);
                try {
                    const res = await window.eel.api_save_grade(
                        manualData.student, manualData.challenge, parseFloat(manualData.score),
                        manualData.year, manualData.section, manualData.topic,
                        isEditing ? editingId : null 
                    )();
                    
                    if (res.success) {
                        setShowManualForm(false);
                        loadGrades(); 
                        
                        // Determinar el mensaje según la acción (Crear o Editar)
                        const successTitle = isEditing ? 'Nota Actualizada' : 'Nota Registrada';
                        const successMsg = isEditing 
                            ? 'La calificación del estudiante ha sido modificada con éxito.' 
                            : 'La nueva calificación fue agregada exitosamente a la base de datos de auditoría.';
                            
                        // Aviso de éxito
                        setTimeout(() => showModal({ 
                            type: 'alert', 
                            title: successTitle, 
                            message: successMsg, 
                            onConfirm: closeModal 
                        }), 200);

                    } else { 
                        showModal({ type: 'alert', title: 'Error', message: 'Error guardando la nota: ' + res.error, onConfirm: closeModal }); 
                    }
                } catch (e) { 
                    showModal({ type: 'alert', title: 'Error de Conexión', message: 'Error de conexión con el servidor.', onConfirm: closeModal }); 
                }
                setLoading(false);
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm animate-fade-in">
                    <div className="bg-gray-900 border border-indigo-500/50 rounded-xl shadow-2xl w-[900px] max-h-[90vh] flex flex-col overflow-hidden">
                        
                        {/* HEADER */}
                        <div className="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-800/50 shrink-0">
                            <h2 className="text-white font-bold flex items-center gap-2">
                                <Users size={20} className="text-indigo-400" /> Auditoría Central de Calificaciones
                            </h2>
                            <button onClick={onClose} className="text-gray-400 hover:text-white"><X size={20} /></button>
                        </div>
                        
                        {/* FILTROS Y CONTROLES */}
                        <div className="p-4 border-b border-gray-800 bg-gray-900 shrink-0 flex flex-wrap gap-4 items-end justify-between">
                            <div className="flex gap-4 flex-1">
                                <div>
                                    <label className="block text-[10px] text-gray-500 uppercase font-bold mb-1">Año</label>
                                    <select value={filterYear} onChange={e => setFilterYear(e.target.value)} className="bg-gray-800 border border-gray-700 text-white text-xs rounded p-1.5 w-32 outline-none focus:border-indigo-500">
                                        {uniqueYears.map(y => <option key={y} value={y}>{y}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-[10px] text-gray-500 uppercase font-bold mb-1">Sección</label>
                                    <select value={filterSection} onChange={e => setFilterSection(e.target.value)} className="bg-gray-800 border border-gray-700 text-white text-xs rounded p-1.5 w-24 outline-none focus:border-indigo-500">
                                        {uniqueSections.map(s => <option key={s} value={s}>{s}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-[10px] text-gray-500 uppercase font-bold mb-1">Tema / Unidad</label>
                                    <select value={filterTopic} onChange={e => setFilterTopic(e.target.value)} className="bg-gray-800 border border-gray-700 text-white text-xs rounded p-1.5 w-48 outline-none focus:border-indigo-500">
                                        {uniqueTopics.map(t => <option key={t} value={t}>{t}</option>)}
                                    </select>
                                </div>
                            </div>
                            <button onClick={openCreateModal} className="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 text-xs font-bold rounded-lg shadow-lg shadow-indigo-600/20 transition-all flex items-center gap-2">
                                <Save size={14} /> Añadir Nota
                            </button>
                        </div>

                        {/* TABLA DE AUDITORÍA */}
                        <div className="flex-1 overflow-auto custom-scrollbar p-4 bg-[#111827]">
                            <table className="w-full text-left text-sm text-gray-400 relative">
                                <thead className="text-xs text-gray-500 uppercase bg-gray-800 sticky top-0 shadow-sm z-10">
                                    <tr>
                                        <th className="px-4 py-3 rounded-tl-lg">Estudiante</th>
                                        <th className="px-4 py-3">Año / Secc.</th>
                                        <th className="px-4 py-3">Tema</th>
                                        <th className="px-4 py-3">Evaluación</th>
                                        <th className="px-4 py-3 text-center">Nota</th>
                                        <th className="px-4 py-3 text-center rounded-tr-lg">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredGrades.length === 0 ? (
                                        <tr><td colSpan="6" className="text-center py-8 text-gray-500">No hay registros que coincidan con los filtros.</td></tr>
                                    ) : (
                                        filteredGrades.map((g, i) => (
                                            <tr key={i} className="border-b border-gray-800 hover:bg-gray-800/50 transition-colors">
                                                <td className="px-4 py-3 font-medium text-gray-200">{g.student}</td>
                                                <td className="px-4 py-3 text-xs">{g.year || 'Gral.'} - {g.section || 'U'}</td>
                                                <td className="px-4 py-3 text-xs text-purple-400">{g.topic || 'Sin Asignar'}</td>
                                                <td className="px-4 py-3 text-blue-400 font-mono text-xs">{g.challenge}</td>
                                                <td className="px-4 py-3 text-center">
                                                    <span className={`px-2 py-1 rounded text-xs font-bold ${g.status.includes('Aprobado') ? 'bg-green-900/30 text-green-400' : 'bg-red-900/30 text-red-400'}`}>
                                                        {g.score}
                                                    </span>
                                                </td>
                                                <td className="px-4 py-3 flex justify-center gap-2">
                                                    <button onClick={() => openEditModal(g)} className="p-1.5 bg-gray-700 hover:bg-blue-600 rounded text-gray-300 hover:text-white transition-colors" title="Editar Nota"><Settings size={14}/></button>
                                                    <button onClick={() => handleDeleteGrade(g.timestamp)} className="p-1.5 bg-gray-700 hover:bg-red-600 rounded text-gray-300 hover:text-white transition-colors" title="Eliminar Registro"><Trash2 size={14}/></button>
                                                </td>
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* MODAL SECUNDARIO: FORMULARIO CRUD */}
                    {showManualForm && (
                        <div className="fixed inset-0 z-[150] flex items-center justify-center bg-black/60 backdrop-blur-sm animate-fade-in">
                            <div className="bg-gray-800 border border-indigo-500/50 rounded-xl p-6 w-[450px] shadow-2xl">
                                <h3 className="text-white font-bold text-lg mb-4 flex items-center gap-2">
                                    <Settings size={18} className="text-indigo-400"/> 
                                    {isEditing ? 'Editar Calificación' : 'Nueva Calificación'}
                                </h3>
                                
                                <div className="space-y-3">
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-xs text-gray-400 mb-1">Nombre del Estudiante</label>
                                            <input type="text" className="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white outline-none focus:border-indigo-500 text-sm" value={manualData.student} onChange={e => setManualData({...manualData, student: e.target.value})} autoFocus/>
                                        </div>
                                        <div>
                                            <label className="block text-xs text-gray-400 mb-1">Puntaje Final (0-20)</label>
                                            <input type="number" className="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white outline-none focus:border-indigo-500 text-sm font-mono text-center" value={manualData.score} onChange={e => setManualData({...manualData, score: e.target.value})} />
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-xs text-gray-400 mb-1">Año de Cursado</label>
                                            <input type="text" placeholder="Ej: 4to Año" className="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white outline-none focus:border-indigo-500 text-sm" value={manualData.year} onChange={e => setManualData({...manualData, year: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="block text-xs text-gray-400 mb-1">Sección</label>
                                            <input type="text" placeholder="Ej: A" className="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white outline-none focus:border-indigo-500 text-sm" value={manualData.section} onChange={e => setManualData({...manualData, section: e.target.value})} />
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-xs text-gray-400 mb-1">Tema / Unidad Académica</label>
                                        <input type="text" placeholder="Ej: Condicionales en Python" className="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white outline-none focus:border-indigo-500 text-sm" value={manualData.topic} onChange={e => setManualData({...manualData, topic: e.target.value})} />
                                    </div>

                                    <div>
                                        <label className="block text-xs text-gray-400 mb-1">Nombre de la Evaluación</label>
                                        <input type="text" placeholder="Ej: Examen Práctico 1" className="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white outline-none focus:border-indigo-500 text-sm" value={manualData.challenge} onChange={e => setManualData({...manualData, challenge: e.target.value})} />
                                    </div>
                                </div>

                                <div className="flex justify-end gap-3 mt-6 pt-4 border-t border-gray-700">
                                    <button onClick={() => setShowManualForm(false)} className="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-gray-300 rounded-lg text-xs font-bold transition-colors">Cancelar</button>
                                    <button onClick={handleSaveManualGrade} disabled={loading} className={`px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-xs font-bold shadow-lg shadow-indigo-600/20 transition-all ${loading ? 'opacity-50' : ''}`}>
                                        {loading ? 'Procesando...' : (isEditing ? 'Actualizar Nota' : 'Guardar Nota')}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const TerminalLog = ({ logs, isWaitingInput, terminalInput, setTerminalInput, handleTerminalSubmit }) => {
            const endRef = useRef(null);
            useEffect(() => endRef.current?.scrollIntoView({ behavior: "smooth" }), [logs, isWaitingInput]);
            return (
                <div className="vscode-terminal p-3 h-full overflow-y-auto text-sm flex flex-col">
                    <div className="flex-1">
                        {logs.map((log, i) => {
                            let cl = 'text-gray-400';
                            if (log.type === 'error') cl = 'text-red-400'; else if (log.type === 'warn') cl = 'text-yellow-400'; else if (log.type === 'success') cl = 'text-green-400'; else if (log.type === 'output') cl = 'text-white';
                            return <div key={i} className={`whitespace-pre-wrap break-words mb-0.5 ${cl}`}>{log.type !== 'output' && <span className="opacity-50 text-xs mr-2 select-none">[{log.time}]</span>}<span>{log.msg}</span></div>;
                        })}
                        {isWaitingInput && (
                            <div className="flex items-center mt-1 animate-fade-in">
                                <span className="text-blue-400 font-bold mr-2 animate-pulse">❯</span>
                                <input 
                                    autoFocus
                                    type="text"
                                    className="flex-1 bg-transparent border-none outline-none text-yellow-300 font-mono"
                                    value={terminalInput}
                                    onChange={e => setTerminalInput(e.target.value)}
                                    onKeyDown={handleTerminalSubmit}
                                    placeholder="Escribe tu respuesta y presiona Enter..."
                                />
                            </div>
                        )}
                        <div ref={endRef} />
                    </div>
                </div>
            );
        };

        const SidebarBtn = ({ label, icon: Icon, color, nodeType, onDragStart }) => (
            <div className="w-full text-left p-2 hover:bg-gray-800 rounded-md flex items-center gap-3 text-sm transition-colors group cursor-grab active:cursor-grabbing" draggable onDragStart={(e) => onDragStart(e, nodeType, label)}>
                <Icon size={16} className={`${color} group-hover:scale-110 transition-transform`} /><span className="text-gray-300 group-hover:text-white">{label}</span>
            </div>
        );

        const BaseNode = ({ data, title, icon: Icon, color, children }) => (
            // El aura roja reacciona dinámicamente si el backend manda error
            <div className={`relative transition-all duration-300 ${data?.error ? 'ring-2 ring-red-500 shadow-[0_0_15px_rgba(239,68,68,0.8)] rounded-lg scale-[1.02]' : ''}`}>
                <div className={`forest-node-header ${color} text-white`}><Icon size={16} /><span>{title}</span></div>
                <div className="forest-node-body">{children}</div>
                <Handle type="target" position="left" className="!bg-gray-400 !w-3 !h-3 hover:!bg-white" />
                <Handle type="source" position="right" className="!bg-blue-500 !w-3 !h-3 hover:!bg-white" />
                
                {/* Cartel flotante indicando el error de sintaxis al estudiante */}
                {data?.errorMsg && (
                    <div className="absolute -bottom-10 left-0 text-red-200 font-bold text-[11px] bg-red-950/90 border border-red-500 px-3 py-1.5 rounded-lg z-50 whitespace-nowrap animate-fade-in shadow-xl backdrop-blur-sm">
                        {data.errorMsg}
                    </div>
                )}
            </div>
        );

        const NODE_COLORS = {
            py_var: '#ca8a04', py_print: '#4b5563', py_if: '#ea580c', py_loop: '#c2410c', py_math: '#0d9488', py_func: '#7c3aed',
            default: '#6b7280'
        };

        const SmartEdge = ({ id, source, target, sourceX, sourceY, targetX, targetY, sourcePosition, targetPosition, style = {}, markerEnd, data }) => {
            const sourceNode = useStore(s => s.nodeInternals.get(source));
            const targetNode = useStore(s => s.nodeInternals.get(target));
            const [edgePath] = getBezierPath({ sourceX, sourceY, sourcePosition, targetX, targetY, targetPosition });
            const status = data?.status || 'idle'; 
            const colorSrc = NODE_COLORS[sourceNode?.type] || NODE_COLORS.default;
            const colorTgt = NODE_COLORS[targetNode?.type] || NODE_COLORS.default;
            let edgeStyle = { ...style };
            let gradientId = `grad-${id}`;

            if (status === 'error') edgeStyle.stroke = '#f97316'; 
            else if (status === 'active') edgeStyle.stroke = `url(#${gradientId})`;
            else { edgeStyle.stroke = '#4b5563'; edgeStyle.opacity = 0.5; }

            return (
                <>
                    <defs><linearGradient id={gradientId} x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stopColor={colorSrc} /><stop offset="100%" stopColor={colorTgt} /></linearGradient></defs>
                    <BaseEdge path={edgePath} markerEnd={markerEnd} style={edgeStyle} className={status === 'active' ? 'edge-path-active' : status === 'error' ? 'edge-path-error' : 'edge-path-idle'} />
                </>
            );
        };
        
        const edgeTypes = { smart: SmartEdge };

        // Nota: Se añade "data={data}" a cada BaseNode para que reciban la señal de error
        const nodeTypes = {
            py_var: ({ data, id }) => <BaseNode data={data} title="Variable" icon={Variable} color="bg-yellow-600"><div className="flex gap-2 items-center"><input name="var_name" placeholder="x" className="node-input nodrag w-1/3" value={data.var_name||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><span className="font-bold">=</span><input name="value" placeholder="10" className="node-input nodrag" value={data.value||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div></BaseNode>,
            py_print: ({ data, id }) => <BaseNode data={data} title="Print (Imprimir)" icon={Terminal} color="bg-gray-600"><input name="content" placeholder="msg" className="node-input nodrag" value={data.content||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></BaseNode>,
            py_if: ({ data, id }) => <BaseNode data={data} title="If (Si)" icon={Split} color="bg-orange-600"><input name="condition" placeholder="x > 5" className="node-input nodrag" value={data.condition||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><div className="text-[10px] text-gray-300 mt-1">Conectar a derecha</div></BaseNode>,
            py_elif: ({ data, id }) => <BaseNode data={data} title="Else If (Tambien)" icon={Split} color="bg-orange-500"><input name="condition" placeholder="x == 5" className="node-input nodrag mb-1" value={data.condition||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><div className="text-[10px] text-gray-300">Conectar a derecha</div></BaseNode>,
            py_else: ({ data, id }) => <BaseNode data={data} title="Else (Sino)" icon={Split} color="bg-red-700"><div className="text-[10px] text-gray-300">Conectar a derecha</div></BaseNode>,
            py_loop: ({ data, id }) => <BaseNode data={data} title="For (Por 'x' en tal Rango)" icon={Repeat} color="bg-orange-700"><div className="flex gap-1 items-center mb-1"><span>for</span><input name="iterator" placeholder="i" className="node-input nodrag w-14 p-0 text-center" value={data.iterator || ''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><span>in</span></div><input name="iterable" placeholder="range(10)" className="node-input nodrag" value={data.iterable||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></BaseNode>,
            py_while: ({ data, id }) => <BaseNode data={data} title="While (Mientras)" icon={RefreshCw} color="bg-orange-800"><input name="condition" placeholder="cond" className="node-input nodrag" value={data.condition||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></BaseNode>,
            py_math: ({ data, id }) => <BaseNode data={data} title="Math (Operaciones)" icon={Calculator} color="bg-teal-600"><div className="flex gap-1"><input name="left" className="node-input nodrag w-1/3" value={data.left||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><select name="op" className="node-input nodrag w-1/4 p-0 text-center" value={data.op||'+'} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})}><option>+</option><option>-</option><option>*</option><option>/</option></select><input name="right" className="node-input nodrag w-1/3" value={data.right||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div><div className="mt-1 flex items-center gap-1"><span className="text-xs">Save:</span><input name="target" placeholder="res" className="node-input nodrag" value={data.target||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div></BaseNode>,
            py_compare: ({ data, id }) => <BaseNode data={data} title="Compare (Comparar)" icon={CheckSquare} color="bg-cyan-700"><div className="flex gap-1"><input name="left" className="node-input nodrag w-1/3" value={data.left||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><select name="op" className="node-input nodrag w-1/4 p-0 text-center" value={data.op||'=='} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})}><option>==</option><option>&gt;</option><option>&lt;</option></select><input name="right" className="node-input nodrag w-1/3" value={data.right||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div></BaseNode>,
            py_func: ({ data, id }) => <BaseNode data={data} title="Function (Funcion)" icon={FunctionSquare} color="bg-violet-600"><input name="func_name" placeholder="name" className="node-input nodrag mb-1" value={data.func_name||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><input name="args" placeholder="args" className="node-input nodrag" value={data.args||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></BaseNode>,
            py_call: ({ data, id }) => <BaseNode data={data} title="Llamar Función/Método" icon={Play} color="bg-rose-600"><div className="flex items-center gap-1 mb-1"><input name="func" placeholder="obj.metodo" className="node-input nodrag w-24" value={data.func !== undefined ? data.func : ''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><span className="font-mono text-xs text-rose-200">(</span><input name="args" placeholder="args..." className="node-input nodrag w-16" value={data.args !== undefined ? data.args : ''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><span className="font-mono text-xs text-rose-200">)</span></div></BaseNode>,
            py_return: ({ data, id }) => <BaseNode data={data} title="Return (Retornar)" icon={ArrowLeft} color="bg-rose-600"><input name="value" placeholder="val" className="node-input nodrag" value={data.value||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></BaseNode>,
            py_control: ({ data, id }) => <BaseNode data={data} title="Control" icon={XCircle} color="bg-red-800"><select name="control_type" className="node-input nodrag" value={data.control_type||'break'} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})}><option value="break">Break</option><option value="continue">Continue</option><option value="pass">Pass</option></select></BaseNode>,
            py_input: ({ data, id }) => <BaseNode data={data} title="Input (Escribir)" icon={Keyboard} color="bg-slate-600"><input name="prompt" placeholder="msg" className="node-input nodrag mb-1" value={data.prompt||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><input name="target" placeholder="var" className="node-input nodrag" value={data.target||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></BaseNode>,
            py_int: ({ data, id }) => <BaseNode data={data} title="To Integer (Enteros)" icon={Code} color="bg-pink-700"><div className="flex gap-1 items-center mb-1"><span className="text-xs font-mono">int(</span><input name="value" placeholder="var" className="node-input nodrag w-16" value={data.value||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><span className="text-xs font-mono">)</span></div><div className="flex items-center gap-1"><span className="text-xs">Save:</span><input name="target" placeholder="res" className="node-input nodrag" value={data.target||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div></BaseNode>,
            py_float: ({ data, id }) => <BaseNode data={data} title="To Decimal (Decimales)" icon={Code} color="bg-pink-600"><div className="flex gap-1 items-center mb-1"><span className="text-xs font-mono">float(</span><input name="value" placeholder="var" className="node-input nodrag w-16" value={data.value||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><span className="text-xs font-mono">)</span></div><div className="flex items-center gap-1"><span className="text-xs">Save:</span><input name="target" placeholder="res" className="node-input nodrag" value={data.target||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div></BaseNode>,
            py_class: ({ data, id }) => <BaseNode data={data} title="Class (Clases)" icon={Box} color="bg-indigo-700"><input name="name" placeholder="Name" className="node-input nodrag mb-1" value={data.name||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><input name="bases" placeholder="Inherits" className="node-input nodrag" value={data.bases||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></BaseNode>,
            py_init: ({ data, id }) => <BaseNode data={data} title="Constructor (__init__)" icon={FunctionSquare} color="bg-indigo-600"><div className="flex gap-1 items-center mb-1"><span className="text-xs font-mono">def __init__(</span><input name="args" placeholder="self" className="node-input nodrag w-16" value={data.args !== undefined ? data.args : 'self'} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><span className="text-xs font-mono">):</span></div><div className="text-[10px] text-gray-300 mt-1">Conectar a derecha</div></BaseNode>,
            py_self: ({ data, id }) => <BaseNode data={data} title="Atributo (self)" icon={Box} color="bg-indigo-500"><div className="flex items-center gap-1 mb-1"><span className="font-mono text-xs font-bold text-indigo-200">self.</span><input name="attr" placeholder="nombre" className="node-input nodrag w-20" value={data.attr !== undefined ? data.attr : ''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><span className="font-bold text-white">=</span><input name="value" placeholder="val" className="node-input nodrag w-20" value={data.value !== undefined ? data.value : ''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div></BaseNode>,
            py_import: ({ data, id }) => <BaseNode data={data} title="Import (Importar)" icon={Package} color="bg-sky-700"><div className="flex gap-1 mb-1"><span className="text-xs">from</span><input name="from" className="node-input nodrag" value={data.from||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div><div className="flex gap-1"><span className="text-xs">import</span><input name="names" className="node-input nodrag" value={data.names||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div></BaseNode>,
            py_try: ({ data, id }) => <BaseNode data={data} title="Try (Intentar)" icon={AlertTriangle} color="bg-amber-600"><div className="text-[10px] text-gray-300">Conectar a derecha</div></BaseNode>,
            py_except: ({ data, id }) => <BaseNode data={data} title="Except (Error)" icon={AlertTriangle} color="bg-amber-700"><input name="error_type" placeholder="Exception as e" className="node-input nodrag mb-1" value={data.error_type !== undefined ? data.error_type : 'Exception as e'} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><div className="text-[10px] text-gray-300">Conectar a derecha</div></BaseNode>,
        };

        // COMPONENTE MODAL PERSONALIZADO
        const CustomModal = ({ isOpen, type, title, message, onConfirm, onCancel }) => {
            const [inputVal, setInputVal] = useState("");

            useEffect(() => { if (isOpen) setInputVal(""); }, [isOpen]);

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/70 backdrop-blur-sm animate-fade-in">
                    <div className="bg-gray-800 border border-gray-600 rounded-xl shadow-2xl w-96 p-6 transform transition-all scale-100">
                        <div className="flex items-center gap-3 mb-4">
                            <div className="bg-blue-600 p-2 rounded-lg">
                                {type === 'prompt' || type === 'confirm' ? <Save size={20} className="text-white"/> : <AlertTriangle size={20} className="text-white"/>}
                            </div>
                            <h3 className="text-lg font-bold text-white">{title || "EduBot Forest Studio"}</h3>
                        </div>

                        <p className="text-gray-300 text-sm mb-4">{message}</p>

                        {type === 'prompt' && (
                            <input 
                                autoFocus
                                type="text" 
                                className="w-full bg-gray-900 border border-gray-600 rounded-lg p-2 text-white outline-none focus:border-blue-500 mb-6 transition-colors"
                                placeholder="Escribe aquí..."
                                value={inputVal}
                                onChange={(e) => setInputVal(e.target.value)}
                                onKeyDown={(e) => { if (e.key === 'Enter') onConfirm(inputVal); }}
                            />
                        )}

                        <div className="flex justify-end gap-3">
                            {type !== 'alert' && (
                                <button 
                                    onClick={onCancel}
                                    className="px-4 py-2 rounded-lg text-sm text-gray-400 hover:text-white hover:bg-gray-700 transition-colors"
                                >
                                    Cancelar
                                </button>
                            )}
                            <button 
                                onClick={() => type === 'prompt' ? onConfirm(inputVal) : onConfirm()}
                                className="px-4 py-2 rounded-lg text-sm bg-blue-600 hover:bg-blue-500 text-white font-semibold shadow-lg shadow-blue-500/20 transition-all"
                            >
                                {type === 'alert' ? 'Entendido' : 'Aceptar'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const WelcomeScreen = ({ onNew, onOpen, showModal, closeModal }) => {
            const [viewState, setViewState] = useState(localStorage.getItem('edubot_role') ? 'menu' : 'role_select'); 
            const [inputUser, setInputUser] = useState('');
            const [inputPwd, setInputPwd] = useState('');
            const [inputName, setInputName] = useState('');
            const [adminPwd, setAdminPwd] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            // Estados unificados de Gestión Administrativa
            const [accounts, setAccounts] = useState({ teachers: [], students: [] });
            const [editingAccount, setEditingAccount] = useState(null);
            const [creatingAccountType, setCreatingAccountType] = useState(null);
            const [adminFormData, setAdminFormData] = useState({ name: '', username: '', password: '' });

            const isValidName = (name) => /^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$/.test(name);
            const isValidTeacherUser = (user) => /^(?=.*[a-zA-Z])[a-zA-Z0-9._-]{3,15}$/.test(user);
            const isValidStudentUser = (user) => /^(?=.*[a-zA-Z])[a-zA-Z0-9]{3,8}$/.test(user);
            const isValidPassword = (pwd) => pwd.length >= 8;

            const handleRoleSelect = (role) => {
                setViewState(role === 'student' ? 'login_student' : 'login_teacher');
                setInputUser(''); setInputPwd(''); setInputName(''); setAdminPwd(''); setError('');
            };

            const performLogin = async (isTeacher) => {
                if (!inputUser.trim() || !inputPwd.trim()) { setError("Usuario y contraseña son requeridos."); return; }
                setLoading(true); setError('');

                try {
                    const res = isTeacher 
                        ? await window.eel.api_login_teacher(inputUser, inputPwd)()
                        : await window.eel.api_login_student(inputUser, inputPwd)();

                    if (res.success) {
                        localStorage.setItem('edubot_role', isTeacher ? 'teacher' : 'student');
                        localStorage.setItem('edubot_username', inputUser);
                        if (!isTeacher) localStorage.setItem('edubot_student_name', res.name);
                        
                        showModal({
                            type: 'alert', title: isTeacher ? '¡Bienvenido Profesor!' : '¡Bienvenido a EduBot!',
                            message: isTeacher ? 'Has iniciado sesión exitosamente en el panel de control.' : `Sesión iniciada correctamente como: ${res.name}`,
                            onConfirm: () => { closeModal(); setViewState('menu'); }
                        });
                    } else { setError(res.error); showModal({ type: 'alert', title: 'Acceso Denegado', message: res.error, onConfirm: closeModal }); }
                } catch (e) { setError("Error de conexión: " + e); }
                setLoading(false);
            };

            const performRegister = async (isTeacher) => {
                if (!inputUser.trim() || !inputPwd.trim() || !inputName.trim()) { setError("Todos los campos son requeridos"); return; }
                if (!isValidName(inputName)) { setError("El nombre solo debe contener letras y espacios."); return; }
                if (isTeacher && !isValidTeacherUser(inputUser)) { setError("El usuario debe tener entre 3 y 15 caracteres, contener al menos una letra, y no usar símbolos extraños."); return; }
                if (!isTeacher && !isValidStudentUser(inputUser)) { setError("El usuario debe ser alfanumérico (3 a 8 caracteres) y contener obligatoriamente al menos una letra."); return; }
                if (!isValidPassword(inputPwd)) { setError("La contraseña debe tener al menos 8 caracteres."); return; }

                setLoading(true);
                try {
                    const res = isTeacher ? await window.eel.api_create_teacher(inputUser, inputPwd, inputName)() : await window.eel.api_create_student(inputUser, inputPwd, inputName)();
                    if (res.success) {
                        showModal({ type: 'alert', title: '¡Registro Exitoso!', message: `La cuenta para ${inputName} ha sido creada correctamente. Ya puedes iniciar sesión.`, onConfirm: () => { closeModal(); setViewState(isTeacher ? 'login_teacher' : 'login_student'); setError(''); setInputPwd(''); }});
                    } else { setError(res.error); showModal({ type: 'alert', title: 'Error en el Registro', message: res.error, onConfirm: closeModal }); }
                } catch (e) { setError("Error del Servidor: " + e); }
                setLoading(false);
            };

            const loadAccounts = async () => { 
                const res = await window.eel.api_get_all_accounts()(); 
                if (res.success) setAccounts({ teachers: res.teachers || [], students: res.students || [] }); 
            };

            const performAdminLogin = async () => {
                if (!adminPwd.trim()) return;
                setLoading(true);
                const res = await window.eel.api_check_admin_access(adminPwd)();
                if (res.success) { 
                    setViewState('admin_dashboard'); 
                    loadAccounts(); 
                    setError(''); 
                } else { setError("Contraseña maestra incorrecta"); }
                setLoading(false);
            };

            const performResetPassword = async (isTeacher) => {
                if (!inputUser.trim() || !inputName.trim() || !inputPwd.trim()) { setError("Todos los campos son requeridos"); return; }
                if (!isValidPassword(inputPwd)) { setError("La nueva contraseña debe tener al menos 8 caracteres."); return; }
                
                setLoading(true);
                try {
                    const res = await window.eel.api_reset_password(inputUser, inputName, inputPwd, isTeacher ? 'teacher' : 'student')();
                    if (res.success) {
                        showModal({ type: 'alert', title: '¡Contraseña Restaurada!', message: 'Tu contraseña ha sido actualizada exitosamente. Ya puedes iniciar sesión.', onConfirm: () => { closeModal(); setViewState(isTeacher ? 'login_teacher' : 'login_student'); setInputPwd(''); setError(''); }});
                    } else { setError(res.error); }
                } catch (e) { setError("Error del servidor: " + e); }
                setLoading(false);
            };

            const handleDeleteAccount = (username, role) => {
                showModal({
                    type: 'confirm', title: 'Eliminar Cuenta',
                    message: `¿Estás seguro de eliminar permanentemente la cuenta de '${username}'? Esta acción es irreversible.`,
                    onConfirm: async () => {
                        closeModal();
                        const res = await window.eel.api_delete_account(username, role)();
                        if (res.success) {
                            loadAccounts();
                            setTimeout(() => showModal({ type: 'alert', title: 'Cuenta Eliminada', message: `La cuenta de ${username} ha sido borrada del sistema.`, onConfirm: closeModal }), 200);
                        } else { setTimeout(() => showModal({ type: 'alert', title: 'Error al eliminar', message: res.error, onConfirm: closeModal }), 200); }
                    },
                    onCancel: closeModal
                });
            };

            const handleSaveEdit = async () => {
                const { name, username, password } = adminFormData;
                if (!name || !username) return;
                if (!isValidName(name)) { showModal({ type: 'alert', title: 'Error', message: 'Nombre inválido.', onConfirm: closeModal }); return; }
                if (editingAccount.role === 'teacher' && !isValidTeacherUser(username)) { showModal({ type: 'alert', title: 'Error', message: 'Usuario de profesor inválido.', onConfirm: closeModal }); return; }
                if (editingAccount.role === 'student' && !isValidStudentUser(username)) { showModal({ type: 'alert', title: 'Error', message: 'Usuario de estudiante inválido.', onConfirm: closeModal }); return; }
                if (password && password.length < 8) { showModal({ type: 'alert', title: 'Error', message: 'La contraseña debe tener al menos 8 caracteres.', onConfirm: closeModal }); return; }

                setLoading(true);
                const res = await window.eel.api_edit_account(editingAccount.old_username, username, name, password, editingAccount.role)();
                setLoading(false);

                if (res.success) {
                    setEditingAccount(null);
                    loadAccounts();
                    setTimeout(() => showModal({ type: 'alert', title: 'Éxito', message: 'Cuenta actualizada correctamente.', onConfirm: closeModal }), 200);
                } else { showModal({ type: 'alert', title: 'Error', message: res.error, onConfirm: closeModal }); }
            };

            const handleCreateAccount = async () => {
                const { name, username, password } = adminFormData;
                if (!name || !username || !password) { showModal({ type: 'alert', title: 'Error', message: 'Todos los campos son obligatorios.', onConfirm: closeModal }); return; }
                if (!isValidName(name)) { showModal({ type: 'alert', title: 'Error', message: 'Nombre inválido.', onConfirm: closeModal }); return; }
                if (creatingAccountType === 'teacher' && !isValidTeacherUser(username)) { showModal({ type: 'alert', title: 'Error', message: 'Usuario de profesor inválido.', onConfirm: closeModal }); return; }
                if (creatingAccountType === 'student' && !isValidStudentUser(username)) { showModal({ type: 'alert', title: 'Error', message: 'Usuario de estudiante inválido.', onConfirm: closeModal }); return; }
                if (password.length < 8) { showModal({ type: 'alert', title: 'Error', message: 'La contraseña debe tener al menos 8 caracteres.', onConfirm: closeModal }); return; }

                setLoading(true);
                const res = creatingAccountType === 'teacher'
                    ? await window.eel.api_create_teacher(username, password, name)()
                    : await window.eel.api_create_student(username, password, name)();
                setLoading(false);

                if (res.success) {
                    setCreatingAccountType(null);
                    loadAccounts();
                    setTimeout(() => showModal({ type: 'alert', title: 'Cuenta Creada', message: `La cuenta de ${name} fue registrada con éxito.`, onConfirm: closeModal }), 200);
                } else { showModal({ type: 'alert', title: 'Error', message: res.error, onConfirm: closeModal }); }
            };

            const renderContent = () => {
                if (viewState === 'menu') {
                    return (
                        <div className="space-y-3 animate-fade-in">
                            <div className="text-sm text-gray-400 mb-4">
                                Conectado como: <span className="text-white font-bold">{localStorage.getItem('edubot_role') === 'teacher' ? 'Profesor' : localStorage.getItem('edubot_student_name')}</span>
                                <button onClick={() => { 
                                    showModal({ type: 'confirm', title: 'Cerrar Sesión', message: '¿Estás seguro de que deseas cerrar tu sesión actual?', onConfirm: () => { closeModal(); localStorage.removeItem('edubot_role'); localStorage.removeItem('edubot_student_name'); setViewState('role_select'); }, onCancel: closeModal });
                                }} className="ml-2 text-xs text-red-400 hover:text-red-300 hover:underline">(Salir)</button>
                            </div>
                            <button onClick={onNew} className="w-full flex items-center justify-center gap-3 p-4 bg-gray-700 hover:bg-gray-600 rounded-xl transition-all border border-gray-600 hover:border-gray-500 group"><Code className="text-yellow-400 group-hover:scale-110 transition-transform" /><div className="text-left"><div className="font-semibold">Nuevo Proyecto Python</div><div className="text-xs text-gray-400">Aprender lógica de programación</div></div></button>
                            <button onClick={onOpen} className="w-full flex items-center justify-center gap-3 p-4 bg-gray-700 hover:bg-gray-600 rounded-xl transition-all border border-gray-600 hover:border-gray-500 group"><FolderOpen className="text-purple-400 group-hover:scale-110 transition-transform" /><div className="text-left"><div className="font-semibold">Abrir Proyecto</div><div className="text-xs text-gray-400">Cargar tu entorno de bloques</div></div></button>
                        </div>
                    );
                }

                if (viewState === 'role_select') {
                    return (
                        <div className="space-y-4 animate-fade-in">
                            <h2 className="text-xl font-semibold text-white">¿Quién eres?</h2>
                            <div className="grid grid-cols-2 gap-4">
                                <button onClick={() => handleRoleSelect('student')} className="flex flex-col items-center gap-2 p-4 bg-gray-700 hover:bg-gray-600 rounded-xl border border-gray-600 hover:border-blue-500 transition-all"><Users size={32} className="text-blue-400" /><span className="font-bold">Estudiante</span></button>
                                <button onClick={() => handleRoleSelect('teacher')} className="flex flex-col items-center gap-2 p-4 bg-gray-700 hover:bg-gray-600 rounded-xl border border-gray-600 hover:border-indigo-500 transition-all"><Settings size={32} className="text-indigo-400" /><span className="font-bold">Profesor</span></button>
                            </div>
                        </div>
                    );
                }

                if (viewState === 'register_teacher' || viewState === 'register_student') {
                    const isTeacher = viewState === 'register_teacher';
                    return (
                        <div className="space-y-3 animate-fade-in text-left">
                            <div className="flex items-center gap-2 text-gray-400 cursor-pointer hover:text-white mb-2" onClick={() => setViewState(isTeacher ? 'login_teacher' : 'login_student')}><ArrowLeft size={16} /> <span>Volver</span></div>
                            <h2 className="text-xl font-semibold text-white text-center">{isTeacher ? 'Nuevo Profesor' : 'Nuevo Estudiante'}</h2>
                            <div>
                                <label className="block text-xs text-gray-400 mb-1">Nombre Completo (Solo letras)</label>
                                <input type="text" className="w-full bg-gray-900 border border-gray-600 rounded-lg p-2 text-white outline-none focus:border-blue-500" placeholder="Ej: Juan Pérez" value={inputName} onChange={(e) => setInputName(e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-xs text-gray-400 mb-1">Usuario {isTeacher ? '(Máx 15)' : '(Alfanumérico, Máx 8)'}</label>
                                <input type="text" className="w-full bg-gray-900 border border-gray-600 rounded-lg p-2 text-white outline-none focus:border-blue-500" placeholder={isTeacher ? "Ej: pedro.prof" : "Ej: juan123"} value={inputUser} onChange={(e) => setInputUser(e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-xs text-gray-400 mb-1">Contraseña (Mínimo 8 caracteres)</label>
                                <input type="password" className="w-full bg-gray-900 border border-gray-600 rounded-lg p-2 text-white outline-none focus:border-blue-500" placeholder="••••••" value={inputPwd} onChange={(e) => setInputPwd(e.target.value)} />
                            </div>
                            {error && <div className="text-red-400 text-xs bg-red-900/20 p-2 rounded border border-red-900/50">{error}</div>}
                            <button onClick={() => performRegister(isTeacher)} disabled={loading} className={`w-full py-2 mt-2 rounded-lg font-bold shadow-lg transition-all bg-green-600 hover:bg-green-500 text-white shadow-green-500/20 ${loading ? 'opacity-50 cursor-not-allowed' : ''}`}>{loading ? 'Registrando...' : 'Crear Cuenta'}</button>
                        </div>
                    );
                }

                if (viewState === 'admin_auth') {
                    return (
                        <div className="space-y-4 animate-fade-in">
                            <div className="flex items-center gap-2 text-gray-400 cursor-pointer hover:text-white mb-2" onClick={() => setViewState('login_teacher')}><ArrowLeft size={16} /> <span>Volver</span></div>
                            <h2 className="text-xl font-semibold text-red-400 flex items-center justify-center gap-2"><Settings size={20}/> Administración</h2>
                            <p className="text-xs text-gray-400">Ingresa la contraseña maestra del sistema.</p>
                            <input type="password" className="w-full bg-gray-900 border border-red-900/50 rounded-lg p-3 text-white outline-none focus:border-red-500 transition-colors" placeholder="Master Password" value={adminPwd} onChange={(e) => setAdminPwd(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && performAdminLogin()} autoFocus />
                            {error && <div className="text-red-400 text-xs bg-red-900/20 p-2 rounded border border-red-900/50">{error}</div>}
                            <button onClick={performAdminLogin} disabled={loading} className="w-full py-2 rounded-lg font-bold bg-red-700 hover:bg-red-600 text-white shadow-lg shadow-red-900/20 transition-all">Acceder</button>
                        </div>
                    );
                }

                if (viewState === 'admin_dashboard') {
                    return (
                        <div className="space-y-4 animate-fade-in text-left">
                            <div className="flex items-center justify-between mb-2">
                                <h2 className="text-lg font-semibold text-white">Gestión de Cuentas</h2>
                                <button onClick={() => setViewState('login_teacher')} className="text-xs text-gray-400 hover:text-white">Cerrar</button>
                            </div>
                            
                            {(editingAccount || creatingAccountType) ? (
                                <div className="bg-gray-800 p-4 rounded-lg border border-gray-600 shadow-xl">
                                    <h4 className="text-white font-bold mb-3">{editingAccount ? `Editar ${editingAccount.role === 'teacher' ? 'Profesor' : 'Estudiante'}` : `Crear Nuevo ${creatingAccountType === 'teacher' ? 'Profesor' : 'Estudiante'}`}</h4>
                                    <div className="space-y-2 mb-4">
                                        <input type="text" placeholder="Nombre Completo" className="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white outline-none focus:border-blue-500" value={adminFormData.name} onChange={e=>setAdminFormData({...adminFormData, name: e.target.value})} />
                                        <input type="text" placeholder="Usuario" className="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white outline-none focus:border-blue-500" value={adminFormData.username} onChange={e=>setAdminFormData({...adminFormData, username: e.target.value})} />
                                        <input type="password" placeholder={editingAccount ? "Nueva Contraseña (Vacío para no cambiar)" : "Contraseña (Mín 8)"} className="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white outline-none focus:border-blue-500" value={adminFormData.password} onChange={e=>setAdminFormData({...adminFormData, password: e.target.value})} />
                                    </div>
                                    <div className="flex gap-2 justify-end">
                                        <button onClick={() => {setEditingAccount(null); setCreatingAccountType(null);}} className="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-white text-xs font-bold transition-colors">Cancelar</button>
                                        <button onClick={editingAccount ? handleSaveEdit : handleCreateAccount} disabled={loading} className="px-4 py-2 bg-green-600 hover:bg-green-500 rounded-lg text-white text-xs font-bold shadow-lg shadow-green-600/20 transition-colors">{editingAccount ? 'Guardar Cambios' : 'Crear Cuenta'}</button>
                                    </div>
                                </div>
                            ) : (
                                <>
                                    <div className="flex gap-2 mb-2">
                                        <button onClick={() => { setAdminFormData({name:'', username:'', password:''}); setCreatingAccountType('teacher'); }} className="flex-1 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-[10px] font-bold shadow-lg shadow-indigo-600/20 transition-colors flex items-center justify-center gap-1"><Users size={14}/> Añadir Profesor</button>
                                        <button onClick={() => { setAdminFormData({name:'', username:'', password:''}); setCreatingAccountType('student'); }} className="flex-1 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-[10px] font-bold shadow-lg shadow-blue-600/20 transition-colors flex items-center justify-center gap-1"><Users size={14}/> Añadir Estudiante</button>
                                    </div>
                                    <div className="bg-gray-900/50 rounded-lg border border-gray-700 max-h-48 overflow-y-auto custom-scrollbar">
                                        {(accounts.teachers.length === 0 && accounts.students.length === 0) ? <div className="p-4 text-center text-gray-500 text-xs">No hay usuarios registrados.</div> : null}
                                        {accounts.teachers.map((u, i) => (
                                            <div key={`t-${i}`} className="flex justify-between items-center p-3 border-b border-gray-800 hover:bg-gray-800/50 transition-colors">
                                                <div><div className="font-bold text-xs text-indigo-300">{u.name} (Profesor)</div><div className="text-[10px] text-gray-500 font-mono">@{u.username}</div></div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => { setEditingAccount({old_username: u.username, role: 'teacher'}); setAdminFormData({name: u.name, username: u.username, password: ''}); }} className="p-1.5 bg-gray-700 hover:bg-blue-600 rounded text-gray-300 hover:text-white transition-colors" title="Editar"><Settings size={14}/></button>
                                                    <button onClick={() => handleDeleteAccount(u.username, 'teacher')} className="p-1.5 bg-gray-700 hover:bg-red-600 rounded text-gray-300 hover:text-white transition-colors" title="Eliminar"><Trash2 size={14}/></button>
                                                </div>
                                            </div>
                                        ))}
                                        {accounts.students.map((u, i) => (
                                            <div key={`s-${i}`} className="flex justify-between items-center p-3 border-b border-gray-800 hover:bg-gray-800/50 transition-colors">
                                                <div><div className="font-bold text-xs text-blue-300">{u.name} (Estudiante)</div><div className="text-[10px] text-gray-500 font-mono">@{u.username}</div></div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => { setEditingAccount({old_username: u.username, role: 'student'}); setAdminFormData({name: u.name, username: u.username, password: ''}); }} className="p-1.5 bg-gray-700 hover:bg-blue-600 rounded text-gray-300 hover:text-white transition-colors" title="Editar"><Settings size={14}/></button>
                                                    <button onClick={() => handleDeleteAccount(u.username, 'student')} className="p-1.5 bg-gray-700 hover:bg-red-600 rounded text-gray-300 hover:text-white transition-colors" title="Eliminar"><Trash2 size={14}/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </>
                            )}
                        </div>
                    );
                }

                // VISTAS DE RECUPERACIÓN DE CONTRASEÑA
                if (viewState === 'forgot_teacher' || viewState === 'forgot_student') {
                    const isTeacher = viewState === 'forgot_teacher';
                    return (
                        <div className="space-y-4 animate-fade-in text-left">
                            <div className="flex items-center gap-2 text-gray-400 cursor-pointer hover:text-white mb-2" onClick={() => setViewState(isTeacher ? 'login_teacher' : 'login_student')}><ArrowLeft size={16} /> <span>Volver</span></div>
                            <h2 className="text-xl font-semibold text-white text-center">Recuperar Contraseña</h2>
                            <p className="text-xs text-gray-400 text-center mb-4">Para verificar tu identidad, ingresa tu usuario y el nombre completo con el que te registraste.</p>
                            
                            <input type="text" className="w-full bg-gray-900 border border-gray-600 rounded-lg p-2 text-white outline-none focus:border-blue-500 mb-2" placeholder="Usuario" value={inputUser} onChange={(e) => setInputUser(e.target.value)} />
                            <input type="text" className="w-full bg-gray-900 border border-gray-600 rounded-lg p-2 text-white outline-none focus:border-blue-500 mb-2" placeholder="Nombre Completo Exacto" value={inputName} onChange={(e) => setInputName(e.target.value)} />
                            <input type="password" className="w-full bg-gray-900 border border-gray-600 rounded-lg p-2 text-white outline-none focus:border-blue-500" placeholder="Nueva Contraseña (Mín 8)" value={inputPwd} onChange={(e) => setInputPwd(e.target.value)} />
                            
                            {error && <div className="text-red-400 text-xs bg-red-900/20 p-2 rounded border border-red-900/50">{error}</div>}
                            <button onClick={() => performResetPassword(isTeacher)} disabled={loading} className={`w-full py-2 mt-2 rounded-lg font-bold shadow-lg bg-orange-600 hover:bg-orange-500 text-white shadow-orange-500/20 ${loading ? 'opacity-50' : ''}`}>{loading ? 'Procesando...' : 'Restaurar Contraseña'}</button>
                        </div>
                    );
                }

                // VISTA DE LOGIN ESTÁNDAR
                const isTeacher = viewState === 'login_teacher';
                return (
                    <div className="space-y-4 animate-fade-in text-left">
                        <div className="flex items-center gap-2 text-gray-400 cursor-pointer hover:text-white mb-2" onClick={() => setViewState('role_select')}><ArrowLeft size={16} /> <span>Volver</span></div>
                        <h2 className="text-xl font-semibold text-white text-center">{isTeacher ? 'Acceso Profesor' : 'Acceso Estudiante'}</h2>
                        <div>
