<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBot Forest Studio - Complete Suite</title>
    
    <script type="text/javascript" src="/eel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/@xyflow/react@12.0.0-next.16/dist/style.css" rel="stylesheet">
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.3.1?dev",
                "react-dom": "https://esm.sh/react-dom@18.3.1?dev",
                "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?dev",
                "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime?dev",
                "@xyflow/react": "https://esm.sh/@xyflow/react@12.0.0-next.16?external=react,react-dom"
            }
        }
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vscode: {
                            bg: '#1e1e1e', sidebar: '#252526', activity: '#333333',
                            status: '#007acc', text: '#cccccc', textLight: '#ffffff', 
                            border: '#454545', accent: '#007fd4', hover: '#2a2d2e',
                            editor: '#1e1e1e', terminal: '#1e1e1e', tabActive: '#1e1e1e', tabInactive: '#2d2d2d'
                        },
                        node: {
                            data: '#3c8dbc', model: '#28a745', logic: '#f39c12', eval: '#9b59b6', nn: '#e74c3c',
                            py: '#3776ab' // Python Blue
                        }
                    },
                    fontFamily: { sans: ['Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'], mono: ['Fira Code', 'Consolas', 'monospace'] }
                }
            }
        }
    </script>

    <style>
        body { overflow: hidden; background-color: #1e1e1e; }
        .react-flow__node { border: none; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5); }
        .react-flow__handle { width: 10px; height: 10px; background: #fff; border: 2px solid #555; }
        .react-flow__handle:hover { background: #007acc; border-color: white; transition: 0.2s; }
        
        .edubot-node { min-width: 240px; background: #2d2d2d; border-radius: 8px; overflow: hidden; font-size: 12px; }
        .edubot-node-header { padding: 8px 12px; color: white; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .edubot-node-body { padding: 12px; color: #eee; }
        .edubot-input { width: 100%; background: #3c3c3c; border: 1px solid #555; color: white; padding: 4px; border-radius: 4px; margin-top: 4px; font-family: monospace; }
        .edubot-label { display: block; color: #aaa; margin-top: 8px; font-size: 11px; text-transform: uppercase; }
        .edubot-row { display: flex; gap: 8px; align-items: center; margin-top: 4px; }

        /* Editor Style */
        .code-editor-area {
            font-family: 'Fira Code', 'Consolas', monospace;
            line-height: 1.5;
            background-color: #1e1e1e;
            color: #d4d4d4;
            border: none;
            resize: none;
            outline: none;
            white-space: pre;
        }
        
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 5px; border: 2px solid #1e1e1e; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* Tabs styling */
        .tab-btn { padding: 8px 16px; font-size: 13px; cursor: pointer; border-right: 1px solid #333; display: flex; align-items: center; gap: 6px; }
        .tab-btn.active { background-color: #1e1e1e; color: white; border-top: 2px solid #007acc; }
        .tab-btn.inactive { background-color: #2d2d2d; color: #888; }
        .tab-btn:hover { background-color: #252526; color: #ddd; }
    </style>
</head>
<body class="bg-vscode-bg text-vscode-text font-sans select-none">
    <div id="root" class="h-screen w-screen flex flex-col"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useCallback, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { ReactFlow, Controls, Background, Handle, Position, applyNodeChanges, applyEdgeChanges, addEdge, useNodesState, useEdgesState, ReactFlowProvider } from '@xyflow/react';

        // ICONOS
        const Icons = {
            Play: ({size=16, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
            Save: ({size=16, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
            Export: ({size=16, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Trash: ({size=16, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            Bug: ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="8" height="14" x="8" y="6" rx="4"/><path d="m19 7-3 3"/><path d="m5 7 3 3"/><path d="m19 19-3-3"/><path d="m5 19 3-3"/><path d="M20 13h-4"/><path d="M4 13h4"/><path d="m10 4 1 2"/><path d="m14 4-1 2"/></svg>,
            Blocks: ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>,
            Database: ({size=14, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>,
            Tree: ({size=14, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>,
            Split: ({size=14, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
            FileCode: ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="m10 13-2 2 2 2"/><path d="m14 17 2-2-2-2"/></svg>,
            FolderOpen: ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m6 14 1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-3.25 7a2 2 0 0 1-1.8 1.17H5a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h4l2.5 2.5h7.5"/></svg>,
            GitBranch: ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>,
            X: ({size=14, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Code: ({size=16, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>,
            Brain: ({size=16, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></svg>,
            Activity: ({size=16, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
            Target: ({size=16, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
            Refresh: ({size=16, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>,
            LayoutSplit: ({size=16, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>,
            LayoutTab: ({size=16, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>,
            Terminal: ({size=16, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        };

        // HOOK PARA GESTIÓN DE ESTADO DE NODOS
        const useNodeParams = (data, defaultParams) => {
            const [params, setParams] = useState(data.params || defaultParams);
            useEffect(() => {
                data.params = params;
                if (data.onChange) data.onChange(params);
            }, [params, data]);

            const handleChange = (key, value) => {
                const val = (key.includes('name') || key === 'path' || key === 'condition' || key === 'var' || key === 'value') ? value : (parseFloat(value) || value);
                setParams(prev => ({ ...prev, [key]: val }));
            };
            return { params, handleChange, setParams };
        };

        // NODOS MACHINE LEARNING

        const DatasetNode = ({ data }) => {
            const { params, handleChange } = useNodeParams(data, { name: 'data', path: 'iris.csv' });
            return (
                <div className="edubot-node border-l-4 border-node-data">
                    <div className="edubot-node-header bg-node-data bg-opacity-20"><Icons.Database /> <span>Dataset</span></div>
                    <div className="edubot-node-body">
                        <label className="edubot-label">Nombre Variable</label>
                        <input className="edubot-input" value={params.name} onChange={e => handleChange('name', e.target.value)} />
                        <label className="edubot-label">Archivo CSV</label>
                        <select className="edubot-input cursor-pointer" value={params.path} onChange={e => handleChange('path', e.target.value)}>
                            <option value="iris.csv">iris.csv</option>
                            <option value="titanic.csv">titanic.csv</option>
                            <option value="diabetes.csv">diabetes.csv</option>
                        </select>
                        <div className="mt-2 text-xs text-gray-400">Salida: Matriz (X, y)</div>
                    </div>
                    <Handle type="source" position={Position.Right} />
                </div>
            );
        };

        const SplitNode = ({ data }) => {
            const [splitSize, setSplitSize] = useState(data.splitSize || 20);
            useEffect(() => { data.params = { ...data.params, splitSize }; }, [splitSize]);
            const handleSplitChange = (type) => setSplitSize(p => type === 'increment' ? Math.min(99, p + 1) : Math.max(1, p - 1));

            return (
                <div className="edubot-node border-l-4 border-node-logic">
                    <Handle type="target" position={Position.Left} />
                    <div className="edubot-node-header bg-node-logic bg-opacity-20"><Icons.Split /> <span>{data.label || 'Split'}</span></div>
                    <div className="edubot-node-body">
                        <label className="edubot-label">Tamaño Prueba (%)</label>
                        <div className="flex items-stretch mt-1">
                            <button onClick={() => handleSplitChange('decrement')} className="bg-gray-600 text-white p-2 rounded-l-md hover:bg-gray-500">-</button>
                            <input type="text" readOnly value={splitSize} className="edubot-input text-center flex-grow mx-0 rounded-none cursor-default" style={{marginTop:0}} />
                            <button onClick={() => handleSplitChange('increment')} className="bg-gray-600 text-white p-2 rounded-r-md hover:bg-gray-500">+</button>
                        </div>
                    </div>
                    <Handle type="source" position={Position.Right} id="train" style={{ top: '30%' }} />
                    <Handle type="source" position={Position.Right} id="test" style={{ top: '70%' }} />
                </div>
            );
        };

        const ModelNodeUI = ({ label, icon: Icon, colorClass, children }) => (
            <div className={`edubot-node border-l-4 ${colorClass}`}>
                <Handle type="target" position={Position.Left} />
                <div className={`edubot-node-header ${colorClass.replace('border-', 'bg-')} bg-opacity-20`}>
                    <Icon /> <span>{label}</span>
                </div>
                <div className="edubot-node-body">{children}</div>
                <Handle type="source" position={Position.Right} />
            </div>
        );

        const DTNode = ({ data }) => {
            const { params, handleChange } = useNodeParams(data, { model_name: 'dt_model', max_depth: 10, min_size: 2 });
            return (
                <ModelNodeUI label="Árbol de Decisión" icon={Icons.Tree} colorClass="border-node-model">
                    <label className="edubot-label">Nombre</label>
                    <input className="edubot-input mb-2" value={params.model_name} onChange={e => handleChange('model_name', e.target.value)} />
                    <div className="edubot-row">
                        <div className="flex-1"><label className="edubot-label">Profundidad</label><input type="number" className="edubot-input" value={params.max_depth} onChange={e => handleChange('max_depth', e.target.value)} /></div>
                        <div className="flex-1"><label className="edubot-label">Min Size</label><input type="number" className="edubot-input" value={params.min_size} onChange={e => handleChange('min_size', e.target.value)} /></div>
                    </div>
                </ModelNodeUI>
            );
        };

        const RFNode = ({ data }) => {
            const { params, handleChange, setParams } = useNodeParams(data, { model_name: 'rf_model', n_trees: 5, max_depth: 10 });
            const handleTreeCount = (inc) => setParams(p => ({...p, n_trees: Math.max(1, (p.n_trees || 5) + inc)}));
            return (
                <ModelNodeUI label="Bosque Aleatorio" icon={Icons.Tree} colorClass="border-node-model">
                    <label className="edubot-label">Nombre</label>
                    <input className="edubot-input mb-2" value={params.model_name} onChange={e => handleChange('model_name', e.target.value)} />
                    <label className="edubot-label">Árboles</label>
                    <div className="flex items-stretch mt-1 mb-2">
                        <button onClick={() => handleTreeCount(-1)} className="bg-gray-600 text-white p-2 rounded-l-md hover:bg-gray-500">-</button>
                        <input type="text" readOnly value={params.n_trees} className="edubot-input text-center flex-grow mx-0 rounded-none" style={{marginTop:0}} />
                        <button onClick={() => handleTreeCount(1)} className="bg-gray-600 text-white p-2 rounded-r-md hover:bg-gray-500">+</button>
                    </div>
                    <label className="edubot-label">Profundidad Máx</label>
                    <input type="number" className="edubot-input" value={params.max_depth} onChange={e => handleChange('max_depth', e.target.value)} />
                </ModelNodeUI>
            );
        };

        const SVMNode = ({ data }) => {
            const { params, handleChange } = useNodeParams(data, { model_name: 'svm_model', learning_rate: 0.001, epochs: 500 });
            return (
                <ModelNodeUI label="SVM (Mini)" icon={Icons.Target} colorClass="border-node-logic">
                    <label className="edubot-label">Nombre</label>
                    <input className="edubot-input mb-2" value={params.model_name} onChange={e => handleChange('model_name', e.target.value)} />
                    <label className="edubot-label">Learning Rate</label>
                    <input type="number" step="0.001" className="edubot-input" value={params.learning_rate} onChange={e => handleChange('learning_rate', e.target.value)} />
                </ModelNodeUI>
            );
        };

        const NNNode = ({ data }) => {
            const { params, handleChange } = useNodeParams(data, { model_name: 'nn_model', hidden_size: 4, lr: 0.01 });
            return (
                <ModelNodeUI label="Red Neuronal" icon={Icons.Brain} colorClass="border-node-nn">
                    <label className="edubot-label">Nombre</label>
                    <input className="edubot-input mb-2" value={params.model_name} onChange={e => handleChange('model_name', e.target.value)} />
                    <div className="edubot-row">
                        <div className="flex-1"><label className="edubot-label">Hidden</label><input type="number" className="edubot-input" value={params.hidden_size} onChange={e => handleChange('hidden_size', e.target.value)} /></div>
                        <div className="flex-1"><label className="edubot-label">LR</label><input type="number" step="0.01" className="edubot-input" value={params.lr} onChange={e => handleChange('lr', e.target.value)} /></div>
                    </div>
                </ModelNodeUI>
            );
        };

        const LinearNode = ({ data }) => {
            const { params, handleChange } = useNodeParams(data, { model_name: 'linear_model', learning_rate: 0.01 });
            return (
                <ModelNodeUI label="Modelo Lineal" icon={Icons.Activity} colorClass="border-node-logic">
                    <label className="edubot-label">Nombre</label>
                    <input className="edubot-input mb-2" value={params.model_name} onChange={e => handleChange('model_name', e.target.value)} />
                    <label className="edubot-label">Learning Rate</label>
                    <input type="number" step="0.001" className="edubot-input" value={params.learning_rate} onChange={e => handleChange('learning_rate', e.target.value)} />
                </ModelNodeUI>
            );
        };

        const PredictNode = ({ data }) => (
            <div className="edubot-node border-l-4 border-node-eval">
                <Handle type="target" position={Position.Left} id="model" style={{ top: '30%' }} />
                <Handle type="target" position={Position.Left} id="data" style={{ top: '70%' }} />
                <div className="edubot-node-header bg-node-eval bg-opacity-20"><span className="text-lg">🚀</span> <span>Predecir</span></div>
                <div className="edubot-node-body">
                    <div className="text-xs text-gray-400 mb-2">Entradas:</div>
                    <div className="text-xs bg-gray-800 p-1 rounded mb-1">⬅ Modelo</div>
                    <div className="text-xs bg-gray-800 p-1 rounded">⬅ Datos</div>
                </div>
                <Handle type="source" position={Position.Right} />
            </div>
        );

        const EvalNode = ({ data }) => (
            <div className="edubot-node border-l-4 border-node-eval">
                 <Handle type="target" position={Position.Left} />
                <div className="edubot-node-header bg-node-eval bg-opacity-20"><Icons.Activity /> <span>Evaluar</span></div>
                <div className="edubot-node-body"><div className="text-xs text-gray-400">Compara Real vs Pred</div></div>
            </div>
        );

        // NODOS DE FUNDAMENTOS PYTHON

        const PyAssignNode = ({ data }) => {
            const { params, handleChange } = useNodeParams(data, { name: 'variable', value: '0' });
            return (
                <ModelNodeUI label="Asignar Variable" icon={Icons.Code} colorClass="border-node-py">
                    <label className="edubot-label">Nombre</label>
                    <input className="edubot-input" value={params.name} onChange={e => handleChange('name', e.target.value)} />
                    <label className="edubot-label">Valor (Expresión)</label>
                    <input className="edubot-input" value={params.value} onChange={e => handleChange('value', e.target.value)} />
                </ModelNodeUI>
            );
        };

        const PyPrintNode = ({ data }) => {
            const { params, handleChange } = useNodeParams(data, { value: '"Hola Mundo"' });
            return (
                <ModelNodeUI label="Imprimir (Print)" icon={Icons.Terminal} colorClass="border-node-py">
                    <label className="edubot-label">Texto o Variable</label>
                    <input className="edubot-input" value={params.value} onChange={e => handleChange('value', e.target.value)} />
                </ModelNodeUI>
            );
        };

        const PyIfNode = ({ data }) => {
            const { params, handleChange } = useNodeParams(data, { condition: 'x > 5' });
            return (
                <ModelNodeUI label="Condicional (If)" icon={Icons.GitBranch} colorClass="border-node-logic">
                    <label className="edubot-label">Condición</label>
                    <input className="edubot-input" value={params.condition} onChange={e => handleChange('condition', e.target.value)} />
                    <div className="mt-2 text-xs text-gray-400">Conecta debajo para el cuerpo</div>
                </ModelNodeUI>
            );
        };

        const PyLoopNode = ({ data }) => {
            const { params, handleChange } = useNodeParams(data, { var: 'i', start: '0', end: '10', step: '1' });
            return (
                <ModelNodeUI label="Bucle For (Range)" icon={Icons.Refresh} colorClass="border-node-logic">
                    <div className="flex gap-2">
                        <div className="w-1/3"><label className="edubot-label">Var</label><input className="edubot-input" value={params.var} onChange={e => handleChange('var', e.target.value)} /></div>
                        <div className="w-2/3"><label className="edubot-label">Fin</label><input className="edubot-input" value={params.end} onChange={e => handleChange('end', e.target.value)} /></div>
                    </div>
                </ModelNodeUI>
            );
        };

        const PyFuncNode = ({ data }) => {
            const { params, handleChange } = useNodeParams(data, { name: 'mi_funcion', args: 'a, b' });
            return (
                <ModelNodeUI label="Definir Función" icon={Icons.Code} colorClass="border-node-model">
                    <label className="edubot-label">Nombre</label>
                    <input className="edubot-input" value={params.name} onChange={e => handleChange('name', e.target.value)} />
                    <label className="edubot-label">Argumentos</label>
                    <input className="edubot-input" value={params.args} onChange={e => handleChange('args', e.target.value)} />
                </ModelNodeUI>
            );
        };


        const nodeTypes = {
            ml_dataset: DatasetNode,
            ml_split_block: SplitNode,
            ml_dataset_block: DatasetNode,
            ml_train_dt: DTNode,
            ml_train_rf: RFNode,
            ml_train_svm: SVMNode,
            ml_train_linear: LinearNode,
            ml_train_nn: NNNode,
            ml_predict: PredictNode,
            ml_predict_block: PredictNode,
            ml_eval: EvalNode,
            // Nuevos tipos para Python puro (mapeados por translation_rules)
            assign: PyAssignNode,
            print: PyPrintNode,
            if: PyIfNode,
            for_range: PyLoopNode,
            function: PyFuncNode
        };

        // PANTALLA DE BIENVENIDA
        const WelcomeScreen = ({ onNewProject, onOpenProject }) => { 
            return ( 
                <div className="h-full w-full flex flex-col bg-vscode-bg text-vscode-text font-sans"> 
                    <div className="h-9 bg-vscode-bg flex items-center px-4 border-b border-vscode-border"> 
                        <div className="flex items-center bg-vscode-sidebar px-3 py-1 text-sm text-vscode-textLight border-t border-vscode-status"> 
                            <span className="mr-2">Bienvenido</span> <Icons.X size={14} className="hover:text-white cursor-pointer" /> 
                        </div> 
                    </div> 
                    <div className="flex-1 flex justify-center items-start pt-20 overflow-y-auto"> 
                        <div className="max-w-4xl w-full"> 
                            <div className="flex items-center gap-4 border-b border-gray-700 pb-6 mb-8"> 
                                <Icons.Blocks size={64} className="text-vscode-accent"/> 
                                <div> 
                                    <h1 className="text-3xl font-light text-white">EduBot Forest Studio</h1> 
                                    <p className="text-gray-400 mt-1">Entorno de programación visual en bosques para modelos de Machine Learning.</p> 
                                </div> 
                            </div> 
                            <div className="grid grid-cols-2 gap-8"> 
                                <div> 
                                    <h3 className="text-xl font-semibold mb-4 text-white">Comenzar</h3> 
                                    <div className="space-y-3"> 
                                        <div onClick={onNewProject} className="bg-vscode-activity p-3 border-l-2 border-vscode-status cursor-pointer hover:bg-vscode-hover">
                                            <h4 className="font-semibold text-white flex items-center gap-2"><Icons.FileCode size={16} /> Crear nuevo flujo</h4> 
                                            <p className="text-xs mt-1">Empieza a construir tu pipeline de ML desde cero.</p> 
                                        </div> 
                                        <div onClick={onOpenProject} className="bg-vscode-activity p-3 border-l-2 border-transparent hover:border-vscode-status cursor-pointer hover:bg-vscode-hover"> 
                                            <h4 className="font-semibold text-white flex items-center gap-2"><Icons.FolderOpen size={16} /> Abrir proyecto</h4> 
                                            <p className="text-xs mt-1">Cargar un archivo .edubotproj guardado.</p> 
                                        </div> 
                                    </div> 
                                </div> 
                            </div> 
                        </div> 
                    </div> 
                </div> 
            ); 
        };

        // EDITOR PRINCIPAL (TABBED VIEW + LOGIC)
        const EditorInterface = ({ onGoHome, initialData }) => {
            const defaultNodes = [
                { id: '1', type: 'ml_dataset', position: { x: 50, y: 50 }, data: { params: { name: 'data', path: 'iris.csv' } } },
            ];
            
            const [nodes, setNodes, onNodesChange] = useNodesState(initialData?.nodes || defaultNodes);
            const [edges, setEdges, onEdgesChange] = useEdgesState(initialData?.edges || []);
            const onConnect = useCallback((params) => setEdges((eds) => addEdge({ ...params, animated: true, style:{stroke:'#888'} }, eds)), [setEdges]);

            const [pythonCode, setPythonCode] = useState("# Esperando bloques para traducir...");
            const [consoleOutput, setConsoleOutput] = useState("EduBot Core listo.\n");
            const [isSyncing, setIsSyncing] = useState(false);
            
            // UI States
            const [layoutMode, setLayoutMode] = useState('tabs'); // 'tabs' | 'split'
            const [activeTab, setActiveTab] = useState('visual'); // 'visual' | 'code'
            const [toolboxMode, setToolboxMode] = useState('ml'); // 'ml' | 'python'

            // Sincronizar datos de nodos para el backend
            const updateNodeData = useCallback((id, newParams) => {
                setNodes((nds) => nds.map((node) => {
                    if (node.id === id) return { ...node, data: { ...node.data, params: newParams } };
                    return node;
                }));
            }, [setNodes]);

            useEffect(() => {
                setNodes((nds) => nds.map(n => {
                    if (n.data.onChange) return n;
                    return { ...n, data: { ...n.data, onChange: (p) => updateNodeData(n.id, p) } };
                }));
            }, [updateNodeData, setNodes]);

            // Traducción Bloques -> Python
            useEffect(() => {
                const timer = setTimeout(async () => {
                    if (isSyncing) return;
                    if (!window.eel) return;
                    const simplified = nodes.map(n => ({ type: n.type, id: n.id, ...(n.data.params || {}), splitSize: n.data.splitSize }));
                    try {
                        const res = await window.eel.api_translate('to_python', simplified, null, 'code')();
                        if (res && res.result) setPythonCode(res.result);
                    } catch(e) { console.error(e); }
                }, 800);
                return () => clearTimeout(timer);
            }, [nodes, edges, isSyncing]);

            // Traducción Python -> Bloques
            const syncVisual = async () => {
                setIsSyncing(true);
                setConsoleOutput(prev => prev + "> Sincronizando visual...\n");
                try {
                    const res = await window.eel.api_translate('to_blocks', null, pythonCode, 'code')();
                    if (res && res.result) {
                        const newNodes = res.result.map((blk, i) => ({
                            id: `gen-${i}-${Date.now()}`,
                            type: blk.type.startsWith('ml_') ? blk.type : blk.type, // Soporta tipos puros también
                            position: { x: 50 + (i*60), y: 50 + (i*100) },
                            data: { params: blk } 
                        }));
                        setNodes(newNodes);
                        setEdges([]);
                        setConsoleOutput(prev => prev + "[OK] Interfaz actualizada.\n");
                    }
                } catch(e) { setConsoleOutput(prev => prev + `[ERROR] ${e}\n`); } 
                finally { setTimeout(() => setIsSyncing(false), 1000); }
            };

            const runCode = async () => {
                setConsoleOutput(prev => prev + "\n> Ejecutando flujo...\n");
                const simplified = nodes.map(n => ({ type: n.type, ...(n.data.params || {}) }));
                // Si estamos en modo ML, ejecutamos el pipeline. Si estamos en modo Python, ejecutamos el código.
                if (toolboxMode === 'ml') {
                    const res = await window.eel.api_execute(simplified)();
                    if (res.success) {
                        setConsoleOutput(prev => prev + `[EXITO] Pipeline completado.\n`);
                        if(res.results) res.results.forEach(r => setConsoleOutput(prev => prev + `  - ${r.action}: OK\n`));
                    } else { setConsoleOutput(prev => prev + `[ERROR] ${res.error}\n`); }
                } else {
                    // Modo Python Puro: Ejecuta el código generado en sandbox
                    const res = await window.eel.api_run_code(pythonCode)();
                    if(res.success) {
                        setConsoleOutput(prev => prev + `[SALIDA] \n${res.output}\n`);
                    } else {
                        setConsoleOutput(prev => prev + `[ERROR] ${res.error}\n`);
                    }
                }
            };

            const exportToC = async () => {
                setConsoleOutput(prev => prev + "\n> Generando C...\n");
                const simplified = nodes.map(n => ({ type: n.type, ...(n.data.params || {}) }));
                const res = await window.eel.api_translate('to_struct', simplified, null, 'struct')();
                if (res) {
                    setConsoleOutput(prev => prev + "[OK] Estructura generada. Guardando...\n");
                    await window.eel.api_file_save(JSON.stringify(res, null, 2), "pipeline_export.json");
                }
            };

            const saveProject = async () => {
                const name = prompt("Nombre del proyecto:");
                if(name) {
                    await window.eel.api_save_project({ nodes, edges }, name)();
                    setConsoleOutput(prev => prev + `> Proyecto ${name} guardado.\n`);
                }
            };

            const onDragStart = (event, type) => {
                event.dataTransfer.setData('application/reactflow', type);
                event.dataTransfer.effectAllowed = 'move';
            };

            return (
                <div className="h-full flex flex-col">
                    {/* TOP BAR */}
                    <div className="h-10 bg-vscode-activity flex items-center justify-between px-4 border-b border-vscode-border">
                        <div className="flex items-center gap-3">
                            <button onClick={saveProject} className="text-gray-400 hover:text-white" title="Guardar Proyecto"><Icons.Save size={16}/></button>
                            <button onClick={onGoHome} className="text-gray-400 hover:text-white" title="Cerrar"><Icons.X size={16}/></button>
                            <div className="h-4 w-px bg-gray-600 mx-2"></div>
                            
                            {/* SELECTOR DE MODO (TUTORIAL vs ML) */}
                            <select 
                                value={toolboxMode} 
                                onChange={(e) => setToolboxMode(e.target.value)}
                                className="bg-vscode-bg text-xs text-white border border-vscode-border rounded px-2 py-1 outline-none"
                            >
                                <option value="ml">Modo: ML Pipeline</option>
                                <option value="python">Modo: Python Fundamentos</option>
                            </select>

                            <div className="h-4 w-px bg-gray-600 mx-2"></div>

                            {/* SELECTOR DE LAYOUT (TABS vs SPLIT) */}
                            <button 
                                onClick={() => setLayoutMode(layoutMode === 'tabs' ? 'split' : 'tabs')} 
                                className="text-gray-300 hover:text-white flex items-center gap-2 text-xs"
                                title={layoutMode === 'tabs' ? "Cambiar a Vista Dividida" : "Cambiar a Pestañas"}
                            >
                                {layoutMode === 'tabs' ? <Icons.LayoutSplit size={14}/> : <Icons.LayoutTab size={14}/>}
                                <span>{layoutMode === 'tabs' ? 'Split View' : 'Tabs View'}</span>
                            </button>
                        </div>

                        <div className="flex gap-2">
                            <button onClick={runCode} className="flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded text-xs"><Icons.Play size={12}/> Ejecutar</button>
                            <button onClick={exportToC} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded text-xs"><Icons.Export size={12}/> Exportar C</button>
                        </div>
                    </div>

                    {/* TAB BAR (Solo visible en modo Tabs) */}
                    {layoutMode === 'tabs' && (
                        <div className="bg-vscode-bg flex border-b border-vscode-border">
                            <div 
                                className={`tab-btn ${activeTab === 'visual' ? 'active' : 'inactive'}`}
                                onClick={() => setActiveTab('visual')}
                            >
                                <Icons.Blocks size={14} color={activeTab === 'visual' ? '#4ec9b0' : 'currentColor'} /> Diseño Visual (Bosque)
                            </div>
                            <div 
                                className={`tab-btn ${activeTab === 'code' ? 'active' : 'inactive'}`}
                                onClick={() => setActiveTab('code')}
                            >
                                <Icons.Code size={14} color={activeTab === 'code' ? '#ce9178' : 'currentColor'} /> Editor de Código
                            </div>
                        </div>
                    )}

                    <div className="flex-1 flex overflow-hidden relative">
                        {/* SIDEBAR (Siempre visible, contenido dinámico) */}
                        <div className="w-56 bg-vscode-sidebar border-r border-vscode-border flex flex-col z-10">
                            <div className="p-2 text-xs font-bold text-gray-400 uppercase bg-vscode-activity border-b border-vscode-border">
                                {toolboxMode === 'ml' ? 'ML Toolbox' : 'Python Básico'}
                            </div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-1">
                                {toolboxMode === 'ml' ? (
                                    <>
                                        <div className="p-2 bg-vscode-activity rounded cursor-grab border-l-2 border-node-data flex gap-2 text-sm text-gray-300" draggable onDragStart={(e) => onDragStart(e, 'ml_dataset')}><Icons.Database size={14}/> Dataset</div>
                                        <div className="p-2 bg-vscode-activity rounded cursor-grab border-l-2 border-node-logic flex gap-2 text-sm text-gray-300" draggable onDragStart={(e) => onDragStart(e, 'ml_split_block')}><Icons.Split size={14}/> Split Data</div>
                                        <div className="h-px bg-gray-700 my-1"></div>
                                        <div className="p-2 bg-vscode-activity rounded cursor-grab border-l-2 border-node-model flex gap-2 text-sm text-gray-300" draggable onDragStart={(e) => onDragStart(e, 'ml_train_dt')}><Icons.Tree size={14}/> Decision Tree</div>
                                        <div className="p-2 bg-vscode-activity rounded cursor-grab border-l-2 border-node-model flex gap-2 text-sm text-gray-300" draggable onDragStart={(e) => onDragStart(e, 'ml_train_rf')}><Icons.Tree size={14}/> Random Forest</div>
                                        <div className="p-2 bg-vscode-activity rounded cursor-grab border-l-2 border-node-logic flex gap-2 text-sm text-gray-300" draggable onDragStart={(e) => onDragStart(e, 'ml_train_svm')}><Icons.Target size={14}/> SVM (Mini)</div>
                                        <div className="p-2 bg-vscode-activity rounded cursor-grab border-l-2 border-node-logic flex gap-2 text-sm text-gray-300" draggable onDragStart={(e) => onDragStart(e, 'ml_train_linear')}><Icons.Activity size={14}/> Linear Model</div>
                                        <div className="p-2 bg-vscode-activity rounded cursor-grab border-l-2 border-node-nn flex gap-2 text-sm text-gray-300" draggable onDragStart={(e) => onDragStart(e, 'ml_train_nn')}><Icons.Brain size={14}/> Neural Net</div>
                                        <div className="h-px bg-gray-700 my-1"></div>
                                        <div className="p-2 bg-vscode-activity rounded cursor-grab border-l-2 border-node-eval flex gap-2 text-sm text-gray-300" draggable onDragStart={(e) => onDragStart(e, 'ml_predict')}><Icons.Play size={14}/> Predecir</div>
                                        <div className="p-2 bg-vscode-activity rounded cursor-grab border-l-2 border-node-eval flex gap-2 text-sm text-gray-300" draggable onDragStart={(e) => onDragStart(e, 'ml_eval')}><Icons.Activity size={14}/> Evaluar</div>
                                    </>
                                ) : (
                                    <>
                                        <div className="text-xs text-gray-500 px-1 mb-2">Fundamentos</div>
                                        <div className="p-2 bg-vscode-activity rounded cursor-grab border-l-2 border-node-py flex gap-2 text-sm text-gray-300" draggable onDragStart={(e) => onDragStart(e, 'assign')}><Icons.Code size={14}/> Asignar Var</div>
                                        <div className="p-2 bg-vscode-activity rounded cursor-grab border-l-2 border-node-py flex gap-2 text-sm text-gray-300" draggable onDragStart={(e) => onDragStart(e, 'print')}><Icons.Terminal size={14}/> Imprimir (Print)</div>
                                        <div className="h-px bg-gray-700 my-1"></div>
                                        <div className="text-xs text-gray-500 px-1 mb-2">Control de Flujo</div>
                                        <div className="p-2 bg-vscode-activity rounded cursor-grab border-l-2 border-node-logic flex gap-2 text-sm text-gray-300" draggable onDragStart={(e) => onDragStart(e, 'if')}><Icons.GitBranch size={14}/> Condicional (If)</div>
                                        <div className="p-2 bg-vscode-activity rounded cursor-grab border-l-2 border-node-logic flex gap-2 text-sm text-gray-300" draggable onDragStart={(e) => onDragStart(e, 'for_range')}><Icons.Refresh size={14}/> Bucle (For)</div>
                                        <div className="p-2 bg-vscode-activity rounded cursor-grab border-l-2 border-node-model flex gap-2 text-sm text-gray-300" draggable onDragStart={(e) => onDragStart(e, 'function')}><Icons.Code size={14}/> Función (Def)</div>
                                    </>
                                )}
                            </div>
                        </div>

                        {/* WORKSPACE AREA */}
                        <div className="flex-1 flex overflow-hidden">
                            {/* CANVAS VISUAL (Mostrado si estamos en modo split o si la tab activa es visual) */}
                            <div className={`flex-1 relative border-r border-vscode-border ${layoutMode === 'tabs' && activeTab !== 'visual' ? 'hidden' : ''}`}
                                onDrop={(e) => {
                                    e.preventDefault();
                                    const type = e.dataTransfer.getData('application/reactflow');
                                    if(!type) return;
                                    const pos = { x: e.clientX - 250, y: e.clientY - 100 };
                                    setNodes(nds => nds.concat({ id: Date.now().toString(), type, position: pos, data: { params: {} } }));
                                }} 
                                onDragOver={e => e.preventDefault()}>
                                <ReactFlowProvider>
                                    <ReactFlow nodes={nodes} edges={edges} onNodesChange={onNodesChange} onEdgesChange={onEdgesChange} onConnect={onConnect} nodeTypes={nodeTypes} fitView className="bg-vscode-bg">
                                        <Background color="#333" gap={20}/>
                                        <Controls style={{buttonBg:'#333', buttonColor:'#fff'}}/>
                                    </ReactFlow>
                                </ReactFlowProvider>
                            </div>

                            {/* CODE EDITOR (Mostrado si estamos en modo split o si la tab activa es código) */}
                            <div className={`${layoutMode === 'tabs' ? 'w-full' : 'w-1/3 min-w-[300px]'} bg-vscode-editor flex flex-col ${layoutMode === 'tabs' && activeTab !== 'code' ? 'hidden' : ''}`}>
                                <div className="h-8 bg-vscode-activity flex items-center justify-between px-2 border-b border-vscode-border">
                                    <span className="text-xs text-gray-400 flex gap-2 items-center"><Icons.Code size={12}/> {toolboxMode === 'ml' ? 'pipeline_generated.py' : 'script_tutorial.py'}</span>
                                    <button onClick={syncVisual} className="text-xs bg-vscode-accent text-white px-2 rounded flex items-center gap-1"><Icons.Refresh size={10}/> Sync Visual</button>
                                </div>
                                <textarea 
                                    className="code-editor-area flex-1 p-4 w-full h-full outline-none text-sm"
                                    value={pythonCode}
                                    onChange={(e) => { setPythonCode(e.target.value); setIsSyncing(true); }}
                                    spellCheck="false"
                                ></textarea>
                                <div className="h-1/3 bg-vscode-terminal border-t border-vscode-border flex flex-col">
                                    <div className="px-2 py-1 text-xs font-bold text-gray-500 uppercase border-b border-vscode-border">Terminal</div>
                                    <div className="flex-1 p-2 font-mono text-xs text-gray-300 overflow-y-auto whitespace-pre-wrap">{consoleOutput}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    {/* STATUS BAR */}
                    <div className="h-6 bg-vscode-status text-white flex items-center justify-between px-3 text-xs">
                        <div>EduBot Core: {isSyncing ? "Sincronizando..." : "Listo"} | Modo: {layoutMode.toUpperCase()} | Toolbox: {toolboxMode.toUpperCase()}</div>
                        <div>Python 3.11</div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [currentView, setCurrentView] = useState('welcome');
            const [loadedProject, setLoadedProject] = useState(null);

            const handleNew = () => { setLoadedProject(null); setCurrentView('editor'); };
            const handleOpen = async () => {
                const name = prompt("Nombre proyecto:");
                if(!name) return;
                try {
                    const data = await window.eel.api_load_project(name)();
                    if(data) { setLoadedProject(data); setCurrentView('editor'); }
                } catch(e) { alert("Error al cargar"); }
            };

            return (
                <>
                    {currentView === 'welcome' ? 
                        <WelcomeScreen onNewProject={handleNew} onOpenProject={handleOpen} /> : 
                        <EditorInterface onGoHome={() => setCurrentView('welcome')} initialData={loadedProject} />
                    }
                </>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
