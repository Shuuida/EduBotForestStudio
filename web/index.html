<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBot Forest Studio - Offline Suite</title>
    
    <script type="text/javascript" src="/eel.js"></script>

        window.module = undefined;
        window.exports = undefined;
        window.require = undefined;
        window.define = undefined; // Evita conflictos con AMD loaders
        window.global = window;    // Shim para librerías antiguas
        window.process = { env: { NODE_ENV: 'production' } };
    </script>
    
    <link href="libs/reactflow.css" rel="stylesheet"/>
    <link href="libs/prism.css" rel="stylesheet"/>
    
    <script src="libs/tailwind.js"></script>

    <style>
        body { background-color: #111827; color: #e5e7eb; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .react-flow__node { background: #1f2937; border: 1px solid #374151; border-radius: 8px; color: white; min-width: 180px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .react-flow__node.selected { border-color: #3b82f6; box-shadow: 0 0 0 2px #3b82f6; }
        .forest-node-header { padding: 8px 12px; border-bottom: 1px solid #374151; font-weight: 600; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; border-top-left-radius: 8px; border-top-right-radius: 8px; }
        .forest-node-body { padding: 10px; font-size: 0.8rem; display: flex; flex-direction: column; gap: 6px; }
        .node-input { background-color: #111827; border: 1px solid #374151; color: #d1d5db; padding: 4px 8px; border-radius: 4px; width: 100%; font-size: 0.75rem; outline: none; }
        .node-input:focus { border-color: #3b82f6; }
        .node-label { font-size: 0.7rem; color: #9ca3af; margin-bottom: 2px; display: block; }
        .vscode-terminal { font-family: 'Consolas', 'Monaco', 'Courier New', monospace; background-color: #1e1e1e; color: #cccccc; line-height: 1.4; }
        
        /* Animaciones */
        @keyframes flowPulse { 0% { opacity: 0.2; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.2; transform: scale(1); } }
        .flow-particle { animation: flowPulse 1.5s infinite; }
        .edge-path-active { stroke-width: 3; filter: drop-shadow(0 0 4px currentColor); animation: dashdraw 1s linear infinite; stroke-dasharray: 10; }
        .edge-path-error { stroke: #f97316 !important; stroke-width: 3; stroke-dasharray: 5; }
        .edge-path-idle { stroke-width: 2; opacity: 0.8; }
        @keyframes dashdraw { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }

        /* UI */
        .w-64.bg-gray-900.border-r.border-gray-700 { background: linear-gradient(to bottom, #111827, #0a0a0a); border-right: 1px solid #1f2937 !important; box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.03); }

        const { 
            Users, Sprout, Cpu, Play, Terminal, Trash2, Save, FolderOpen, Code, 
            Variable, FunctionSquare, Repeat, Split, XCircle, Keyboard, RefreshCw, 
            Calculator, CheckSquare, ArrowLeft, Box, Package, AlertTriangle, 
            FileWarning, Settings, Monitor, Share2, X
        } = Icons;

        // LÓGICA DEL MOTOR (SERIALIZACIÓN & SCOPE)

        const serializeNodesLinear = (nodes, edges) => {
            const nodeMap = new Map(nodes.map(n => [n.id, { ...n }]));

            const sortNodes = (a, b) => {
                // Si están a menos de 25px de diferencia vertical, los consideramos en la misma línea.
                if (Math.abs(a.position.y - b.position.y) < 25) {
                    return a.position.x - b.position.x; // Izquierda a Derecha
                }
                return a.position.y - b.position.y; // Arriba hacia Abajo (Prioridad Sagrada)
            };
            
            // ORDENAMIENTO TOPOLÓGICO
            const adjacency = new Map(); 
            const inDegree = new Map();
            
            nodes.forEach(n => {
                adjacency.set(n.id, []);
                inDegree.set(n.id, 0);
            });

            edges.forEach(edge => {
                if (nodeMap.has(edge.source) && nodeMap.has(edge.target)) {
                    adjacency.get(edge.source).push(edge.target);
                    inDegree.set(edge.target, (inDegree.get(edge.target) || 0) + 1);
                }
            });

            const queue = [];
            nodes.forEach(n => { if (inDegree.get(n.id) === 0) queue.push(n); });
            queue.sort(sortNodes);

            const sortedIds = [];
            while (queue.length > 0) {
                const node = queue.shift();
                sortedIds.push(node.id);
                
                const neighbors = adjacency.get(node.id)
                    .map(id => nodeMap.get(id))
                    .sort(sortNodes);

                neighbors.forEach(neighbor => {
                    inDegree.set(neighbor.id, inDegree.get(neighbor.id) - 1);
                    if (inDegree.get(neighbor.id) === 0) queue.push(neighbor);
                });
            }

            if (sortedIds.length !== nodes.length) {
                nodes.forEach(n => { if (!sortedIds.includes(n.id)) sortedIds.push(n.id); });
            }

            // DETECCIÓN DE SCOPE
            const CONTAINER_TYPES = ['py_class', 'py_func', 'py_if', 'py_loop', 'py_while', 'py_try'];
            const parentMap = new Map(); 
            sortedIds.forEach(id => parentMap.set(id, null));

            sortedIds.forEach(currentId => {
                const currentNode = nodeMap.get(currentId);
                const currentScope = parentMap.get(currentId);
                const effectiveScopeForChildren = CONTAINER_TYPES.includes(currentNode.type) ? currentId : currentScope;

                const childrenIds = adjacency.get(currentId);
                childrenIds.forEach(childId => {
                    if (parentMap.get(childId) === null) {
                        parentMap.set(childId, effectiveScopeForChildren);
                    }
                });
            });

            const blocksByScope = new Map();
            blocksByScope.set(null, []);

            const rawBlocks = new Map();
            
            sortedIds.forEach(id => {
                const node = nodeMap.get(id);
                let block = { ...node.data, type: node.type, id: node.id };

                const getConnectedInputs = (targetId) => {
                    return edges.filter(e => e.target === targetId).map(e => {
                        const src = nodeMap.get(e.source);
                        return src?.data?.var_name || src?.data?.target || null;
                    }).filter(Boolean);
                };
                
                const inputs = getConnectedInputs(id);
                if (node.type === 'py_math' || node.type === 'py_compare') {
                    if (!block.left && inputs.length > 0) block.left = inputs[0];
                    if (!block.right && inputs.length > 1) block.right = inputs[1];
                }
                if (node.type === 'py_print' && inputs.length > 0 && !block.content) {
                    block.content = inputs[0];
                }

                if (CONTAINER_TYPES.includes(node.type)) {
                    block.body = [];
                }

                rawBlocks.set(id, block);

                const parentId = parentMap.get(id);
                const safeParentId = rawBlocks.has(parentId) ? parentId : null;
                
                if (!blocksByScope.has(safeParentId)) {
                    blocksByScope.set(safeParentId, []);
                }
                blocksByScope.get(safeParentId).push(block);
            });

            blocksByScope.forEach((children, scopeId) => {
                if (scopeId !== null) {
                    const parentBlock = rawBlocks.get(scopeId);
                    if (parentBlock) {
                        parentBlock.body = children;
                    }
                }
            });

            return blocksByScope.get(null);
        };

        // COMPONENTES UI Y NODOS

        const StudentAuth = ({ onOpenTeacherDashboard }) => {
            const [role, setRole] = useState(localStorage.getItem('edubot_role') || 'student');
            const [studentName, setStudentName] = useState(localStorage.getItem('edubot_student_name') || '');
            const [isEditingName, setIsEditingName] = useState(!studentName && role === 'student');

            const handleSaveName = (e) => {
                if (e.key === 'Enter' || e.type === 'blur') {
                    if (studentName.trim()) {
                        localStorage.setItem('edubot_student_name', studentName.trim());
                        setIsEditingName(false);
                    }
                }
            };

            const handleLogout = () => {
                localStorage.removeItem('edubot_role');
                setRole('student');
                window.location.reload(); 
            };

            if (role === 'teacher') {
                return (
                    <div className="flex items-center gap-3 bg-indigo-900/40 border border-indigo-500/50 px-3 py-1.5 rounded-lg">
                        <span className="text-xs font-bold text-indigo-300">Modo Profesor</span>
                        <button onClick={onOpenTeacherDashboard} className="text-xs bg-indigo-600 hover:bg-indigo-500 text-white px-2 py-1 rounded transition-colors">Dashboard</button>
                        <button onClick={handleLogout} className="text-xs text-red-400 hover:text-red-300 ml-2">Salir</button>
                    </div>
                );
            }

            return (
                <div className="flex items-center gap-2 bg-gray-800/50 border border-gray-700 px-3 py-1.5 rounded-lg">
                    <Users size={14} className="text-blue-400" />
                    {isEditingName ? (
                        <input 
                            autoFocus
                            type="text" 
                            className="bg-gray-900 border border-blue-500 text-white text-xs px-2 py-0.5 rounded outline-none w-32"
                            placeholder="Tu nombre..."
                            value={studentName}
                            onChange={(e) => setStudentName(e.target.value)}
                            onBlur={handleSaveName}
                            onKeyDown={handleSaveName}
                        />
                    ) : (
                        <span 
                            className="text-xs font-bold text-gray-200 cursor-pointer hover:text-blue-400"
                            onClick={() => setIsEditingName(true)}
                            title="Clic para cambiar nombre"
                        >
                            {studentName || "Estudiante"}
                        </span>
                    )}
                </div>
            );
        };

        const TeacherDashboard = ({ onClose }) => {
            const [grades, setGrades] = useState([]);

            useEffect(() => {
                const loadGrades = async () => {
                    if (window.eel) {
                        const res = await window.eel.api_get_grades()();
                        if (res.success) {
                            setGrades(res.grades);
                        }
                    }
                };
                loadGrades();
            }, []);

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm animate-fade-in">
                    <div className="bg-gray-900 border border-indigo-500/50 rounded-xl shadow-2xl w-[600px] overflow-hidden">
                        <div className="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-800/50">
                            <h2 className="text-white font-bold flex items-center gap-2">
                                <Users size={20} className="text-indigo-400" /> Panel del Profesor
                            </h2>
                            <button onClick={onClose} className="text-gray-400 hover:text-white"><X size={20} /></button>
                        </div>
                        <div className="p-6">
                            <table className="w-full text-left text-sm text-gray-400">
                                <thead className="text-xs text-gray-500 uppercase bg-gray-800">
                                    <tr>
                                        <th className="px-4 py-3 rounded-tl-lg">Estudiante</th>
                                        <th className="px-4 py-3">Reto</th>
                                        <th className="px-4 py-3">Estado</th>
                                        <th className="px-4 py-3 rounded-tr-lg">Hora</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {grades.map((g, i) => (
                                        <tr key={i} className="border-b border-gray-800 hover:bg-gray-800/50">
                                            <td className="px-4 py-3 font-medium text-gray-200">{g.student}</td>
                                            <td className="px-4 py-3 text-blue-400 font-mono">{g.challenge}</td>
                                            <td className={`px-4 py-3 font-bold ${g.status.includes('Aprobado') ? 'text-green-500' : 'text-red-500'}`}>{g.status}</td>
                                            <td className="px-4 py-3 text-xs">{g.timestamp}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const TerminalLog = ({ logs, isWaitingInput, terminalInput, setTerminalInput, handleTerminalSubmit }) => {
            const endRef = useRef(null);
            useEffect(() => endRef.current?.scrollIntoView({ behavior: "smooth" }), [logs, isWaitingInput]);
            return (
                <div className="vscode-terminal p-3 h-full overflow-y-auto text-sm flex flex-col">
                    <div className="flex-1">
                        {logs.map((log, i) => {
                            let cl = 'text-gray-400';
                            if (log.type === 'error') cl = 'text-red-400'; else if (log.type === 'warn') cl = 'text-yellow-400'; else if (log.type === 'success') cl = 'text-green-400'; else if (log.type === 'output') cl = 'text-white';
                            return <div key={i} className={`whitespace-pre-wrap break-words mb-0.5 ${cl}`}>{log.type !== 'output' && <span className="opacity-50 text-xs mr-2 select-none">[{log.time}]</span>}<span>{log.msg}</span></div>;
                        })}
                        {isWaitingInput && (
                            <div className="flex items-center mt-1 animate-fade-in">
                                <span className="text-blue-400 font-bold mr-2 animate-pulse">❯</span>
                                <input 
                                    autoFocus
                                    type="text"
                                    className="flex-1 bg-transparent border-none outline-none text-yellow-300 font-mono"
                                    value={terminalInput}
                                    onChange={e => setTerminalInput(e.target.value)}
                                    onKeyDown={handleTerminalSubmit}
                                    placeholder="Escribe tu respuesta y presiona Enter..."
                                />
                            </div>
                        )}
                        <div ref={endRef} />
                    </div>
                </div>
            );
        };

        const SidebarBtn = ({ label, icon: Icon, color, nodeType, onDragStart }) => (
            <div className="w-full text-left p-2 hover:bg-gray-800 rounded-md flex items-center gap-3 text-sm transition-colors group cursor-grab active:cursor-grabbing" draggable onDragStart={(e) => onDragStart(e, nodeType, label)}>
                <Icon size={16} className={`${color} group-hover:scale-110 transition-transform`} /><span className="text-gray-300 group-hover:text-white">{label}</span>
            </div>
        );

        const BaseNode = ({ data, title, icon: Icon, color, children }) => (
            <div>
                <div className={`forest-node-header ${color} text-white`}><Icon size={16} /><span>{title}</span></div>
                <div className="forest-node-body">{children}</div>
                <Handle type="target" position="left" className="!bg-gray-400 !w-3 !h-3 hover:!bg-white" />
                <Handle type="source" position="right" className="!bg-blue-500 !w-3 !h-3 hover:!bg-white" />
            </div>
        );

        const NODE_COLORS = {
            py_var: '#ca8a04', py_print: '#4b5563', py_if: '#ea580c', py_loop: '#c2410c', py_math: '#0d9488', py_func: '#7c3aed',
            default: '#6b7280'
        };

        const SmartEdge = ({ id, source, target, sourceX, sourceY, targetX, targetY, sourcePosition, targetPosition, style = {}, markerEnd, data }) => {
            const sourceNode = useStore(s => s.nodeInternals.get(source));
            const targetNode = useStore(s => s.nodeInternals.get(target));
            const [edgePath] = getBezierPath({ sourceX, sourceY, sourcePosition, targetX, targetY, targetPosition });
            const status = data?.status || 'idle'; 
            const colorSrc = NODE_COLORS[sourceNode?.type] || NODE_COLORS.default;
            const colorTgt = NODE_COLORS[targetNode?.type] || NODE_COLORS.default;
            let edgeStyle = { ...style };
            let gradientId = `grad-${id}`;

            if (status === 'error') edgeStyle.stroke = '#f97316'; 
            else if (status === 'active') edgeStyle.stroke = `url(#${gradientId})`;
            else { edgeStyle.stroke = '#4b5563'; edgeStyle.opacity = 0.5; }

            return (
                <>
                    <defs><linearGradient id={gradientId} x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stopColor={colorSrc} /><stop offset="100%" stopColor={colorTgt} /></linearGradient></defs>
                    <BaseEdge path={edgePath} markerEnd={markerEnd} style={edgeStyle} className={status === 'active' ? 'edge-path-active' : status === 'error' ? 'edge-path-error' : 'edge-path-idle'} />
                </>
            );
        };
        
        const edgeTypes = { smart: SmartEdge };

        const nodeTypes = {
            py_var: ({ data, id }) => <BaseNode title="Variable" icon={Variable} color="bg-yellow-600"><div className="flex gap-2 items-center"><input name="var_name" placeholder="x" className="node-input nodrag w-1/3" value={data.var_name||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><span className="font-bold">=</span><input name="value" placeholder="10" className="node-input nodrag" value={data.value||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div></BaseNode>,
            py_print: ({ data, id }) => <BaseNode title="Print" icon={Terminal} color="bg-gray-600"><input name="content" placeholder="msg" className="node-input nodrag" value={data.content||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></BaseNode>,
            py_if: ({ data, id }) => <BaseNode title="If" icon={Split} color="bg-orange-600"><input name="condition" placeholder="x > 5" className="node-input nodrag" value={data.condition||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><div className="text-[10px] text-gray-300 mt-1">Conectar a derecha</div></BaseNode>,
            py_loop: ({ data, id }) => <BaseNode title="For" icon={Repeat} color="bg-orange-700"><div className="flex gap-1 items-center mb-1"><span>for</span><input name="iterator" className="node-input nodrag w-8 p-0 text-center" value={data.iterator||'i'} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><span>in</span></div><input name="iterable" placeholder="range(10)" className="node-input nodrag" value={data.iterable||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></BaseNode>,
            py_while: ({ data, id }) => <BaseNode title="While" icon={RefreshCw} color="bg-orange-800"><input name="condition" placeholder="cond" className="node-input nodrag" value={data.condition||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></BaseNode>,
            py_math: ({ data, id }) => <BaseNode title="Math" icon={Calculator} color="bg-teal-600"><div className="flex gap-1"><input name="left" className="node-input nodrag w-1/3" value={data.left||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><select name="op" className="node-input nodrag w-1/4 p-0 text-center" value={data.op||'+'} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})}><option>+</option><option>-</option><option>*</option><option>/</option></select><input name="right" className="node-input nodrag w-1/3" value={data.right||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div><div className="mt-1 flex items-center gap-1"><span className="text-xs">Save:</span><input name="target" placeholder="res" className="node-input nodrag" value={data.target||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div></BaseNode>,
            py_compare: ({ data, id }) => <BaseNode title="Compare" icon={CheckSquare} color="bg-cyan-700"><div className="flex gap-1"><input name="left" className="node-input nodrag w-1/3" value={data.left||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><select name="op" className="node-input nodrag w-1/4 p-0 text-center" value={data.op||'=='} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})}><option>==</option><option>&gt;</option><option>&lt;</option></select><input name="right" className="node-input nodrag w-1/3" value={data.right||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div></BaseNode>,
            py_func: ({ data, id }) => <BaseNode title="Function" icon={FunctionSquare} color="bg-violet-600"><input name="func_name" placeholder="name" className="node-input nodrag mb-1" value={data.func_name||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><input name="args" placeholder="args" className="node-input nodrag" value={data.args||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></BaseNode>,
            py_return: ({ data, id }) => <BaseNode title="Return" icon={ArrowLeft} color="bg-rose-600"><input name="value" placeholder="val" className="node-input nodrag" value={data.value||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></BaseNode>,
            py_control: ({ data, id }) => <BaseNode title="Control" icon={XCircle} color="bg-red-800"><select name="control_type" className="node-input nodrag" value={data.control_type||'break'} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})}><option value="break">Break</option><option value="continue">Continue</option><option value="pass">Pass</option></select></BaseNode>,
            py_input: ({ data, id }) => <BaseNode title="Input" icon={Keyboard} color="bg-slate-600"><input name="prompt" placeholder="msg" className="node-input nodrag mb-1" value={data.prompt||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><input name="target" placeholder="var" className="node-input nodrag" value={data.target||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></BaseNode>,
            py_int: ({ data, id }) => <BaseNode title="To Integer" icon={Code} color="bg-pink-700"><div className="flex gap-1 items-center mb-1"><span className="text-xs font-mono">int(</span><input name="value" placeholder="var" className="node-input nodrag w-16" value={data.value||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><span className="text-xs font-mono">)</span></div><div className="flex items-center gap-1"><span className="text-xs">Save:</span><input name="target" placeholder="res" className="node-input nodrag" value={data.target||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div></BaseNode>,
            py_float: ({ data, id }) => <BaseNode title="To Decimal" icon={Code} color="bg-pink-600"><div className="flex gap-1 items-center mb-1"><span className="text-xs font-mono">float(</span><input name="value" placeholder="var" className="node-input nodrag w-16" value={data.value||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><span className="text-xs font-mono">)</span></div><div className="flex items-center gap-1"><span className="text-xs">Save:</span><input name="target" placeholder="res" className="node-input nodrag" value={data.target||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div></BaseNode>,
            py_class: ({ data, id }) => <BaseNode title="Class" icon={Box} color="bg-indigo-700"><input name="name" placeholder="Name" className="node-input nodrag mb-1" value={data.name||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /><input name="bases" placeholder="Inherits" className="node-input nodrag" value={data.bases||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></BaseNode>,
            py_import: ({ data, id }) => <BaseNode title="Import" icon={Package} color="bg-sky-700"><div className="flex gap-1 mb-1"><span className="text-xs">from</span><input name="from" className="node-input nodrag" value={data.from||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div><div className="flex gap-1"><span className="text-xs">import</span><input name="names" className="node-input nodrag" value={data.names||''} onChange={e=>data.onChange(id, {...data, [e.target.name]: e.target.value})} /></div></BaseNode>,
            py_try: ({ data, id }) => <BaseNode title="Try/Except" icon={AlertTriangle} color="bg-amber-600"><div className="text-xs text-gray-300">Errors handled below</div></BaseNode>
        };

        // COMPONENTE MODAL PERSONALIZADO
        const CustomModal = ({ isOpen, type, title, message, onConfirm, onCancel }) => {
            const [inputVal, setInputVal] = useState("");

            useEffect(() => { if (isOpen) setInputVal(""); }, [isOpen]);

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-sm animate-fade-in">
                    <div className="bg-gray-800 border border-gray-600 rounded-xl shadow-2xl w-96 p-6 transform transition-all scale-100">
                        <div className="flex items-center gap-3 mb-4">
                            <div className="bg-blue-600 p-2 rounded-lg">
                                {type === 'prompt' || type === 'confirm' ? <Save size={20} className="text-white"/> : <AlertTriangle size={20} className="text-white"/>}
                            </div>
                            <h3 className="text-lg font-bold text-white">{title || "EduBot Forest Studio"}</h3>
                        </div>

                        <p className="text-gray-300 text-sm mb-4">{message}</p>

                        {type === 'prompt' && (
                            <input 
                                autoFocus
                                type="text" 
                                className="w-full bg-gray-900 border border-gray-600 rounded-lg p-2 text-white outline-none focus:border-blue-500 mb-6 transition-colors"
                                placeholder="Escribe aquí..."
                                value={inputVal}
                                onChange={(e) => setInputVal(e.target.value)}
                                onKeyDown={(e) => { if (e.key === 'Enter') onConfirm(inputVal); }}
                            />
                        )}

                        <div className="flex justify-end gap-3">
                            {type !== 'alert' && (
                                <button 
                                    onClick={onCancel}
                                    className="px-4 py-2 rounded-lg text-sm text-gray-400 hover:text-white hover:bg-gray-700 transition-colors"
                                >
                                    Cancelar
                                </button>
                            )}
                            <button 
                                onClick={() => type === 'prompt' ? onConfirm(inputVal) : onConfirm()}
                                className="px-4 py-2 rounded-lg text-sm bg-blue-600 hover:bg-blue-500 text-white font-semibold shadow-lg shadow-blue-500/20 transition-all"
                            >
                                {type === 'alert' ? 'Entendido' : 'Aceptar'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const WelcomeScreen = ({ onNew, onOpen }) => {
            const [viewState, setViewState] = useState(localStorage.getItem('edubot_role') ? 'menu' : 'role_select'); 
            const [inputVal, setInputVal] = useState('');
            const [teacherUser, setTeacherUser] = useState('');
            const [teacherName, setTeacherName] = useState('');
            const [adminPwd, setAdminPwd] = useState('');
            const [usersList, setUsersList] = useState([]);
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleRoleSelect = (role) => {
                setViewState(role === 'student' ? 'login_student' : 'login_teacher');
                setInputVal('');
                setTeacherUser('');
                setTeacherName('');
                setAdminPwd('');
                setError('');
            };

            const performLogin = async () => {
                if (!inputVal.trim()) { setError("El campo no puede estar vacío"); return; }
                setLoading(true);
                setError('');

                try {
                    let res;
                    if (viewState === 'login_student') {
                        res = await window.eel.api_login_student(inputVal)();
                        if (res.success) {
                            localStorage.setItem('edubot_role', 'student');
                            localStorage.setItem('edubot_student_name', res.name);
                            setViewState('menu');
                        } else { setError(res.error); }
                    } else {
                        if (!teacherUser.trim()) { setError("El usuario es requerido"); setLoading(false); return; }
                        res = await window.eel.api_login_teacher(teacherUser, inputVal)();
                        if (res.success) {
                            localStorage.setItem('edubot_role', 'teacher');
                            setViewState('menu');
                        } else { setError(res.error); }
                    }
                } catch (e) {
                    setError("Error de conexión con el backend: " + e);
                }
                setLoading(false);
            };

            const performRegister = async () => {
                if (!teacherUser.trim() || !inputVal.trim() || !teacherName.trim()) {
                    setError("Todos los campos son requeridos");
                    return;
                }
                setLoading(true);
                try {
                    const res = await window.eel.api_create_teacher(teacherUser, inputVal, teacherName)();
                    if (res.success) {
                        alert("Profesor registrado correctamente. Ahora puedes iniciar sesión.");
                        setViewState('login_teacher');
                        setError('');
                        setInputVal('');
                    } else { setError(res.error); }
                } catch (e) { setError("Error: " + e); }
                setLoading(false);
            };

            const performAdminLogin = async () => {
                if (!adminPwd.trim()) return;
                setLoading(true);
                const res = await window.eel.api_check_admin_access(adminPwd)();
                if (res.success) {
                    setViewState('admin_dashboard');
                    loadUsers();
                    setError('');
                } else {
                    setError("Contraseña maestra incorrecta");
                }
                setLoading(false);
            };

            const loadUsers = async () => {
                const res = await window.eel.api_get_users()();
                if (res.success) setUsersList(res.users);
            };

            const deleteUser = async (username) => {
                if(!confirm(`¿Estás seguro de eliminar al profesor '${username}'?`)) return;
                const res = await window.eel.api_delete_user(username)();
                if (res.success) {
                    loadUsers();
                } else {
                    alert("Error al eliminar: " + res.error);
                }
            };

            const renderContent = () => {
                if (viewState === 'menu') {
                    return (
                        <div className="space-y-3 animate-fade-in">
                            <div className="text-sm text-gray-400 mb-4">
                                Conectado como: <span className="text-white font-bold">{localStorage.getItem('edubot_role') === 'teacher' ? 'Profesor' : localStorage.getItem('edubot_student_name')}</span>
                                <button onClick={() => { localStorage.removeItem('edubot_role'); localStorage.removeItem('edubot_student_name'); setViewState('role_select'); }} className="ml-2 text-xs text-red-400 hover:underline">(Salir)</button>
                            </div>
                            <button onClick={onNew} className="w-full flex items-center justify-center gap-3 p-4 bg-gray-700 hover:bg-gray-600 rounded-xl transition-all border border-gray-600 hover:border-gray-500 group"><Code className="text-yellow-400 group-hover:scale-110 transition-transform" /><div className="text-left"><div className="font-semibold">Nuevo Proyecto Python</div><div className="text-xs text-gray-400">Aprender lógica de programación</div></div></button>
                            <button onClick={onOpen} className="w-full flex items-center justify-center gap-3 p-4 bg-gray-700 hover:bg-gray-600 rounded-xl transition-all border border-gray-600 hover:border-gray-500 group"><FolderOpen className="text-purple-400 group-hover:scale-110 transition-transform" /><div className="text-left"><div className="font-semibold">Abrir Proyecto</div><div className="text-xs text-gray-400">Cargar tu entorno de bloques</div></div></button>
                        </div>
                    );
                }

                if (viewState === 'role_select') {
                    return (
                        <div className="space-y-4 animate-fade-in">
                            <h2 className="text-xl font-semibold text-white">¿Quién eres?</h2>
                            <div className="grid grid-cols-2 gap-4">
                                <button onClick={() => handleRoleSelect('student')} className="flex flex-col items-center gap-2 p-4 bg-gray-700 hover:bg-gray-600 rounded-xl border border-gray-600 hover:border-blue-500 transition-all">
                                    <Users size={32} className="text-blue-400" />
                                    <span className="font-bold">Estudiante</span>
                                </button>
                                <button onClick={() => handleRoleSelect('teacher')} className="flex flex-col items-center gap-2 p-4 bg-gray-700 hover:bg-gray-600 rounded-xl border border-gray-600 hover:border-indigo-500 transition-all">
                                    <Settings size={32} className="text-indigo-400" />
                                    <span className="font-bold">Profesor</span>
                                </button>
                            </div>
                        </div>
                    );
                }

                if (viewState === 'register_teacher') {
                    return (
                        <div className="space-y-3 animate-fade-in text-left">
                            <div className="flex items-center gap-2 text-gray-400 cursor-pointer hover:text-white mb-2" onClick={() => setViewState('login_teacher')}><ArrowLeft size={16} /> <span>Volver</span></div>
                            <h2 className="text-xl font-semibold text-white text-center">Nuevo Profesor</h2>
                            <div>
                                <label className="block text-xs text-gray-400 mb-1">Nombre Completo</label>
                                <input type="text" className="w-full bg-gray-900 border border-gray-600 rounded-lg p-2 text-white outline-none focus:border-blue-500" placeholder="Ej: Prof. María González" value={teacherName} onChange={(e) => setTeacherName(e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-xs text-gray-400 mb-1">Usuario</label>
                                <input type="text" className="w-full bg-gray-900 border border-gray-600 rounded-lg p-2 text-white outline-none focus:border-blue-500" placeholder="Ej: maria.g" value={teacherUser} onChange={(e) => setTeacherUser(e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-xs text-gray-400 mb-1">Contraseña</label>
                                <input type="password" className="w-full bg-gray-900 border border-gray-600 rounded-lg p-2 text-white outline-none focus:border-blue-500" placeholder="••••••" value={inputVal} onChange={(e) => setInputVal(e.target.value)} />
                            </div>
                            {error && <div className="text-red-400 text-xs bg-red-900/20 p-2 rounded border border-red-900/50">{error}</div>}
                            <button onClick={performRegister} disabled={loading} className={`w-full py-2 mt-2 rounded-lg font-bold shadow-lg transition-all bg-green-600 hover:bg-green-500 text-white shadow-green-500/20 ${loading ? 'opacity-50 cursor-not-allowed' : ''}`}>{loading ? 'Registrando...' : 'Crear Cuenta'}</button>
                        </div>
                    );
                }

                if (viewState === 'admin_auth') {
                    return (
                        <div className="space-y-4 animate-fade-in">
                            <div className="flex items-center gap-2 text-gray-400 cursor-pointer hover:text-white mb-2" onClick={() => setViewState('login_teacher')}><ArrowLeft size={16} /> <span>Volver</span></div>
                            <h2 className="text-xl font-semibold text-red-400 flex items-center justify-center gap-2"><Settings size={20}/> Administración</h2>
                            <p className="text-xs text-gray-400">Ingresa la contraseña maestra del sistema.</p>

                            <label className="block text-xs text-gray-400 mb-1">{isTeacher ? 'Contraseña' : 'Tu Nombre'}</label>
                            <input type={isTeacher ? "password" : "text"} className="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-white outline-none focus:border-blue-500 transition-colors" placeholder={isTeacher ? "••••••" : "Ej: Juan Pérez"} value={inputVal} onChange={(e) => setInputVal(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && performLogin()} autoFocus />
                        </div>
                        {error && <div className="text-red-400 text-xs bg-red-900/20 p-2 rounded border border-red-900/50">{error}</div>}
                        <button onClick={performLogin} disabled={loading} className={`w-full py-3 rounded-lg font-bold shadow-lg transition-all ${isTeacher ? 'bg-indigo-600 hover:bg-indigo-500 text-white shadow-indigo-500/20' : 'bg-blue-600 hover:bg-blue-500 text-white shadow-blue-500/20'} ${loading ? 'opacity-50 cursor-not-allowed' : ''}`}>{loading ? 'Conectando...' : 'Ingresar'}</button>
                        {isTeacher && <div className="text-center"><button onClick={() => { setError(''); setViewState('register_teacher'); }} className="text-xs text-indigo-400 hover:text-indigo-300 hover:underline">¿No tienes cuenta? Regístrate aquí</button></div>}
                        {isTeacher && <div className="text-center mt-2 pt-2 border-t border-gray-700"><button onClick={() => { setError(''); setAdminPwd(''); setViewState('admin_auth'); }} className="text-[10px] text-gray-500 hover:text-gray-300 uppercase tracking-wider font-bold">Administrar Cuentas</button></div>}

            return (
                <div className="h-full flex flex-col items-center justify-center bg-gray-900 text-white relative overflow-hidden">
                    <div className="absolute inset-0 opacity-10 pointer-events-none"><div className="absolute top-0 left-0 w-64 h-64 bg-green-500 rounded-full mix-blend-multiply filter blur-3xl animate-blob"></div><div className="absolute top-0 right-0 w-64 h-64 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl animate-blob animation-delay-2000"></div><div className="absolute bottom-0 left-20 w-64 h-64 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl animate-blob animation-delay-4000"></div></div>
                    <div className="z-10 text-center space-y-6 p-8 bg-gray-800/50 backdrop-blur-md rounded-2xl border border-gray-700 shadow-2xl max-w-lg w-full transition-all">
                        <div className="flex justify-center mb-2"><div className="bg-green-500 p-4 rounded-full shadow-lg shadow-green-500/20"><Sprout size={48} className="text-white" /></div></div>
                        <div><h1 className="text-4xl font-bold bg-gradient-to-r from-green-400 to-blue-500 bg-clip-text text-transparent">EduBot Forest Studio</h1><p className="text-gray-400 mt-2">v1.0 Stable • Python Fundamentals</p></div>

        };

        const TutorialOverlay = ({ onComplete }) => {
            const [step, setStep] = useState(0);
            const steps = [
                { title: "¡Bienvenido a EduBot!", desc: "Tu estudio visual para aprender Python. Vamos a ver cómo funciona en sencillos pasos.", icon: <Sprout size={48} className="text-green-400 mx-auto mb-4" /> },
                { title: "1. Arrastra y Suelta", desc: "En el panel izquierdo tienes tus herramientas de código. Haz clic y arrastra los bloques hacia el lienzo oscuro (el Bosque).", icon: <Box size={48} className="text-blue-400 mx-auto mb-4" /> },
                { title: "2. Conecta la Lógica", desc: "Une los puntos. Haz clic en el punto derecho de un nodo y arrastra la línea hacia el punto izquierdo de otro para conectar el flujo de tu programa.", icon: <Share2 size={48} className="text-purple-400 mx-auto mb-4" /> },
                { title: "3. Ejecuta y Aprende", desc: "Cuando estés listo, presiona el botón verde 'Ejecutar'. Verás el código de Python real generándose y la salida en la terminal inferior.", icon: <Play size={48} className="text-red-400 mx-auto mb-4" /> }
            ];
            const handleNext = () => { if (step < steps.length - 1) setStep(step + 1); else onComplete(); };
            return (
                <div className="tutorial-overlay">
                    <div className="tutorial-card border-t-4 border-t-blue-500">
                        {steps[step].icon}
                        <h2 className="text-2xl font-bold text-white mb-2">{steps[step].title}</h2>
                        <p className="text-gray-300 mb-6 text-sm leading-relaxed">{steps[step].desc}</p>
                        <button onClick={handleNext} className="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-semibold transition-colors shadow-lg shadow-blue-500/20">{step === steps.length - 1 ? "¡Entendido, a crear!" : "Siguiente"}</button>
                        <div className="tutorial-step-dots">{steps.map((_, i) => (<div key={i} className={`dot ${i === step ? 'active' : ''}`} />))}</div>
                        <button onClick={onComplete} className="mt-4 text-xs text-gray-500 hover:text-gray-300 underline">Saltar tutorial</button>
                    </div>
                </div>
            );
        };

        const SettingsModal = ({ isOpen, onClose, prefs, setPrefs }) => {
            if (!isOpen) return null;

            const handleChange = (key, value) => {
                const newPrefs = { ...prefs, [key]: value };
                setPrefs(newPrefs);
                localStorage.setItem('edubot_preferences', JSON.stringify(newPrefs));
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm animate-fade-in">
                    <div className="bg-gray-900 border border-gray-700 rounded-xl shadow-2xl w-[600px] overflow-hidden flex flex-col max-h-[85vh]">
                        
                        <div className="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-800">
                            <h2 className="text-white font-bold flex items-center gap-2">
                                <Settings size={20} /> Preferencias de EduBot
                            </h2>
                            <button onClick={onClose} className="text-gray-400 hover:text-white">
                                <X size={20} />
                            </button>
                        </div>

                        <div className="p-6 overflow-y-auto space-y-8 text-sm text-gray-300">
                            
                            <div>
                                <h3 className="text-green-400 font-bold uppercase text-xs mb-3 flex items-center gap-2">
                                    <Monitor size={14}/> Interfaz y Accesibilidad
                                </h3>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="col-span-2 flex justify-between items-center bg-gray-800/50 p-2 rounded">
                                        <label>Escala de Interfaz (Zoom)</label>
                                        <div className="flex items-center gap-3">
                                            <input 
                                                type="range" min="80" max="130" step="5"
                                                value={prefs.uiScale}
                                                onChange={(e) => handleChange('uiScale', e.target.value)}
                                                className="accent-blue-500 w-32"
                                            />
                                            <span className="w-10 text-right font-mono">{prefs.uiScale}%</span>
                                        </div>
                                    </div>
                                    <div className="flex justify-between items-center bg-gray-800/50 p-2 rounded">
                                        <label>Fuente Dislexia</label>
                                        <input type="checkbox" checked={prefs.dyslexicFont} 
                                            onChange={(e) => handleChange('dyslexicFont', e.target.checked)} className="accent-blue-500 w-4 h-4"/>
                                    </div>
                                    <div className="flex justify-between items-center bg-gray-800/50 p-2 rounded">
                                        <label>Reducir Movimiento</label>
                                        <input type="checkbox" checked={prefs.reduceMotion} 
                                            onChange={(e) => handleChange('reduceMotion', e.target.checked)} className="accent-blue-500 w-4 h-4"/>
                                    </div>
                                </div>
                            </div>

                            <hr className="border-gray-700" />

                            <div>
                                <h3 className="text-blue-400 font-bold uppercase text-xs mb-3 flex items-center gap-2">
                                    <Code size={14}/> Editor de Código
                                </h3>
                                <div className="space-y-2">
                                    <div className="flex justify-between items-center bg-gray-800/50 p-2 rounded">
                                        <label>Tamaño de Fuente</label>
                                        <select value={prefs.editorFontSize} onChange={(e) => handleChange('editorFontSize', e.target.value)}
                                            className="bg-gray-700 border border-gray-600 rounded p-1 text-white text-xs">
                                            <option value="12">Pequeña (12px)</option>
                                            <option value="14">Normal (14px)</option>
                                            <option value="16">Grande (16px)</option>
                                            <option value="18">Enorme (18px)</option>
                                        </select>
                                    </div>
                                    <div className="flex justify-between items-center bg-gray-800/50 p-2 rounded">
                                        <label>Ajuste de Línea (Word Wrap)</label>
                                        <input type="checkbox" checked={prefs.wordWrap} 
                                            onChange={(e) => handleChange('wordWrap', e.target.checked)} className="accent-blue-500 w-4 h-4"/>
                                    </div>
                                    <div className="flex justify-between items-center bg-gray-800/50 p-2 rounded">
                                        <label>Números de Línea</label>
                                        <input type="checkbox" checked={prefs.lineNumbers} 
                                            onChange={(e) => handleChange('lineNumbers', e.target.checked)} className="accent-blue-500 w-4 h-4"/>
                                    </div>
                                </div>
                            </div>

                            <hr className="border-gray-700" />

                            <div>
                                <h3 className="text-purple-400 font-bold uppercase text-xs mb-3 flex items-center gap-2">
                                    <Share2 size={14}/> Editor de Nodos
                                </h3>
                                <div className="space-y-2">
                                    <div className="flex justify-between items-center bg-gray-800/50 p-2 rounded">
                                        <label>Ajustar a Cuadrícula (Snap)</label>
                                        <input type="checkbox" checked={prefs.snapToGrid} 
                                            onChange={(e) => handleChange('snapToGrid', e.target.checked)} className="accent-blue-500 w-4 h-4"/>
                                    </div>
                                    <div className="flex justify-between items-center bg-gray-800/50 p-2 rounded">
                                        <label>Mostrar Minimapa</label>
                                        <input type="checkbox" checked={prefs.showMinimap} 
                                            onChange={(e) => handleChange('showMinimap', e.target.checked)} className="accent-blue-500 w-4 h-4"/>
                                    </div>
                                    <div className="flex justify-between items-center bg-gray-800/50 p-2 rounded">
                                        <label>Estilo de Conexión</label>
                                        <select value={prefs.connectionStyle} onChange={(e) => handleChange('connectionStyle', e.target.value)}
                                            className="bg-gray-700 border border-gray-600 rounded p-1 text-white text-xs">
                                            <option value="default">Bezier (Curvo)</option>
                                            <option value="straight">Recto</option>
                                            <option value="step">Escalonado (Step)</option>
                                            <option value="smoothstep">Suave (Smooth)</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <hr className="border-gray-700" />

                            <div>
                                <h3 className="text-red-400 font-bold uppercase text-xs mb-3 flex items-center gap-2">
                                    <Cpu size={14}/> Sistema
                                </h3>
                                <div className="flex justify-between items-center bg-gray-800/50 p-2 rounded mb-2">
                                    <label>Tutorial de Bienvenida</label>
                                    <button onClick={() => { localStorage.removeItem('edubot_tutorial_completed'); alert("Tutorial reiniciado."); }}
                                        className="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-xs text-white border border-gray-600">
                                        Reiniciar Tutorial
                                    </button>
                                </div>
                                <div className="flex justify-between items-center bg-gray-800/50 p-2 rounded">
                                    <label className="text-red-300">Zona de Peligro</label>
                                    <button onClick={() => { if(confirm("¿Borrar todas las preferencias y reiniciar?")) { localStorage.clear(); location.reload(); } }}
                                        className="px-3 py-1 bg-red-900/50 hover:bg-red-800 text-red-200 rounded text-xs border border-red-800">
                                        Borrar Todo (Factory Reset)
                                    </button>
                                </div>
                            </div>

                        </div>

                        <div className="p-4 bg-gray-800 border-t border-gray-700 flex justify-end">
                            <button onClick={onClose} className="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-semibold shadow-lg">
                                Aplicar y Cerrar
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const EditorContent = ({ onBack, initialNodes, initialEdges, currentName, setCurrentName }) => {
            const [nodes, setNodes, onNodesChange] = useNodesState(initialNodes || []);
            const [edges, setEdges, onEdgesChange] = useEdgesState(initialEdges || []);
            const [showTutorial, setShowTutorial] = useState(false);
            const [reactFlowInstance, setReactFlowInstance] = useState(null);
            const [logs, setLogs] = useState([{ time: new Date().toLocaleTimeString(), msg: `IDE Python Listo`, type: 'info' }]);
            const [activeTab, setActiveTab] = useState('forest'); 
            const [pythonCode, setPythonCode] = useState("# El código generado aparecerá aquí...");
            const [isWaitingInput, setIsWaitingInput] = useState(false);
            const [terminalInput, setTerminalInput] = useState('');
            const codeRef = useRef(null);
            
            const reactFlowWrapper = useRef(null);
            const [prefs, setPrefs] = useState({
                uiScale: '100', dyslexicFont: false, reduceMotion: false,
                editorFontSize: '14', wordWrap: false, lineNumbers: true,
                snapToGrid: true, showMinimap: false, connectionStyle: 'default' 
            });
            const [showSettings, setShowSettings] = useState(false);
            const [showTeacherDashboard, setShowTeacherDashboard] = useState(false);


            useEffect(() => {
                // Escuchando los prints de Python en tiempo real
                window.eel.expose(api_realtime_log, 'api_realtime_log');
                function api_realtime_log(text) {
                    setLogs(p => [...p, { time: new Date().toLocaleTimeString(), msg: text, type: 'output' }]);
                }

                // Escuchando la solicitud de Input de Python
                window.eel.expose(trigger_frontend_input, 'trigger_frontend_input');
                function trigger_frontend_input() {
                    setIsWaitingInput(true);
                }
            }, []);

            const handleTerminalSubmit = async (e) => {
                if (e.key === 'Enter') {
                    const val = terminalInput;
                    setTerminalInput('');
                    setIsWaitingInput(false);
                    await window.eel.api_provide_input(val)();
                }
            };

            useEffect(() => {
                const root = document.documentElement;
                root.style.setProperty('--editor-font-size', `${prefs.editorFontSize}px`);
                document.body.style.zoom = `${prefs.uiScale}%`;
                
                if (prefs.dyslexicFont) {
                    document.body.style.fontFamily = 'Verdana, sans-serif'; 
                    document.body.style.letterSpacing = '0.5px';
                } else {
                    document.body.style.fontFamily = ''; 
                    document.body.style.letterSpacing = '';
                }

                if (prefs.reduceMotion) {
                    root.style.setProperty('--animate-connection', 'none');
                    const styles = document.getElementById('motion-reduce-style') || document.createElement('style');
                    styles.id = 'motion-reduce-style';
                    styles.innerHTML = prefs.reduceMotion ? `* { animation: none !important; transition: none !important; }` : '';
                    document.head.appendChild(styles);
                } else {
                    const styles = document.getElementById('motion-reduce-style');
                    if(styles) styles.innerHTML = '';
                }

            }, [prefs]);

            const addLog = (msg, type = 'info') => setLogs(p => [...p, { time: new Date().toLocaleTimeString(), msg, type }]);
            
            const onConnect = useCallback((params) => {
                setEdges((eds) => addEdge({ ...params, type: 'smart', animated: false, data: { status: 'idle' } }, eds));
            }, [setEdges]);
            
            const onNodeDataChange = (id, newData) => {
                setNodes((nds) => nds.map((node) => node.id === id ? { ...node, data: newData } : node));
            };

            useEffect(() => {
                if (initialNodes && initialNodes.length > 0) {
                    const reanimatedNodes = initialNodes.map(node => ({
                        ...node,
                        data: {
                            ...node.data,
                            onChange: onNodeDataChange
                        }
                    }));
                    setNodes(reanimatedNodes);
                }
            }, []);

            const onDragOver = useCallback((event) => { event.preventDefault(); event.dataTransfer.dropEffect = 'move'; }, []);
            
            const onDrop = useCallback((event) => {
                event.preventDefault();
                const type = event.dataTransfer.getData('application/reactflow/type');
                const label = event.dataTransfer.getData('application/reactflow/label');
                if (!type || !reactFlowInstance) return;
                const position = reactFlowInstance.screenToFlowPosition({ x: event.clientX, y: event.clientY });
                const newNode = { id: `${type}_${Date.now()}`, type, position, data: { label, onChange: onNodeDataChange } };
                setNodes((nds) => nds.concat(newNode));
                addLog(`Nodo: ${label}`);
            }, [reactFlowInstance]);

            const onDragStart = (event, nodeType, label) => {
                event.dataTransfer.setData('application/reactflow/type', nodeType);
                event.dataTransfer.setData('application/reactflow/label', label);
                event.dataTransfer.effectAllowed = 'move';
            };

            const deleteSelected = () => {
                const selected = nodes.filter(n => n.selected);
                if (!selected.length) return;
                setNodes(nds => nds.filter(n => !n.selected));
                setEdges(eds => eds.filter(e => !selected.some(n => n.id === e.source || n.id === e.target)));
                addLog(`Eliminados ${selected.length} nodos`, 'warn');
            };

            const translateToCode = async () => {
                const blocks = serializeNodesLinear(nodes, edges);
                try {
                    if(window.eel) {
                        const res = await window.eel.api_translate("to_python", blocks)();
                        if (res.result) { setPythonCode(res.result); addLog("Traducción OK", 'success'); }
                        else addLog(`Error: ${res.error}`, 'error');
                    }
                } catch (e) { addLog(`Error: ${e}`, 'error'); }
            };

            const runPipeline = async () => {
                setLogs([{ time: new Date().toLocaleTimeString(), msg: "Iniciando Sandbox...", type: 'warn' }]); 
                setEdges(eds => eds.map(e => ({ ...e, data: { status: 'active' } })));
                const blocks = serializeNodesLinear(nodes, edges);
                try {
                    if (window.eel) {
                        const res = await window.eel.api_execute(blocks)();
                        if (res.success) {
                            addLog("Ejecución finalizada.", 'success');
                        } else {
                            addLog(`Error: ${res.error}`, 'error');
                        }
                        setEdges(eds => eds.map(e => ({ ...e, data: { status: 'idle' } })));
                    }
                } catch (e) { 
                    addLog(`Error: ${e}`, 'error');
                    setEdges(eds => eds.map(e => ({ ...e, data: { status: 'error' } })));
                }
            };

            const [modalConfig, setModalConfig] = useState({ 
                isOpen: false, type: 'prompt', title: '', message: '', 
                onConfirm: () => {}, onCancel: () => {} 
            });

            const closeModal = () => setModalConfig(prev => ({ ...prev, isOpen: false }));

            const saveProject = async () => {
                const performSave = async (name) => {
                    closeModal();
                    if (!name) return;

                    const data = { blocks: nodes.map(n=>({...n, type:n.type})), edges };
                    try {
                        const res = await window.eel.api_save_project(data, name)(); 
                        if (res.success) {
                            addLog(`Proyecto guardado: ${name}.edubotproj`, 'success'); 
                            setCurrentName(name); 
                        } else { 
                            addLog(`Error guardando: ${res.error}`, 'error'); 
                        }
                    } catch(e) { addLog(e, 'error'); }
                };

                if (currentName) {
                    performSave(currentName);
                } else {
                    setModalConfig({
                        isOpen: true, type: 'prompt', title: 'Guardar Proyecto',
                        message: 'Ingresa un nombre para tu archivo:',
                        onConfirm: (val) => performSave(val), 
                        onCancel: closeModal
                    });
                }
            };

            const trashProject = async () => {
                if (!currentName) {
                    if(confirm("El proyecto no está guardado. ¿Deseas descartar todos los cambios y limpiar el editor?")) { setNodes([]); setEdges([]); setLogs([]); addLog("Editor limpiado (Borrador descartado)", 'warn'); }
                    return;
                }
                if (confirm(`¿ESTÁS SEGURO?\n\nEl proyecto '${currentName}' será enviado a la Papelera de Reciclaje.\nEsta acción cerrará el editor.`)) {
                    try {
                        const res = await window.eel.api_move_to_trash(currentName, 'project')();
                        if (res.success) { alert("Proyecto enviado a la papelera exitosamente."); onBack(); } else { alert(`Error al eliminar: ${res.error}`); }
                    } catch (e) { alert(`Error de sistema: ${e}`); }
                }
            };

            useEffect(() => { if (activeTab === 'code' && codeRef.current && window.Prism) { window.Prism.highlightElement(codeRef.current); } }, [activeTab, pythonCode]);
            
            const finishTutorial = () => { localStorage.setItem('edubot_tutorial_completed', 'true'); setShowTutorial(false); };

            return (
                <div className="flex h-full flex-col relative">
                    {showTutorial && <TutorialOverlay onComplete={finishTutorial} />}
                    <div className="h-14 bg-gray-900 border-b border-gray-700 flex items-center px-4 justify-between shrink-0">
                        <div className="flex items-center gap-4">
                            <button onClick={onBack} className="text-gray-400 hover:text-white flex items-center gap-1 text-sm font-bold"><ArrowLeft size={16}/> Inicio</button>
                            <div className="text-xs text-gray-500 font-mono"> {currentName ? `Archivo: ${currentName}.edubotproj` : '• Sin Guardar'}</div>
                            <div className="h-6 w-px bg-gray-700"></div>
                            <div className="flex bg-gray-800 rounded p-1">
                                <button onClick={() => setActiveTab('forest')} className={`px-3 py-1 rounded text-xs font-medium ${activeTab==='forest'?'bg-gray-600 text-white':'text-gray-400'}`}>Bosque Visual</button>
                                <button onClick={() => { setActiveTab('code'); translateToCode(); }} className={`px-3 py-1 rounded text-xs font-medium ${activeTab==='code'?'bg-gray-600 text-white':'text-gray-400'}`}>Código Python</button>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={deleteSelected} title="Borrar un nodo del lienzo" className="p-2 rounded hover:bg-red-900/30 text-red-400"><Trash2 size={18}/></button>
                            <button onClick={saveProject} title="Guardar el avance del proyecto" className="p-2 rounded hover:bg-blue-900/30 text-blue-400"><Save size={18}/></button>
                            <button onClick={trashProject} title="Mover Proyecto a Papelera" className="p-2 rounded hover:bg-red-900/40 text-red-500 transition-colors border border-transparent hover:border-red-500/50"><FileWarning size={18}/></button>
                            <div className="h-6 w-px bg-gray-700 mx-1"></div>
                            <StudentAuth onOpenTeacherDashboard={() => setShowTeacherDashboard(true)} />
                            <div className="h-6 w-px bg-gray-700 mx-1"></div>
                            <button onClick={() => setShowSettings(true)} className="p-2 rounded hover:bg-gray-700 text-gray-400 hover:text-white mr-2" title="Preferencias"> <Settings size={18} /> </button>
                            <button onClick={() => setShowTutorial(true)} className="p-2 rounded hover:bg-gray-700 text-yellow-400 mr-2" title="Ver Tutorial"><span className="text-xs font-bold border border-yellow-400 rounded-full w-5 h-5 flex items-center justify-center">?</span></button>
                            <button onClick={runPipeline} className="bg-green-600 hover:bg-green-500 text-white px-4 py-1.5 rounded text-sm font-semibold flex items-center gap-2 shadow-lg"><Play size={16} fill="currentColor"/> Ejecutar</button>
                        </div>
                    </div>
                    <div className="flex-1 flex overflow-hidden">
                        <div className="w-64 bg-gray-900 border-r border-gray-700 flex flex-col shrink-0">
                            <div className="p-3 text-xs font-bold text-gray-500 uppercase tracking-wider border-b border-gray-800">Bloques Python</div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-1">
                                <SidebarBtn label="Variable" icon={Variable} color="text-yellow-400" nodeType="py_var" onDragStart={onDragStart} />
                                <SidebarBtn label="Input" icon={Keyboard} color="text-slate-400" nodeType="py_input" onDragStart={onDragStart} />
                                <SidebarBtn label="To Int (Entero)" icon={Code} color="text-pink-500" nodeType="py_int" onDragStart={onDragStart} />
                                <SidebarBtn label="To Float (Decimal)" icon={Code} color="text-pink-400" nodeType="py_float" onDragStart={onDragStart} />
                                <SidebarBtn label="Print" icon={Terminal} color="text-gray-400" nodeType="py_print" onDragStart={onDragStart} />
                                <div className="my-2 border-t border-gray-800"></div>
                                <SidebarBtn label="If" icon={Split} color="text-orange-400" nodeType="py_if" onDragStart={onDragStart} />
                                <SidebarBtn label="For" icon={Repeat} color="text-orange-500" nodeType="py_loop" onDragStart={onDragStart} />
                                <SidebarBtn label="While" icon={RefreshCw} color="text-orange-600" nodeType="py_while" onDragStart={onDragStart} />
                                <SidebarBtn label="Control" icon={XCircle} color="text-red-500" nodeType="py_control" onDragStart={onDragStart} />
                                <div className="my-2 border-t border-gray-800"></div>
                                <SidebarBtn label="Math" icon={Calculator} color="text-teal-400" nodeType="py_math" onDragStart={onDragStart} />
                                <SidebarBtn label="Compare" icon={CheckSquare} color="text-cyan-400" nodeType="py_compare" onDragStart={onDragStart} />
                                <SidebarBtn label="Function" icon={FunctionSquare} color="text-violet-400" nodeType="py_func" onDragStart={onDragStart} />
                                <SidebarBtn label="Return" icon={ArrowLeft} color="text-rose-400" nodeType="py_return" onDragStart={onDragStart} />
                                <div className="my-2 border-t border-gray-800"></div>
                                <SidebarBtn label="Class" icon={Box} color="text-indigo-400" nodeType="py_class" onDragStart={onDragStart} />
                                <SidebarBtn label="Import" icon={Package} color="text-sky-400" nodeType="py_import" onDragStart={onDragStart} />
                                <SidebarBtn label="Try/Except" icon={AlertTriangle} color="text-amber-400" nodeType="py_try" onDragStart={onDragStart} />
                            </div>
                        </div>
                        <div className="flex-1 relative bg-[#1e1e1e]" ref={reactFlowWrapper}>
                            {activeTab==='forest' ? <div className="h-full w-full"><ReactFlow nodes={nodes} edges={edges} onNodesChange={onNodesChange} onEdgesChange={onEdgesChange} onConnect={onConnect} edgeTypes={edgeTypes} onInit={setReactFlowInstance} onDrop={onDrop} onDragOver={onDragOver} nodeTypes={nodeTypes} fitView snapToGrid={prefs.snapToGrid} snapGrid={[15,15]} connectionLineType={prefs.connectionStyle}> {prefs.showMinimap && <RFObj.MiniMap style={{background:'#1a1a1a'}} nodeStrokeColor="#555" />} <Background color="#333" gap={20} /><Controls className="bg-gray-800 border-gray-700 fill-white text-white" /></ReactFlow></div> :
                             <div className="h-full w-full relative bg-[#1d1f21] overflow-auto custom-scrollbar group">
                                    <button onClick={() => {navigator.clipboard.writeText(pythonCode); addLog("Código copiado al portapapeles", "success")}} className="absolute top-4 right-4 bg-gray-700/50 hover:bg-gray-600 text-gray-300 p-2 rounded-lg backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-opacity z-10" title="Copiar Código"><Code size={16} /></button>
                                    <pre className="!m-0 !p-6 !bg-transparent !font-mono !text-sm min-h-full" style={{tabSize: 4}}><code ref={codeRef} className="language-python">{pythonCode}</code></pre>
                                </div>
                            }
                        </div>
                    </div>
                    <div className="h-40 border-t border-gray-700 flex flex-col bg-black shrink-0">
                        <div className="bg-gray-800 text-[10px] uppercase font-bold tracking-wider px-3 py-1 text-gray-400 border-b border-gray-700 flex justify-between">
                            <span>Terminal Interactiva</span>
                            <button onClick={()=>setLogs([])} className="hover:text-white">Clear</button>
                        </div>
                        <TerminalLog 
                            logs={logs} 
                            isWaitingInput={isWaitingInput}
                            terminalInput={terminalInput}
                            setTerminalInput={setTerminalInput}
                            handleTerminalSubmit={handleTerminalSubmit}
                        />
                    </div>
                    <SettingsModal isOpen={showSettings} onClose={() => setShowSettings(false)} prefs={prefs} setPrefs={setPrefs}/>
                    {showTeacherDashboard && <TeacherDashboard onClose={() => setShowTeacherDashboard(false)} />}
                    <CustomModal {...modalConfig} />
                </div>
            );
        };

        const Editor = (props) => {
            return (
                <ReactFlowProvider>
                    <EditorContent {...props} />
                </ReactFlowProvider>
            );
        };

        const Main = () => {
            const [view, setView] = useState('welcome');
            const [initialData, setInitialData] = useState(null);
            const [currentName, setCurrentName] = useState(null);

            const [modalConfig, setModalConfig] = useState({ 
                isOpen: false, type: 'prompt', title: '', message: '', 
                onConfirm: () => {}, onCancel: () => {} 
            });

            const closeModal = () => setModalConfig(prev => ({ ...prev, isOpen: false }));
            // ------------------------------------------------------------------

            const handleNewProject = () => { 
                setInitialData(null); 
                setCurrentName(null); 
                setView('editor'); 
            };

            const handleOpenProject = () => {
                setModalConfig({
                    isOpen: true,
                    type: 'prompt',
                    title: 'Abrir Proyecto',
                    message: 'Escribe el nombre del archivo a cargar:',
                    onConfirm: async (name) => {
                        closeModal();
                        if(!name) return;
                        try { 
                            const data = await window.eel.api_load_project(name)(); 
                            if(data && !data.error) { 
                                setInitialData(data); 
                                setCurrentName(data._found_name || name); 
                                setView('editor'); 
                            } else {
                                setTimeout(() => setModalConfig({
                                   isOpen: true, type: 'alert', title: 'Error', 
                                   message: "Error: " + (data.error || "No se pudo cargar"),
                                   onConfirm: closeModal
                                }), 100);
                            }
                        } catch(e) { console.error(e); }
                    },
                    onCancel: closeModal
                });
            };

            return (
                <>
                    {view === 'welcome' ? (
                        <WelcomeScreen onNew={handleNewProject} onOpen={handleOpenProject} />
                    ) : (
                        <Editor 
                            onBack={() => setView('welcome')} 
                            initialNodes={initialData?.blocks} 
                            initialEdges={initialData?.edges} 
                            currentName={currentName} 
                            setCurrentName={setCurrentName} 
                        />
                    )}
                    
                    {view === 'welcome' && <CustomModal {...modalConfig} />}
                </>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<Main />);
    </script>
</body>
</html>
