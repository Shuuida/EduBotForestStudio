                            <div className="mb-3">
                                <label className="block text-xs text-gray-400 mb-1">Usuario</label>
                                <input type="text" className="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-white outline-none focus:border-blue-500 transition-colors" placeholder={isTeacher ? "Ej: maria.g" : "Ej: juan123"} value={inputUser} onChange={(e) => setInputUser(e.target.value)} />
                            </div>
                            <div className="flex justify-between items-center mb-1">
                                <label className="block text-xs text-gray-400">Contraseña</label>
                                <button onClick={() => { setError(''); setInputPwd(''); setViewState(isTeacher ? 'forgot_teacher' : 'forgot_student'); }} className="text-[10px] text-gray-500 hover:text-gray-300 transition-colors">¿Olvidaste tu contraseña?</button>
                            </div>
                            <input type="password" className="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-white outline-none focus:border-blue-500 transition-colors" placeholder="••••••" value={inputPwd} onChange={(e) => setInputPwd(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && performLogin(isTeacher)} />
                        </div>
                        {error && <div className="text-red-400 text-xs bg-red-900/20 p-2 rounded border border-red-900/50">{error}</div>}
                        <button onClick={() => performLogin(isTeacher)} disabled={loading} className={`w-full py-3 rounded-lg font-bold shadow-lg transition-all ${isTeacher ? 'bg-indigo-600 hover:bg-indigo-500 text-white shadow-indigo-500/20' : 'bg-blue-600 hover:bg-blue-500 text-white shadow-blue-500/20'} ${loading ? 'opacity-50 cursor-not-allowed' : ''}`}>{loading ? 'Conectando...' : 'Ingresar'}</button>
                        
                        <div className="text-center">
                            <button onClick={() => { setError(''); setViewState(isTeacher ? 'register_teacher' : 'register_student'); }} className={`text-xs hover:underline ${isTeacher ? 'text-indigo-400 hover:text-indigo-300' : 'text-blue-400 hover:text-blue-300'}`}>
                                ¿No tienes cuenta? Regístrate aquí
                            </button>
                        </div>
                        
                        {isTeacher && <div className="text-center mt-2 pt-2 border-t border-gray-700"><button onClick={() => { setError(''); setAdminPwd(''); setViewState('admin_auth'); }} className="text-[10px] text-gray-500 hover:text-gray-300 uppercase tracking-wider font-bold">Administrar Cuentas</button></div>}
                    </div>
                );
            };

            return (
                <div className="h-full flex flex-col items-center justify-center bg-gray-900 text-white relative overflow-hidden">
                    <div className="absolute inset-0 opacity-10 pointer-events-none"><div className="absolute top-0 left-0 w-64 h-64 bg-green-500 rounded-full mix-blend-multiply filter blur-3xl animate-blob"></div><div className="absolute top-0 right-0 w-64 h-64 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl animate-blob animation-delay-2000"></div><div className="absolute bottom-0 left-20 w-64 h-64 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl animate-blob animation-delay-4000"></div></div>
                    <div className="z-10 text-center space-y-6 p-8 bg-gray-800/50 backdrop-blur-md rounded-2xl border border-gray-700 shadow-2xl max-w-lg w-full transition-all">
                        <div className="flex justify-center mb-2"><div className="bg-green-500 p-4 rounded-full shadow-lg shadow-green-500/20"><Sprout size={48} className="text-white" /></div></div>
                        <div><h1 className="text-4xl font-bold bg-gradient-to-r from-green-400 to-blue-500 bg-clip-text text-transparent">EduBot Forest Studio</h1><p className="text-gray-400 mt-2">v1.0 Stable • Python Fundamentals</p></div>
                        {renderContent()}
                    </div>
                </div>
            );
        };

        const TutorialOverlay = ({ onComplete }) => {
            const [step, setStep] = useState(0);
            
            const steps = [
                { title: "¡Bienvenido a EduBot!", desc: "Tu estudio visual para aprender Python. Vamos a ver cómo funciona en sencillos pasos.", icon: <Sprout size={48} className="text-green-400 mx-auto mb-4" /> },
                { title: "1. Arrastra y Suelta", desc: "En el panel izquierdo tienes tus herramientas de código. Haz clic y arrastra los bloques hacia el lienzo oscuro (el Bosque).", icon: <Box size={48} className="text-blue-400 mx-auto mb-4" /> },
                { title: "2. Conecta la Lógica", desc: "Une los puntos. Haz clic en el punto derecho de un nodo y arrastra la línea hacia el punto izquierdo de otro para conectar el flujo de tu programa.", icon: <Share2 size={48} className="text-purple-400 mx-auto mb-4" /> },
                { title: "3. Ejecuta y Aprende", desc: "Cuando estés listo, presiona el botón verde 'Ejecutar'. Verás el código de Python real generándose y la salida en la terminal inferior.", icon: <Play size={48} className="text-red-400 mx-auto mb-4" /> },
                // Nota: Se redujo sutilmente el margen inferior del icono (mb-2) para dar espacio a la licencia
                { title: "Manual de Usuario - Documentación", desc: "Para dominar todas las herramientas, descubrir atajos y ver ejemplos prácticos, abre nuestra documentación oficial en PDF.", icon: <Package size={48} className="text-emerald-400 mx-auto mb-2" /> }
            ];
            
            const handleNext = () => { if (step < steps.length - 1) setStep(step + 1); else onComplete(); };
            
            // Función para abrir el PDF y cerrar el tutorial
            const openManual = async () => {
                if (window.eel) {
                    const res = await window.eel.api_open_manual()();
                    if (!res.success) {
                        alert(res.error); // Usamos un alert simple aquí para no solapar el CustomModal del Main
                    }
                }
                onComplete(); 
            };

            const isLastStep = step === steps.length - 1;

            return (
                <div className="tutorial-overlay">
                    <div className={`tutorial-card border-t-4 ${isLastStep ? 'border-t-emerald-500' : 'border-t-blue-500'} relative transition-colors duration-300`}>
                        
                        {/* Botón de Check en la esquina superior derecha (Solo en la última lámina) */}
                        {isLastStep && (
                            <button 
                                onClick={onComplete} 
                                className="absolute top-4 right-4 text-gray-400 hover:text-emerald-400 transition-colors bg-gray-800 hover:bg-gray-700 p-1.5 rounded-lg" 
                                title="Ya sé usarlo, ir al editor"
                            >
                                <CheckSquare size={20} />
                            </button>
                        )}

                        {steps[step].icon}
                        <h2 className="text-2xl font-bold text-white mb-2">{steps[step].title}</h2>

                        {/* ENCABEZADO DE ICONOS CREATIVE COMMONS */}
                        {isLastStep && (
                            <div className="flex justify-center gap-2 mb-4 text-emerald-400/80" title="Licencia Creative Commons: CC BY-NC-SA 4.0">
                                {/* Icono CC */}
                                <span className="flex items-center justify-center w-7 h-7 rounded-full border-[2px] border-current text-[10px] font-bold tracking-tighter">CC</span>
                                {/* Icono BY (Atribución) */}
                                <span className="flex items-center justify-center w-7 h-7 rounded-full border-[2px] border-current text-[10px] font-bold">BY</span>
                                {/* Icono NC (No Comercial con línea cruzada) */}
                                <span className="flex items-center justify-center w-7 h-7 rounded-full border-[2px] border-current text-[10px] font-bold relative overflow-hidden">
                                    NC
                                    <div className="absolute w-[120%] h-[2px] bg-current -rotate-45"></div>
                                </span>
                                {/* Icono SA (Compartir Igual) */}
                                <span className="flex items-center justify-center w-7 h-7 rounded-full border-[2px] border-current text-[10px] font-bold">SA</span>
                            </div>
                        )}
                        {/* ------------------------------------------------------------------ */}

                        <p className="text-gray-300 mb-6 text-sm leading-relaxed">{steps[step].desc}</p>
                        
                        {isLastStep ? (
                            <button onClick={openManual} className="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg font-bold transition-colors shadow-lg shadow-emerald-500/20 flex items-center justify-center gap-2">
                                <Package size={18} /> Abrir Manual en PDF
                            </button>
                        ) : (
                            <button onClick={handleNext} className="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-semibold transition-colors shadow-lg shadow-blue-500/20">
                                Siguiente
                            </button>
                        )}
                        
                        {/* Indicadores de progreso (Puntitos) */}
                        <div className="tutorial-step-dots">
                            {steps.map((_, i) => (
                                <div key={i} className={`dot ${i === step ? (isLastStep ? 'bg-emerald-500 !w-6 !rounded-md' : 'active') : ''}`} />
                            ))}
                        </div>
                        
                        {!isLastStep && <button onClick={onComplete} className="mt-4 text-xs text-gray-500 hover:text-gray-300 underline">Saltar tutorial</button>}
                    </div>
                </div>
            );
        };

        const SettingsModal = ({ isOpen, onClose, prefs, setPrefs, showModal, closeModal }) => {
            const [oldPwd, setOldPwd] = useState('');
            const [newPwd, setNewPwd] = useState('');
            const [loadingPwd, setLoadingPwd] = useState(false);

            // ESTADOS PARA ADMINISTRACIÓN DE AULA
            const [isAdminUnlocked, setIsAdminUnlocked] = useState(false);
            const [adminMasterPwd, setAdminMasterPwd] = useState('');
            const [accounts, setAccounts] = useState({ teachers: [], students: [] });
            const [editingAccount, setEditingAccount] = useState(null); 
            const [creatingAccountType, setCreatingAccountType] = useState(null);
            const [adminFormData, setAdminFormData] = useState({ name: '', username: '', password: '' });

            const [initialPrefs, setInitialPrefs] = useState(null);
            const [hasUnsavedPrefs, setHasUnsavedPrefs] = useState(false);

            const userRole = localStorage.getItem('edubot_role');
            const currentUsername = localStorage.getItem('edubot_username');

            const isValidName = (name) => /^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$/.test(name);
            const isValidTeacherUser = (user) => /^(?=.*[a-zA-Z])[a-zA-Z0-9._-]{3,15}$/.test(user);
            const isValidStudentUser = (user) => /^(?=.*[a-zA-Z])[a-zA-Z0-9]{3,8}$/.test(user);

            useEffect(() => {
                if (isOpen) {
                    setIsAdminUnlocked(false);
                    setAdminMasterPwd('');
                    setEditingAccount(null);
                    setCreatingAccountType(null);
                    setInitialPrefs(prefs);
                    setHasUnsavedPrefs(false);
                }
            }, [isOpen]);

            if (!isOpen) return null;

            const handleChange = (key, value) => {
                const newPrefs = { ...prefs, [key]: value };
                setPrefs(newPrefs);
                setHasUnsavedPrefs(true);
            };

            const handleApplyAndClose = () => {
                localStorage.setItem('edubot_preferences', JSON.stringify(prefs));
                setHasUnsavedPrefs(false);
                onClose();
            };

            const handleCancelClose = () => {
                if (hasUnsavedPrefs) {
                    showModal({
                        type: 'confirm', title: '⚠️ Cambios sin aplicar',
                        message: 'Has modificado preferencias sin aplicar. ¿Deseas descartar los cambios?',
                        onConfirm: () => { closeModal(); setPrefs(initialPrefs); setHasUnsavedPrefs(false); onClose(); },
                        onCancel: closeModal
                    });
                } else { onClose(); }
            };

            const handleChangePassword = async () => {
                if (!oldPwd || !newPwd) return;
                if (newPwd.length < 8) { showModal({ type: 'alert', title: 'Error', message: 'La nueva contraseña debe tener al menos 8 caracteres.', onConfirm: closeModal }); return; }
                setLoadingPwd(true);
                try {
                    const res = await window.eel.api_change_password(currentUsername, oldPwd, newPwd, userRole)();
                    if (res.success) {
                        showModal({ type: 'alert', title: 'Éxito', message: 'Contraseña actualizada correctamente.', onConfirm: closeModal });
                        setOldPwd(''); setNewPwd('');
                    } else { showModal({ type: 'alert', title: 'Error', message: res.error, onConfirm: closeModal }); }
                } catch(e) { showModal({ type: 'alert', title: 'Error', message: String(e), onConfirm: closeModal }); }
                setLoadingPwd(false);
            };

            const loadAccounts = async () => {
                const res = await window.eel.api_get_all_accounts()();
                if (res.success) setAccounts({ teachers: res.teachers || [], students: res.students || [] });
            };

            const handleUnlockAdmin = async () => {
                if(!adminMasterPwd) return;
                const res = await window.eel.api_check_admin_access(adminMasterPwd)();
                if (res.success) {
                    setIsAdminUnlocked(true);
                    loadAccounts();
                    setAdminMasterPwd('');
                } else { showModal({ type: 'alert', title: 'Error', message: 'Contraseña maestra incorrecta.', onConfirm: closeModal }); }
            };

            const handleDeleteAccount = (username, role) => {
                showModal({
                    type: 'confirm', title: 'Eliminar Cuenta',
                    message: `¿Estás seguro de eliminar permanentemente la cuenta de '${username}'? Esta acción es irreversible.`,
                    onConfirm: async () => {
                        closeModal();
                        const res = await window.eel.api_delete_account(username, role)();
                        if (res.success) {
                            loadAccounts();
                            if (username === currentUsername) {
                                localStorage.removeItem('edubot_role'); localStorage.removeItem('edubot_username'); window.location.reload();
                            } else {
                                setTimeout(() => showModal({ type: 'alert', title: 'Cuenta Eliminada', message: `La cuenta de ${username} ha sido borrada del sistema.`, onConfirm: closeModal }), 200);
                            }
                        } else { setTimeout(() => showModal({ type: 'alert', title: 'Error', message: res.error, onConfirm: closeModal }), 200); }
                    },
                    onCancel: closeModal
                });
            };

            const handleSaveEdit = async () => {
                const { name, username, password } = adminFormData;
                if (!name || !username) return;
                if (!isValidName(name)) { showModal({ type: 'alert', title: 'Error', message: 'Nombre inválido.', onConfirm: closeModal }); return; }
                if (editingAccount.role === 'teacher' && !isValidTeacherUser(username)) { showModal({ type: 'alert', title: 'Error', message: 'Usuario de profesor inválido.', onConfirm: closeModal }); return; }
                if (editingAccount.role === 'student' && !isValidStudentUser(username)) { showModal({ type: 'alert', title: 'Error', message: 'Usuario de estudiante inválido.', onConfirm: closeModal }); return; }
                if (password && password.length < 8) { showModal({ type: 'alert', title: 'Error', message: 'La contraseña debe tener al menos 8 caracteres.', onConfirm: closeModal }); return; }

                const res = await window.eel.api_edit_account(editingAccount.old_username, username, name, password, editingAccount.role)();
                if (res.success) {
                    if (editingAccount.old_username === currentUsername) localStorage.setItem('edubot_username', username);
                    setEditingAccount(null);
                    loadAccounts();
                    setTimeout(() => showModal({ type: 'alert', title: 'Cuenta Actualizada', message: 'Los datos han sido modificados correctamente.', onConfirm: closeModal }), 200);
                } else { showModal({ type: 'alert', title: 'Error', message: res.error, onConfirm: closeModal }); }
            };

            const handleCreateAccount = async () => {
                const { name, username, password } = adminFormData;
                if (!name || !username || !password) { showModal({ type: 'alert', title: 'Error', message: 'Todos los campos son obligatorios.', onConfirm: closeModal }); return; }
                if (!isValidName(name)) { showModal({ type: 'alert', title: 'Error', message: 'Nombre inválido.', onConfirm: closeModal }); return; }
                if (creatingAccountType === 'teacher' && !isValidTeacherUser(username)) { showModal({ type: 'alert', title: 'Error', message: 'Usuario de profesor inválido.', onConfirm: closeModal }); return; }
                if (creatingAccountType === 'student' && !isValidStudentUser(username)) { showModal({ type: 'alert', title: 'Error', message: 'Usuario de estudiante inválido.', onConfirm: closeModal }); return; }
                if (password.length < 8) { showModal({ type: 'alert', title: 'Error', message: 'La contraseña debe tener al menos 8 caracteres.', onConfirm: closeModal }); return; }

                const res = creatingAccountType === 'teacher'
                    ? await window.eel.api_create_teacher(username, password, name)()
                    : await window.eel.api_create_student(username, password, name)();

                if (res.success) {
                    setCreatingAccountType(null);
                    loadAccounts();
                    setTimeout(() => showModal({ type: 'alert', title: 'Cuenta Creada', message: `La cuenta de ${name} fue registrada con éxito.`, onConfirm: closeModal }), 200);
                } else { showModal({ type: 'alert', title: 'Error', message: res.error, onConfirm: closeModal }); }
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm animate-fade-in">
                    <div className="bg-gray-900 border border-gray-700 rounded-xl shadow-2xl w-[600px] overflow-hidden flex flex-col max-h-[85vh]">
                        <div className="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-800">
                            <h2 className="text-white font-bold flex items-center gap-2"><Settings size={20} /> Preferencias de EduBot</h2>
                            <button onClick={handleCancelClose} className="text-gray-400 hover:text-white"><X size={20} /></button>
                        </div>
                        <div className="p-6 overflow-y-auto space-y-8 text-sm text-gray-300 custom-scrollbar">
                            
                            <div>
                                <h3 className="text-orange-400 font-bold uppercase text-xs mb-3 flex items-center gap-2"><Users size={14}/> Seguridad de la Cuenta</h3>

                                                            <button onClick={() => { setAdminFormData({name:'', username:'', password:''}); setCreatingAccountType('student'); }} className="flex-1 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-[10px] font-bold shadow-lg shadow-blue-600/20 transition-colors flex items-center justify-center gap-1"><Users size={14}/> Añadir Estudiante</button>
                                                        </div>
                                                        <div className="bg-gray-900/50 rounded-lg border border-gray-700 max-h-48 overflow-y-auto custom-scrollbar">

                                                            {accounts.teachers.map((u, i) => (

                                                                    <div className="flex gap-2">
                                                                        <button onClick={() => { setEditingAccount({old_username: u.username, role: 'teacher'}); setAdminFormData({name: u.name, username: u.username, password: ''}); }} className="p-1.5 bg-gray-700 hover:bg-blue-600 rounded text-gray-300 hover:text-white transition-colors" title="Editar"><Settings size={14}/></button>
                                                                        <button onClick={() => handleDeleteAccount(u.username, 'teacher')} className="p-1.5 bg-gray-700 hover:bg-red-600 rounded text-gray-300 hover:text-white transition-colors" title="Eliminar"><Trash2 size={14}/></button>
                                                                    </div>

                                                            {accounts.students.map((u, i) => (
                                                                <div key={`s-${i}`} className="flex justify-between items-center p-3 border-b border-gray-800 hover:bg-gray-800/50 transition-colors">
                                                                    <div><div className="font-bold text-xs text-blue-300">{u.name} (Estudiante)</div><div className="text-[10px] text-gray-500 font-mono">@{u.username}</div></div>
                                                                    <div className="flex gap-2">
                                                                        <button onClick={() => { setEditingAccount({old_username: u.username, role: 'student'}); setAdminFormData({name: u.name, username: u.username, password: ''}); }} className="p-1.5 bg-gray-700 hover:bg-blue-600 rounded text-gray-300 hover:text-white transition-colors" title="Editar"><Settings size={14}/></button>
                                                                        <button onClick={() => handleDeleteAccount(u.username, 'student')} className="p-1.5 bg-gray-700 hover:bg-red-600 rounded text-gray-300 hover:text-white transition-colors" title="Eliminar"><Trash2 size={14}/></button>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </>
                            )}

                            <hr className="border-gray-700" />
                            <div>
                                <h3 className="text-green-400 font-bold uppercase text-xs mb-3 flex items-center gap-2"><Monitor size={14}/> Interfaz y Accesibilidad</h3>
                                <div className="space-y-4">
                                    <div className="flex justify-between items-center gap-4">
                                        <div className="flex-1">
                                            <div className="font-semibold text-white">Nivel de Zoom del Lienzo</div>
                                            <div className="text-xs text-gray-500">Ajusta el tamaño visual del lienzo de bloques.</div>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <input type="range" min="0.1" max="1.5" step="0.1" value={prefs.zoom || 1} onChange={(e) => handleChange('zoom', parseFloat(e.target.value))} className="w-32 h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-green-500" />
                                            <span className="text-white font-mono text-sm w-12 text-right">{Math.round((prefs.zoom || 1) * 100)}%</span>
                                        </div>
