<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBot Forest Studio - Complete Suite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/@xyflow/react@12.0.0-next.16/dist/style.css" rel="stylesheet">
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.3.1?dev",
                "react-dom": "https://esm.sh/react-dom@18.3.1?dev",
                "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?dev",
                "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime?dev",
                "@xyflow/react": "https://esm.sh/@xyflow/react@12.0.0-next.16?external=react,react-dom"
            }
        }
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vscode: {
                            bg: '#1e1e1e', sidebar: '#252526', activity: '#333333',
                            status: '#007acc', text: '#cccccc', textLight: '#ffffff', 
                            border: '#454545', accent: '#007fd4', hover: '#2a2d2e'
                        },
                        node: {
                            data: '#3c8dbc', model: '#28a745', logic: '#f39c12', eval: '#9b59b6'
                        }
                    },
                    fontFamily: { sans: ['Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        body { overflow: hidden; background-color: #1e1e1e; }
        .react-flow__node { border: none; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5); }
        .react-flow__handle { width: 10px; height: 10px; background: #fff; border: 2px solid #555; }
        .react-flow__handle:hover { background: #007acc; border-color: white; transition: 0.2s; }
        
        /* Nodos EduBot */
        .edubot-node { min-width: 220px; background: #2d2d2d; border-radius: 8px; overflow: hidden; font-size: 12px; }
        .edubot-node-header { padding: 8px 12px; color: white; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .edubot-node-body { padding: 12px; color: #eee; }
        .edubot-input { width: 100%; background: #3c3c3c; border: 1px solid #555; color: white; padding: 4px; border-radius: 4px; margin-top: 4px; }
        .edubot-label { display: block; color: #aaa; margin-top: 8px; font-size: 11px; text-transform: uppercase; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body class="bg-vscode-bg text-vscode-text font-sans select-none">
    <div id="root" class="h-screen w-screen flex flex-col"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { ReactFlow, Controls, Background, Handle, Position, applyNodeChanges, applyEdgeChanges, addEdge } from '@xyflow/react';

        // --- 1. ICONOS (Ampliado para incluir los de la Bienvenida) ---
        const Icons = {
            Play: ({size=16, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
            Save: ({size=16, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
            Export: ({size=16, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Trash: ({size=16, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            Bug: ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="8" height="14" x="8" y="6" rx="4"/><path d="m19 7-3 3"/><path d="m5 7 3 3"/><path d="m19 19-3-3"/><path d="m5 19 3-3"/><path d="M20 13h-4"/><path d="M4 13h4"/><path d="m10 4 1 2"/><path d="m14 4-1 2"/></svg>,
            Blocks: ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>,
            Database: ({size=14, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>,
            Tree: ({size=14, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>,
            Split: ({size=14, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
            FileCode: ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="m10 13-2 2 2 2"/><path d="m14 17 2-2-2-2"/></svg>,
            FolderOpen: ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m6 14 1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-3.25 7a2 2 0 0 1-1.8 1.17H5a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h4l2.5 2.5h7.5"/></svg>,
            GitBranch: ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>,
            X: ({size=14, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        };

        // --- 2. NODOS DEL EDITOR (Con Estado Interactivo) ---
        
        const DatasetNode = ({ data }) => {
            // Estado para guardar la selección
            const [selectedFile, setSelectedFile] = useState("iris.csv");

            return (
                <div className="edubot-node border-l-4 border-node-data">
                    <div className="edubot-node-header bg-node-data bg-opacity-20"><Icons.Database /> <span>{data.label}</span></div>
                    <div className="edubot-node-body">
                        <label className="edubot-label">Fuente de Datos</label>
                        <select 
                            className="edubot-input cursor-pointer" 
                            value={selectedFile} 
                            onChange={(e) => setSelectedFile(e.target.value)}
                        >
                            <option value="iris.csv">iris.csv (Local)</option>
                            <option value="titanic.csv">titanic.csv (Local)</option>
                            <option value="upload">Subir Archivo...</option>
                        </select>
                        <div className="mt-2 text-xs text-gray-400">Salida: Matriz (X, y)</div>
                    </div>
                    <Handle type="source" position={Position.Right} />
                </div>
            );
        };

        const SplitNode = ({ data }) => {
            // AQUÍ ESTÁ LA MAGIA: Estado local para el porcentaje
            const [splitSize, setSplitSize] = useState(20);

            return (
                <div className="edubot-node border-l-4 border-node-logic">
                    <Handle type="target" position={Position.Left} />
                    <div className="edubot-node-header bg-node-logic bg-opacity-20"><Icons.Split /> <span>{data.label}</span></div>
                    <div className="edubot-node-body">
                        {/* Ahora mostramos la variable splitSize dinámicamente */}
                        <label className="edubot-label">Test Size: {splitSize}%</label>
                        
                        <input 
                            type="range" 
                            className="w-full h-2 bg-gray-600 rounded-lg appearance-none cursor-pointer mt-2" 
                            min="10" 
                            max="50" 
                            value={splitSize}
                            onChange={(evt) => setSplitSize(evt.target.value)} 
                        />
                        
                        <div className="flex justify-between mt-2 text-xs text-gray-400">
                            <span>Train: {100 - splitSize}%</span>
                            <span>Test: {splitSize}%</span>
                        </div>
                    </div>
                    <Handle type="source" position={Position.Right} id="train" style={{ top: '60%' }} />
                    <Handle type="source" position={Position.Right} id="test" style={{ top: '80%' }} />
                </div>
            );
        };

        const ModelNode = ({ data }) => {
            // Estado para los hiperparámetros
            const [trees, setTrees] = useState(10);
            const [depth, setDepth] = useState(5);

            return (
                <div className="edubot-node border-l-4 border-node-model">
                    <Handle type="target" position={Position.Left} />
                    <div className="edubot-node-header bg-node-model bg-opacity-20"><Icons.Tree /> <span>{data.label}</span></div>
                    <div className="edubot-node-body">
                        <label className="edubot-label">Hiperparámetros</label>
                        
                        {/* INPUT ARBOLES */}
                        <div className="flex gap-2 items-center mb-1">
                            <span className="text-xs w-16">Árboles:</span>
                            <input 
                                type="number" 
                                // AGREGADO: 'nodrag' evita que React Flow mueva el nodo al hacer clic aquí
                                className="edubot-input nodrag cursor-text" 
                                value={trees}
                                onChange={(e) => setTrees(e.target.value)}
                                // AGREGADO: Detiene la propagación del clic hacia el lienzo
                                onMouseDown={(e) => e.stopPropagation()}
                                style={{width: '60px'}} 
                            />
                        </div>

                        {/* INPUT PROFUNDIDAD */}
                        <div className="flex gap-2 items-center">
                            <span className="text-xs w-16">Max Depth:</span>
                            <input 
                                type="number" 
                                // AGREGADO: 'nodrag' aquí también
                                className="edubot-input nodrag cursor-text" 
                                value={depth}
                                onChange={(e) => setDepth(e.target.value)}
                                // AGREGADO: Detiene la propagación
                                onMouseDown={(e) => e.stopPropagation()}
                                style={{width: '60px'}} 
                            />
                        </div>
                    </div>
                    <Handle type="source" position={Position.Right} />
                </div>
            );
        };

        // PredictNode se queda igual porque no tiene inputs interactivos por ahora
        const PredictNode = ({ data }) => (
            <div className="edubot-node border-l-4 border-node-eval">
                <Handle type="target" position={Position.Left} id="model" style={{ top: '30%' }} />
                <Handle type="target" position={Position.Left} id="data" style={{ top: '70%' }} />
                <div className="edubot-node-header bg-node-eval bg-opacity-20"><span className="text-lg">🚀</span> <span>{data.label}</span></div>
                <div className="edubot-node-body">
                    <div className="text-xs text-gray-400 mb-2">Entradas:</div>
                    <div className="text-xs bg-gray-800 p-1 rounded mb-1">⬅ Modelo Entrenado</div>
                    <div className="text-xs bg-gray-800 p-1 rounded">⬅ Datos de Prueba</div>
                </div>
                <Handle type="source" position={Position.Right} />
            </div>
        );
        const nodeTypes = { ml_dataset_block: DatasetNode, ml_train_dt: ModelNode, ml_train_rf: ModelNode, ml_train_linear: ModelNode, ml_train_nn: ModelNode, ml_split_block: SplitNode, ml_predict_block: PredictNode, ml_eval_block: PredictNode };

        // --- 3. PANTALLA DE BIENVENIDA (WelcomeScreen) ---
        const WelcomeScreen = ({ onNewProject }) => {
            return (
                <div className="h-full w-full flex flex-col bg-vscode-bg text-vscode-text font-sans">
                    {/* Fake Tab Bar */}
                    <div className="h-9 bg-vscode-bg flex items-center px-4 border-b border-vscode-border">
                        <div className="flex items-center bg-vscode-sidebar px-3 py-1 text-sm text-vscode-textLight border-t border-vscode-status">
                            <span className="mr-2">Bienvenido</span>
                            <Icons.X size={14} className="hover:text-white cursor-pointer" />
                        </div>
                    </div>

                    <div className="flex-1 flex justify-center items-start pt-20 overflow-y-auto">
                        <div className="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-16 px-8">
                            {/* Columna Izquierda */}
                            <div className="flex flex-col gap-6">
                                <div className="mb-4">
                                    <h1 className="text-4xl font-light text-vscode-textLight mb-2">EduBot Forest Studio</h1>
                                    <h2 className="text-xl text-gray-500">Edición de IA Evolucionada</h2>
                                </div>
                                <div className="flex flex-col gap-2">
                                    <h3 className="text-lg text-vscode-textLight mb-2">Iniciar</h3>
                                    
                                    {/* --- EL BOTÓN MÁGICO --- */}
                                    <button onClick={onNewProject} className="group flex items-center gap-3 text-vscode-text hover:text-vscode-status transition-colors text-left">
                                        <Icons.FileCode className="text-vscode-status" />
                                        <div>
                                            <span className="text-vscode-status group-hover:underline">Nuevo Proyecto de Bosque...</span>
                                            <p className="text-xs text-gray-500">Crear un nuevo flujo de ML desde cero</p>
                                        </div>
                                    </button>

                                    <button className="group flex items-center gap-3 text-vscode-text hover:text-vscode-status transition-colors text-left">
                                        <Icons.FolderOpen className="text-vscode-status" />
                                        <div>
                                            <span className="text-vscode-status group-hover:underline">Abrir Proyecto...</span>
                                            <p className="text-xs text-gray-500">Cargar archivo .edubotproj</p>
                                        </div>
                                    </button>
                                    <button className="group flex items-center gap-3 text-vscode-text hover:text-vscode-status transition-colors text-left">
                                        <Icons.GitBranch className="text-vscode-status" />
                                        <div><span className="text-vscode-status group-hover:underline">Clonar Repositorio</span></div>
                                    </button>
                                </div>
                                <div className="mt-8">
                                    <h3 className="text-lg text-vscode-textLight mb-2">Reciente</h3>
                                    <div className="flex flex-col gap-1 text-sm">
                                        <a href="#" className="hover:bg-vscode-hover hover:text-white py-1 px-2 -ml-2 rounded flex justify-between group">
                                            <span>iris_classification.edubot</span><span className="text-gray-500 group-hover:text-gray-300">~/Documentos/ML</span>
                                        </a>
                                        <a href="#" className="hover:bg-vscode-hover hover:text-white py-1 px-2 -ml-2 rounded flex justify-between group">
                                            <span>titanic_forest.edubot</span><span className="text-gray-500 group-hover:text-gray-300">~/Clase_IA_2</span>
                                        </a>
                                    </div>
                                </div>
                            </div>

                            {/* Columna Derecha */}
                            <div className="flex flex-col gap-6">
                                <div>
                                    <h3 className="text-lg text-vscode-textLight mb-4">Aprende</h3>
                                    <div className="flex flex-col gap-3">
                                        <div className="bg-vscode-activity p-3 border-l-2 border-vscode-status cursor-pointer hover:bg-vscode-hover">
                                            <h4 className="font-semibold text-white flex items-center gap-2"><Icons.Play size={14} /> Conceptos Básicos</h4>
                                            <p className="text-xs mt-1">Aprende cómo funciona un Árbol de Decisión.</p>
                                        </div>
                                        <div className="bg-vscode-activity p-3 border-l-2 border-transparent hover:border-vscode-status cursor-pointer hover:bg-vscode-hover">
                                            <h4 className="font-semibold text-white flex items-center gap-2"><Icons.Tree size={14} /> Programación en Bosques</h4>
                                            <p className="text-xs mt-1">Tutorial interactivo sobre Random Forest.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 4. EDITOR PRINCIPAL (Lo que hicimos antes) ---
        const EditorInterface = ({ onGoHome }) => {
            const [nodes, setNodes] = useState([
                { id: '1', type: 'ml_dataset_block', position: { x: 50, y: 50 }, data: { label: 'Cargar Dataset' } },
                { id: '2', type: 'ml_split_block', position: { x: 350, y: 50 }, data: { label: 'Dividir Datos' } },
                { id: '3', type: 'ml_train_rf', position: { x: 650, y: 0 }, data: { label: 'Bosque (Random Forest)' } }
            ]);
            const [edges, setEdges] = useState([
                { id: 'e1-2', source: '1', target: '2', animated: true, style: { stroke: '#3c8dbc' } },
                { id: 'e2-3', source: '2', sourceHandle: 'train', target: '3', animated: true, style: { stroke: '#f39c12' } }
            ]);

            const onNodesChange = useCallback((changes) => setNodes((nds) => applyNodeChanges(changes, nds)), []);
            const onEdgesChange = useCallback((changes) => setEdges((eds) => applyEdgeChanges(changes, eds)), []);
            const onConnect = useCallback((params) => setEdges((eds) => addEdge(params, eds)), []);
            
            // Drag & Drop Helpers
            const onDragStart = (event, nodeType, label) => {
                event.dataTransfer.setData('application/reactflow', JSON.stringify({ type: nodeType, label }));
                event.dataTransfer.effectAllowed = 'move';
            };
            const onDrop = (event) => {
                event.preventDefault();
                const data = JSON.parse(event.dataTransfer.getData('application/reactflow'));
                const position = { x: event.clientX - 300, y: event.clientY - 100 };
                const newNode = { id: Math.random().toString(), type: data.type, position, data: { label: data.label } };
                setNodes((nds) => nds.concat(newNode));
            };
            const onDragOver = (event) => { event.preventDefault(); event.dataTransfer.dropEffect = 'move'; };

            return (
                <div className="flex flex-col h-full w-full bg-vscode-bg">
                    {/* HEADER EDITOR */}
                    <div className="h-8 bg-vscode-activity flex items-center justify-between px-3 text-xs select-none border-b border-black">
                        <div className="flex items-center gap-4">
                            <span className="font-bold text-vscode-accent">EduBot Forest Studio</span>
                            <div className="flex gap-3 text-vscode-text">
                                <span className="hover:text-white cursor-pointer" onClick={onGoHome}>Inicio</span>
                                <span className="hover:text-white cursor-pointer">Archivo</span>
                                <span className="hover:text-white cursor-pointer">Ayuda</span>
                            </div>
                        </div>
                        <div className="text-gray-500">Proyecto: Tesis_ML_V1.edubot</div>
                    </div>

                    <div className="flex flex-1 overflow-hidden">
                        {/* ACTIVITY BAR */}
                        <div className="w-12 bg-vscode-activity flex flex-col items-center py-4 gap-6 border-r border-black z-10">
                            <div className="cursor-pointer text-white border-l-2 border-vscode-accent pl-3 pr-4"><Icons.Blocks /></div>
                            <div className="cursor-pointer text-gray-500 hover:text-white transition"><Icons.Bug /></div>
                        </div>

                        {/* SIDEBAR HERRAMIENTAS */}
                        <div className="w-64 bg-vscode-sidebar flex flex-col border-r border-vscode-border">
                            <div className="p-0">
                                <div className="px-4 py-2 text-xs font-bold text-gray-400 uppercase tracking-wider">Acciones</div>
                                <div className="flex flex-col">
                                    <button className="flex items-center gap-2 px-4 py-2 text-sm text-green-400 hover:bg-gray-700 transition text-left"><Icons.Play /> Ejecutar Flujo</button>
                                    <button className="flex items-center gap-2 px-4 py-2 text-sm text-blue-400 hover:bg-gray-700 transition text-left"><Icons.Export /> Exportar a C (Firmware)</button>
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto mt-4">
                                <div className="px-4 py-2 text-xs font-bold text-gray-400 uppercase tracking-wider">Herramientas ML</div>
                                {/* Drag Items */}
                                <div className="mb-2">
                                    <div className="px-4 py-1 text-xs text-node-data font-semibold">📥 DATOS</div>
                                    <div draggable onDragStart={(e) => onDragStart(e, 'ml_dataset_block', 'Cargar Dataset')} className="mx-2 p-2 bg-vscode-activity rounded cursor-grab hover:bg-gray-700 text-sm flex gap-2 items-center border-l-2 border-node-data"><Icons.Database /> Cargar CSV</div>
                                    <div draggable onDragStart={(e) => onDragStart(e, 'ml_split_block', 'Dividir Datos')} className="mx-2 p-2 mt-1 bg-vscode-activity rounded cursor-grab hover:bg-gray-700 text-sm flex gap-2 items-center border-l-2 border-node-logic"><Icons.Split /> Dividir Datos</div>
                                </div>
                                <div className="mb-2">
                                    <div className="px-4 py-1 text-xs text-node-model font-semibold">🤖 MODELOS</div>
                                    <div draggable onDragStart={(e) => onDragStart(e, 'ml_train_rf', 'Random Forest')} className="mx-2 p-2 bg-vscode-activity rounded cursor-grab hover:bg-gray-700 text-sm flex gap-2 items-center border-l-2 border-node-model"><Icons.Tree /> Random Forest</div>
                                    <div draggable onDragStart={(e) => onDragStart(e, 'ml_train_nn', 'Neural Network')} className="mx-2 p-2 mt-1 bg-vscode-activity rounded cursor-grab hover:bg-gray-700 text-sm flex gap-2 items-center border-l-2 border-node-model">🧠 Neural Network</div>
                                </div>
                                <div className="mb-2">
                                    <div className="px-4 py-1 text-xs text-node-eval font-semibold">📊 EVALUACIÓN</div>
                                    <div draggable onDragStart={(e) => onDragStart(e, 'ml_predict_block', 'Predecir')} className="mx-2 p-2 bg-vscode-activity rounded cursor-grab hover:bg-gray-700 text-sm flex gap-2 items-center border-l-2 border-node-eval">🚀 Predecir</div>
                                </div>
                            </div>
                        </div>

                        {/* CANVAS */}
                        <div className="flex-1 relative bg-vscode-bg" onDrop={onDrop} onDragOver={onDragOver}>
                            <div className="h-8 bg-vscode-bg border-b border-vscode-border flex items-center px-4 gap-2">
                                <span className="text-yellow-400">⚡</span><span className="text-sm text-white bg-vscode-activity px-3 py-1 rounded-t border-t border-vscode-accent">diagrama_flujo.forest</span>
                            </div>
                            <div className="h-full w-full">
                                <ReactFlow nodes={nodes} edges={edges} nodeTypes={nodeTypes} onNodesChange={onNodesChange} onEdgesChange={onEdgesChange} onConnect={onConnect} fitView style={{backgroundColor: '#1e1e1e'}}>
                                    <Background color="#333" gap={20} size={1} />
                                    <Controls style={{ buttonBg: '#333', buttonColor: '#fff', buttonBorder: '#555' }} />
                                </ReactFlow>
                            </div>
                        </div>
                    </div>
                    {/* STATUS BAR */}
                    <div className="h-6 bg-vscode-status text-white flex items-center justify-between px-4 text-xs z-50">
                        <div className="flex gap-4"><span>⚡ EduBot Core: Online</span></div>
                        <div className="flex gap-4"><span>Ln 1, Col 1</span><span>UTF-8</span></div>
                    </div>
                </div>
            );
        };

        // --- 5. APP CONTAINER (Gestión de Vistas) ---
        const App = () => {
            // Estado para saber qué pantalla mostrar: 'welcome' o 'editor'
            const [currentView, setCurrentView] = useState('welcome');

            return (
                <>
                    {currentView === 'welcome' ? (
                        <WelcomeScreen onNewProject={() => setCurrentView('editor')} />
                    ) : (
                        <EditorInterface onGoHome={() => setCurrentView('welcome')} />
                    )}
                </>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
